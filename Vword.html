<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>V단어 예문 모음</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 0;
    background: #faf7fb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: #2a2230;
  }
  header {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(135deg, #7c4fd1, #a56be0);
    color: #fff;
    padding: 14px 16px 12px;
    box-shadow: 0 2px 10px rgba(124,79,209,0.25);
  }
  header h1 { margin: 0 0 8px; font-size: 18px; font-weight: 700; display:flex; align-items:center; justify-content:space-between; }
  .gear-btn { background: rgba(255,255,255,0.2); border:none; border-radius:8px; width:30px; height:30px; color:#fff; font-size:15px; }
  .stats { font-size: 12.5px; opacity: 0.92; margin-bottom: 10px; }
  .stats .flagnote { display:block; margin-top:2px; opacity:0.85; }
  .searchbar { display: flex; gap: 6px; }
  .searchbar input { flex: 1; border: none; border-radius: 10px; padding: 9px 12px; font-size: 14px; outline: none; }
  .searchbar button { border: none; border-radius: 10px; padding: 9px 12px; background: rgba(255,255,255,0.25); color: #fff; font-size: 13px; font-weight: 600; }
  .toolbar { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .toolbar button { border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); color: #fff; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 600; }
  .toolbar button.active { background: #fff; color: #7c4fd1; }

  main { padding: 10px 12px 60px; max-width: 720px; margin: 0 auto; }

  .word-card { background: #fff; border-radius: 14px; padding: 14px 14px 10px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(80,40,120,0.08); border: 1px solid #f0e8f7; }

  .word-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
  .word-num { font-size: 11px; color: #b39ddb; font-weight: 700; }
  .word-text { font-size: 19px; font-weight: 800; color: #5b21b6; }
  .word-phonetic { font-size: 13px; color: #a78bda; font-style: normal; }
  .senses { margin-bottom: 8px; }
  .sense-row { font-size: 13.5px; color: #4a3b57; font-weight: 600; }
  .sense-pos { color: #9575cd; font-weight: 700; margin-right: 3px; }

  .word-chips { font-size: 15px; font-weight: 700; color: #5b21b6; cursor: pointer;
                margin-bottom: 2px; line-height: 1.4; }
  .word-chips .chip-word { }
  .word-chips .sep { color: #d5c3ef; margin: 0 4px; font-weight: 400; }
  .word-meanings { font-size: 13px; color: #4a3b57; font-weight: 600; display: none;
                   margin-bottom: 8px; line-height: 1.5; }
  .word-meanings .sep { color: #d5c3ef; margin: 0 4px; font-weight: 400; }
  .word-meanings.revealed { display: block; }
  .word-meanings .m-pos { color: #9575cd; font-weight: 700; margin-right: 2px; }
  .eng-def { font-size: 12.5px; color: #8a7a94; font-style: italic; background: #faf5ff;
             border-radius: 8px; padding: 6px 9px; margin-bottom: 8px; line-height: 1.4; }
  .extra-note { font-size: 12px; color: #6b5b75; background: #fff9e8; border-radius: 8px;
                padding: 6px 9px; margin-top: 6px; line-height: 1.45; }

  .sent-card { border-top: 1px dashed #ecdff5; padding: 9px 0; }
  .sent-card:first-of-type { border-top: none; }
  .sent-row { display: flex; align-items: flex-start; gap: 8px; }
  .chk-btn { flex: 0 0 auto; width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid #d8cbe6; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; color: transparent; margin-top: 1px; }
  .chk-btn.checked { background: #ef4444; border-color: #ef4444; color: #fff; }
  .listen-btn { flex: 0 0 auto; width: 26px; height: 22px; border-radius: 6px; border: 1.5px solid #d8cbe6; background: #fff; font-size: 11px; margin-top: 1px; color: #7c4fd1; }
  .listen-btn.playing { background: #7c4fd1; color: #fff; }
  .listen-btn.loading { opacity: 0.5; }

  .sent-body { flex: 1; min-width: 0; }
  .tag { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 1px 6px; border-radius: 5px; margin-bottom: 4px; margin-right: 4px; }
  .tag.base { background: #fde8c9; color: #a15c00; }
  .tag.extra { background: #e3d6fb; color: #6b21c9; }
  .tag.flag { background: #fff2ac; color: #8a6d00; cursor: default; }

  .sent-en { font-size: 14.5px; line-height: 1.5; color: #241b2e; cursor: pointer; }
  .sent-en:active { opacity: 0.7; }
  .sent-ko { font-size: 13.5px; line-height: 1.5; color: #7a1fa2; margin-top: 4px; display: none; font-weight: 500; }
  .sent-card.revealed .sent-ko { display: block; }
  mark.hl { background: #fff3a3; color: inherit; padding: 0 1px; border-radius: 2px; }
  mark.verb-hl { background: #b8e2ff; color: inherit; padding: 0 1px; border-radius: 2px; }

  .left-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 0 0 auto; width: 44px; }
  .valency-tag { font-size: 10px; color: #7c4fd1; font-weight: 700; text-align: center;
                 line-height: 1.25; word-break: keep-all; }
  .arity-tag { font-size: 9.5px; color: #b39ddb; font-weight: 700; text-align: center; line-height: 1.2; }
  .right-col { flex: 0 0 auto; margin-top: 1px; }

  .empty-msg { text-align: center; color: #a08fb5; font-size: 14px; margin-top: 40px; }
  .fab { position: fixed; right: 16px; bottom: 16px; background: #5b21b6; color: #fff; border: none; border-radius: 24px; padding: 10px 16px; font-size: 13px; font-weight: 700; box-shadow: 0 4px 14px rgba(91,33,182,0.35); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index: 50; }
  .modal-overlay.show { display:flex; }
  .modal { background:#fff; border-radius:14px; padding:18px; width: 90%; max-width: 380px; }
  .modal h2 { margin:0 0 10px; font-size:16px; color:#5b21b6; }
  .modal p { font-size: 12.5px; color:#6b5b75; margin: 4px 0 10px; line-height:1.5; }
  .modal input { width:100%; padding:9px 10px; border:1px solid #ddd; border-radius:8px; font-size:13px; margin-bottom:10px; }
  .modal .row { display:flex; gap:8px; }
  .modal button { flex:1; padding:9px; border:none; border-radius:8px; font-size:13px; font-weight:700; }
  .modal .save { background:#5b21b6; color:#fff; }
  .modal .close { background:#eee; color:#444; }
</style>
</head>
<body>

<header>
  <h1>📘 V단어 예문 &amp; 해석 모음 <button class="gear-btn" onclick="openSettings()">⚙️</button></h1>
  <div class="stats" id="statsLine"></div>
  <div class="searchbar">
    <input id="searchInput" type="text" placeholder="단어 검색 (예: appliance)">
    <button onclick="clearSearch()">지우기</button>
  </div>
  <div class="toolbar">
    <button id="btnAll" class="active" onclick="setFilter('all')">전체</button>
    <button id="btnChecked" onclick="setFilter('checked')">체크한 문장만</button>
    <button id="btnFlagged" onclick="setFilter('flagged')">확인필요만</button>
    <button onclick="revealAll(true)">전체 해석 보기</button>
    <button onclick="revealAll(false)">전체 해석 숨기기</button>
  </div>
</header>

<main id="main"></main>

<button class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲ 위로</button>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>🔊 듣기 설정 (ElevenLabs)</h2>
    <p>영어 문장을 읽어주는 TTS 기능을 쓰려면 ElevenLabs API 키가 필요해. 키는 이 브라우저에만 저장되고 서버로 전송되지 않아.<br>
    (elevenlabs.io 에서 발급)</p>
    <input id="apiKeyInput" type="text" placeholder="ElevenLabs API 키 붙여넣기">
    <div class="row">
      <button class="close" onclick="closeSettings()">닫기</button>
      <button class="save" onclick="saveApiKey()">저장</button>
    </div>
  </div>
</div>

"extra_notes": [], "id": 2}, {"word": "appliance", "phonetic": "apidians", "senses": [{"pos": "n.", "meaning": "(가정용) 기기, 장치"}], "meaning": "n. (가정용) 기기, 장치", "page": 10, "line_start": 141, "line_end": 171, "examples": [{"type": "기본예문", "en": "By creating and applying new regulations for appliances. the government is showing how much it cares about its people.", "ko": "정부는 가전 제품에 대한 새로운 기준을 마련해서 적용함으로써, 자신들이 얼마나 국민들에게 관심을 가지고 있는지를 보여주고 있다.", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": "showing", "valency": "S+V", "arity": "2·3가", "id": "3-0"}, {"type": "예문", "en": "The invention of household appliances has freed men and women from domestic duties, resulting in higher levels of happiness.", "ko": "가정용 기기의 발명으로 남녀는 가사 의무에서 해방되어 더 높은 수준의 행복감을 느끼게 되었다.", "en_hl": ["household appliances"], "ko_hl": ["가정용"], "ocr_flag": false, "verb": "freed", "valency": "S+V+O", "arity": "2가", "id": "3-1"}, {"type": "예문", "en": "The percentage of people in the 35-54 age group using online reviews before making purchases of household appliances was more than twice that of people in the same age group using online reviews before purchasing clothes.", "ko": "가전제품을 구매하기 전에 온라인 구매평을 이용한 35~-54세 사람들의 비율은 같은 연령대에서 옷을 사기 전에 온라인 구매평을 이용한 사람들의 비율보다 두 배 넘게 많았다.", "en_hl": ["household", "appliances"], "ko_hl": ["가전제품"], "ocr_flag": false, "verb": "was", "valency": "S+V+C", "arity": "2가", "id": "3-2"}, {"type": "예문", "en": "It is wrong to suppose, however, that technology is just the appliance of scientific thought.", "ko": "그러나 기술이 단지 과학적 사고를 적용한 것이라고 생각하는 것은 잘못이다.", "en_hl": ["appliance of"], "ko_hl": ["적용한 것이라고"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "3-3"}], "phonetic_ipa": "əˈplaɪəns", "derived_words": [], "eng_defs": [], "extra_notes": ["(일반적으로) 단수와 복수일 때 뜻이 다르다.", "단수 : 적용, 응용 @ 복수 : (가정용) 기기", "A is the appliance of B : A는 B를 적용한 것이다. A와 B 사이의 인과관계가 매우 중요! (A ← B)"], "id": 3}, {"word": "intelligent", "phonetic": "intéledzant", "senses": [{"pos": "adj.", "meaning": "지적인, 똑똑한, 지능의"}], "meaning": "adj. 지적인, 똑똑한, 지능의", "page": 10, "line_start": 171, "line_end": 206, "examples": [{"type": "기본예문", "en": "Our concept of emotional intelligence is primarily focused on the complex, potentially intelligent tapestry of emotional reasoning in everyday life.", "ko": "감성 지능에 대한 우리의 개념은 주로, 일상생활에서 복잡하고 잠재적으로 지능적인 다채로운 형태의 감정 추론에 초점을 맞추고 있다.", "en_hl": ["intelligent"], "ko_hl": ["지능적인"], "ocr_flag": false, "verb": "is", "valency": "S+V", "arity": "2가", "id": "4-0"}, {"type": "예문", "en": "Metaphysics became the first priority above all as practical results took precedence over intelligible theory.", "ko": "형이상학은 모든 것 위의 최우선 과제가 되었지만, 실제적인 성과가 이해 가능한 이론보다 우선시되었다", "en_hl": ["intelligible theory."], "ko_hl": ["이해 가능한"], "ocr_flag": false, "verb": "became", "valency": "S+V+C", "arity": "2가", "id": "4-1"}, {"type": "예문", "en": "rules create a problem that is artificial yet intelligible", "ko": "규칙은 인위적이지만 이해할 수 있는 문제를 만들어 낸다", "en_hl": ["intelligible"], "ko_hl": ["이해할", "있는"], "ocr_flag": false, "verb": "create", "valency": "S+V+O", "arity": "2가", "id": "4-2"}, {"type": "예문", "en": "She was so angered that what she said was hardly intelligible.", "ko": "그녀는 너무나 화가 난 상태라 그녀가 하는 맡은 거의 이해할 수 없었다.", "en_hl": ["was hardly intelligible."], "ko_hl": ["거의 이해할 수 없었다."], "ocr_flag": false, "verb": "was", "valency": "S+V+C", "arity": "2가", "id": "4-3"}, {"type": "예문", "en": "When we state that there are approximately seven thousand mutually unintelligible languages spoken in the world today, we are implying that they all have unique vocabularies, grammar systems, and syntax. Hi", "ko": "늘날 세계에서 약 7H 가지의 상호 간에 이해할 수 없는 언어가 사용되고 있다고 말할 때, 우리는 그것들이 모두 고유한 어휘, 문법 체계, 그리고 통 사 구조를 가지고 있다는 것을 의미한다.", "en_hl": ["unintelligible languages"], "ko_hl": ["이해할", "없는"], "ocr_flag": false, "verb": "implying", "valency": "V+that", "arity": "2가", "id": "4-4"}], "phonetic_ipa": "ˌɪnˈtɛləʤənt", "derived_words": [{"word": "intelligible", "senses": [{"pos": "adj.", "meaning": "이해할 수 있는"}]}, {"word": "unintelligible", "senses": [{"pos": "adj.", "meaning": "이해할 수 없는"}]}], "eng_defs": ["Something that is intelligible can be understood. (~ unintelligible)"], "extra_notes": [], "id": 4}, {"word": "lie", "phonetic": "lai", "senses": [{"pos": "v.", "meaning": "거짓말하다"}, {"pos": "n.", "meaning": "거짓말"}], "meaning": "v. 거짓말하다 / n. 거짓말", "page": 11, "line_start": 206, "line_end": 252, "examples": [{"type": "기본예문", "en": "On the other hand, this widespread exposure to science has led to both a fear of its power and a credulity that allows scientific charlatans to spread lies with impunity.", "ko": "또 다른 한편으로 이와 같은 광범위한 과학에의 노출은 그것의 힘에 대한 두려움과 과학 사기꾼들이 처벌을 받지 않고 거짓을 퍼뜨릴 + 있게 하는 경신 (8) 둘 다를 초래해 왔다.", "en_hl": ["lies"], "ko_hl": [], "ocr_flag": false, "verb": "led", "valency": "S+V", "arity": "1·2가", "id": "5-0"}, {"type": "예문", "en": "Their story inspired others, showing that true success lies not only in individual achievements but also in supporting and encouraging others.", "ko": "그들의 이야기는 진정한 성공이 개인의 성취뿐만 아니라 다른 사람을 지원하고 격려하는 것에도 있다는 것을 보여 주며 다른 이들을 고취시켰습니다. 언성한", "en_hl": ["true success lies"], "ko_hl": [], "ocr_flag": false, "verb": "lies", "valency": "V+전치사+O", "arity": "1가", "id": "5-1"}, {"type": "예문", "en": "But the usefulness of such evidence for their stories lies in the ways in which they employ that evidence to support, supplement, or offer commentary on their personalized acts of remembering.", "ko": "그러나 그러한 증거가 그들의 이야기에 갖는 유용성은 그들이 그 증거를 이용하여 자신의 개인화된 기억 행위를 뒷받침하거나 보완하거나 해설을 제 공하는 방식에 달려 있다.", "en_hl": ["lies", "the ways", "00683"], "ko_hl": ["방식에 달려 있다."], "ocr_flag": false, "verb": "lies", "valency": "V+전치사+O", "arity": "1가", "id": "5-2"}, {"type": "예문", "en": "By the nineteenth century, the descendants of the sea cow's killers were wondering what animal could have left behind the gigantic bones lying on the shoreline.", "ko": "1세기에는, 그 바다소를 죽인 자들의 후손들이 어떤 동물이 바닷가에 놓여 있는 그 거대한 뻐를 남길 수 있었는지 궁금해하였다.", "en_hl": ["lying o hing an informed judgement about a work", "ko": "예술 비평가와 같은 전문가의 경우, 재료와 기법에 대한 더 깊은 친숙함이 작품에 대한 충분한 정보에 기반한 판단에 도달하는 데 흔히 유용하다.", "en_hl": ["deeper", "an informed judgement"], "ko_hl": ["충분한 정보에 기반한"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "24-2"}, {"type": "예문", "en": "When consumers lack adequate information to make informed choices, governments frequently step in to require that firms provide information.", "ko": "소비자가 자세한 정보에 근거한 결정을 내릴 정보가 부족할 때, 정부는 자주 회사가 정보를 제공하도록 요구하기 위해 개입한다.", "en_hl": ["informed choices,"], "ko_hl": ["자세한 정보에 근거한"], "ocr_flag": false, "verb": "step", "valency": "V+전치사+O", "arity": "1가", "id": "24-3"}, {"type": "예문", "en": "Ultimately, the doctor allows his patients to reach an informed decision about their own health conditions.", "ko": "최종적으로 의사는 환자에게 환자 자신의 건강 상태에 대해 정보에 근거한 결정을 내릴 + 있도록 해준다.", "en_hl": ["an informed decision"], "ko_hl": ["정보에 근거한"], "ocr_flag": false, "verb": "allows", "valency": "S+V+O", "arity": "2·3가", "id": "24-4"}, {"type": "예문", "en": "Scientific knowledge allows us to develop new technologies, solve practical problems, and make informed decisions — both individually and collectively.", "ko": "과학 지식은 우리가 개인으로도 집단으로도 새로운 기술을 개발하고, 실제 문제를 해결하며, 정보에 근거한 결정을 내릴 + 있게 해 준다.", "en_hl": [], "ko_hl": ["정보에 근거한"], "ocr_flag": false, "verb": "allows", "valency": "S+V+O", "arity": "2·3가", "id": "24-5"}, {"type": "예문", "en": "The ultimate goal of these mentoring opportunities is to have individuals be more informed, identified, and engaged in their work and in their organization.", "ko": "이러한 멘토링 기회의 궁극적인 목표는 개인들이 자신의 일과 조직에 대해 더 많은 정보를 갖고, 더 많이 동일시되며, 더 많이 관여되게 하는 것이다.", "en_hl": ["be more informed,"], "ko_hl": ["많은 정보를 갖고,"], "ocr_flag": false, "verb": "is", "valency": "V+to R", "arity": "2가", "id": "24-6"}, {"type": "예문", "en": "Without these standards there would be no way to distinguish bad apples from merely uninformed apples.", "ko": "이러한 기준이 없다면 문제 직원들과 단지 정보가 부족한 직원들을 구별할 방법이 없을 lag": false, "verb": "uses", "valency": "S+V+O", "arity": "2가", "id": "26-3"}, {"type": "예문", "en": "So the bacteria inside your gut are actually manipulating you.", "ko": "따라서 여러분 소화관 내의 박테리아는 사실상 여러분을 조종하고 있다.", "en_hl": ["manipulating"], "ko_hl": ["있다."], "ocr_flag": false, "verb": "are", "valency": "V+R-ing", "arity": "2가", "id": "26-4"}, {"type": "예문", "en": "In such cases, it may be the manipulation of memories in individual minds that primes, frames, and sets the agenda, not the original news stories.", "ko": "그러한 경우에는, 의제를 준비하고, 구성하고, 정하는 것은 원래의 뉴스 기사가 아니라 개인의 머릿속 기억들의 조작일 수도 있다.", "en_hl": ["manipulation of memories"], "ko_hl": ["기억들의"], "ocr_flag": false, "verb": "be", "valency": "S+V+C", "arity": "2가", "id": "26-5"}], "phonetic_ipa": "məˈnɪpjəˌleɪt", "derived_words": [{"word": "manipulation", "senses": [{"pos": "n.", "meaning": "조종, 조작"}]}], "eng_defs": ["If you say that someone manipulates an event or situation, you disapprove of them because they use or control it for their own benefit, or cause it to develop in the way they want."], "extra_notes": ["manipulate (-) 흔히 교묘하고 부정직하게 사람ㆍ사물을 조종하여 자신의 이익을 취하려는 의미로 쓰인다."], "id": 26}, {"word": "option", "phonetic": "dapjen", "senses": [{"pos": "n.", "meaning": "선택, (7/719) 옵션, 선택 과목"}], "meaning": "n. 선택, (7/719) 옵션, 선택 과목", "page": 30, "line_start": 1150, "line_end": 1171, "examples": [{"type": "기본예문", "en": "There is obviously a considerable range of possible legal. technical and social options for managing the explosion of personal information.", "ko": "분명히 개인 정보의 폭발적 증가를 관리하기 위한 꽤 넓은 범위의 가능한 법률적이고. 기술적이며, 사회적인 선택들이 있다.", "en_hl": ["options"], "ko_hl": ["선택들"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "27-0"}, {"type": "예문", "en": "Fixed laws are optional for understanding evolution and the diversity of life.", "ko": "고정된 법칙은 진화와 생명체의 다양성을 이해하는데 필수적인 것은 아니다.", "en_hl": ["are optional"], "ko_hl": ["필수적인 것은 아니다."], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": " nd act, the individual submits to the authority of others in the form of public opinion.", "ko": "자신이 어떻게 생각하고 행동해야 하는지에 대하여 자신을 권위의 원천으로 기대지 않고, 개인은 여론이라는 형태로 타인의 권위에 복종한다.", "en_hl": ["submits", "the authority", "others"], "ko_hl": ["권위에"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "28-4"}], "phonetic_ipa": "səbˈmɪt", "derived_words": [], "eng_defs": ["If you submit to something, you unwillingly allow something to be done to you, or you do what someone wants, for example because you are not powerful enough to resist."], "extra_notes": ["submit? 기본적으로 (-)적 의미 혹은 상하관계의 의미가 강하다.", "submit A: AS 제출하다", "submit to A : 4에게 항복/굴복하다"], "id": 28}, {"word": "yield", "phonetic": "ji:\\d", "senses": [{"pos": "v.", "meaning": "d]                                  v. 산출하다, 생산하다"}, {"pos": "n.", "meaning": "수확량, 산출(물)"}], "meaning": "v. d]                                  v. 산출하다, 생산하다 / n. 수확량, 산출(물)", "page": 31, "line_start": 1213, "line_end": 1257, "examples": [{"type": "기본예문", "en": "Farmers and landowners develop reputations for honesty, fairness, producing high yields, and consistently demonstrating that they are good at what they do.", "ko": "농부와 지주는 정직함, 공정함, 높은 수확량을 생산하는 것. 그리고 자신이 하는 일에 능숙하다는 것을 일관되게 입증하는 것에 대한 평판을 쌓아 나간다.", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": "develop", "valency": "S+V+O", "arity": "1·2가", "id": "29-0"}, {"type": "예문", "en": "An intelligence test designed for 18-year—olds in 1930 would be expected to yield very different performance norms if administered today.", "ko": "1930년에 184] 사람들을 위해 고안된 지능 검사는 오늘날 시행되면 매우 다른 수행 규준들을 산출할 것으로 예상된다.", "en_hl": ["yield very different performance norms"], "ko_hl": ["매우 다른 수행", "산출할"], "ocr_flag": false, "verb": "be", "valency": "S+V", "arity": "2가", "id": "29-1"}, {"type": "예문", "en": "Words can yield a variety of interpretations.", "ko": "맡은 다양한 해석을 낳을 수 있다.", "en_hl": ["can yield", "variety", "interpretations."], "ko_hl": ["다양한 해석을 낳을 수 있다."], "ocr_flag": false, "verb": "yield", "valency": "S+V+O", "arity": "1·2가", "id": "29-2"}, {"type": "예문", "en": "A field of planted and weeded crops yields ten to one hundred times as much food — measured in calories — as the same area of naturally occurring plants, a benefit that would have been evident to early crop-planters.", "ko": "심고 잡초를 뽑아 재배되는 농작물로 이루어진 농경지는 자연적으로 생기는 식물로 이루어진 같은 크기의 면적보다, 열량으로 측정했을 때, S 배에 서 백 배 더 많은 식량을 산출하는데. 이는 초기 농작물 재배자에게 명백했을 이점이다.", "en_hl": ["yields ten", "one hundred times as much food —", "— as"], "ko_hl": ["많은", "산출하는데."], "ocr_flag": false, "verb": "weeded", "valency": "S+V+O", "arity": "2가", "id": "29-3"}, {"type": "예문", "en": "Feelings and thoughts are yielding increasingly to science in the twenty-first century.", "ko": "감정과 사고는 21세기 과학에 점점 더 굴복하고 있다.", "en_hl": ["yielding increasingly", "science"], "ko_hl": ["점점", "있다."], "ocr_flag": false, "verb": "yielding", "valency": "V+to R", "arity": "1·2가", "id": "29-4"}, {"type": "예문", "en": "The structures of our world and the conditions of certainty have yielded to an avalanche of change.", "ko": "우리 세계의 구조와 확실성의 조건이 많은 변화에 무너졌다.", "en_hl": ["have yielded", "an avalanche of change."], "ko_hl": ["많은", "무너"], "ocr_flag": false, "verb": "yielded", "valency": "S+V", "arity": "1·2가", "id": "29-5"}], "phonetic_ipa": "jild", "derived_words": [], "eng_defs": ["If you yield to someone or something, you stop resisting them."], "extra_notes": ["yield A: AS 산출/생산하다", "yield to A : 4에게 양보/항복/굴복하다"], "id": 29}, {"word": "fascinate", "phonetic": "fésanéit", "senses": [{"pos": "v.", "meaning": "유혹하다, 매혹하다, 마음을 빼앗다"}], "meaning": "v. 유혹하다, 매혹하다, 마음을 빼앗다", "page": 32, "line_start": 1257, "line_end": 1292, "examples": [{"type": "기본예문", "en": "In later years Bischof travelled to places such as Japan, Hong Kong, Indochina and Korea, where he was fascinated by children who, despite poverty and war, demonstrated remarkable resilience.", "ko": "이후에 Bischof는 일본, 홍콩, 인도차이나, 한국 같은 곳을 여행했는데, 그곳에서 그는 가난과 전쟁에도 불구하고 놀라운 회복력을 보여준 아이들에게 매료되었다.", "en_hl": ["was fascinated"], "ko_hl": ["매료되었다."], "ocr_flag": false, "verb": "travelled", "valency": "S+V", "arity": "1가", "id": "30-0"}, {"type": "예문", "en": "It is tempting to overlook an observation that does not fit into what you expected.", "ko": "당신이 기대했던 것에 들어맞지 않는 관찰을 간과하는 것은 솔깃한 일이다.", "en_hl": ["tempting"], "ko_hl": ["일이다."], "ocr_flag": false, "verb": "tempting", "valency": "V+to R", "arity": "2·3가", "id": "30-1"}, {"type": "예문", "en": "However, we all have to admit that the tug toward a self—centered life is strong, and this tempts us to hide selfish intentions by using the language of unselfishness.", "ko": "하지만 우리는 모두 자기중심적인 삶으로의 이끌림이 강하며, 이것이 이기적이지 않은 언어를 사용함으로써 이기적인 의도를 숨기도록 우리를 유혹 한다는 것을 인정해야 한다.", "en_hl": ["this tempts us", "hide selfish", "intentions"], "ko_hl": ["이것이", "이기적인 의도를 숨기도록 우리를 유혹"], "ocr_flag": false, "verb": "have", "valency": "V+to R", "arity": "2가", "id": "30-2"}, {"type": "예문", "en": "We are easily tempted to settle for quick “solutions,” in order to eliminate our anxiety and doubt, even though these quick fixes may not, in the long run, actually be adequate solutions.", "ko": "우리는 우리의 불안과 불확실성을 없애기 위해, 빠른 `해결책'을 쉽게 받아들이고 싶어지며, 이러한 빠른 해결법이 장기적으로는 실제로 적절한 해결 책이 아닐 수도 있음에도 불구하고 그렇게 한다.", "en_hl": ["easily tempted to settle"], "ko_hl": ["쉽게 받아들이고 싶어지며,"], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "30-3"}], "phonetic_ipa": "ˈfæsəˌneɪt", "derived_words": [{"word": "tempt", "senses": [{"pos": "v.", "meaning": "유혹하다, (관심을) 끌다"}]}], "eng_defs": ["If something fascinates you, it interests and delights you so much that your thoughts tend to concentrate on it.", "Something that tempts you attracts you and makes you want it, even though it may be wrong or harmful."], "extra_notes": [], "id": 30}, {"word": "develop", "phonetic": "divélap", "senses": [{"pos": "v.", "meaning": "개발하다"}], "meaning": "v. 개발하다", "page": 33, "line_start": 1292, "line_end": 1342, "examples": [{"type": "기본예문", "en": "An American airline was intent on developing the lake as a tourist destination for fishermen.", "ko": "한 미국 항공사가 그 호수를 낚시꾼들을 위한 관광지로 개발하는 것에 매우 관심을 보였다.", "en_hl": [], "ko_hl": ["개발하는"], "ocr_flag": false, "verb": "was", "valency": "S+V+C", "arity": "2가", "id": "31-0"}, {"type": "예문", "en": "the Moon's gravitational pull on the Earth allowed for life to develop 60666 00", "ko": "달이 지구에 미치는 중력 끌어당김이 생명이 성장하는 것을 가능하게 했다", "en_hl": ["develop 60666 00"], "ko_hl": ["성장하는"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "31-1"}, {"type": "예문", "en": "Treating children as though they are autonomous aids them in developing into genuinely autonomous persons.", "ko": "아이들이 자율적인 것처럼 그들을 대하는 것은 그들이 정말로 자율적인 사람으로 발전해 가는 데 도움을 준다.", "en_hl": ["aids them", "developing"], "ko_hl": ["발전해 가는", "도움을 준다."], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "31-2"}, {"type": "예문", "en": "Her son developed asthma when he was two.", "ko": "그녀의 아들은 두 살 때 천식이 생겼다.", "en_hl": ["developed asthma"], "ko_hl": ["천식이 생겼다."], "ocr_flag": false, "verb": "developed", "valency": "S+V", "arity": "1·2가", "id": "31-3"}, {"type": "예문", "en": "A crisis was rapidly developing in the Gulf.", "ko": "걸프 지역이 위기 상태로 급진전하고 있었다.", "en_hl": ["rapidly developing"], "ko_hl": ["급진전하고"], "ocr_flag": false, "verb": "was", "valency": "V+R-ing", "arity": "2가", "id": "31-4"}, {"type": "예문", "en": "Research on social development and the Internet indicates that, rather than leading children into social isolation and deprivation, the Internet can provide a positive environment for social development.", "ko": "사회성 발달과 인터넷에 관한 연구는 인터넷이 아이들을 사회적 고립과 박탈의 상태로 이끌기보다는, 사회성 발달에 '긍정적인' 환경을 제공해 S 수 있다는 것을 보여 준다.", "en_hl": ["social development"], "ko_hl": ["사회성"], "ocr_flag": false, "verb": "indicates", "valency": "V+that", "arity": "2가", "id": "31-5"}, {"type": "예문", "en": "While this transition took a century or more in developed countries, it is happening much faster in many developing countries.", "ko": "이러한 변화가 선진국에서는 한 세기 이상 걸렸던 반면, 많은 개발 도상국에서는 훨씬 빠르게 발생하고 있다.", "en_hl": ["developed countries,", "developing", "countries."], "ko_hl": ["선진국", "개발"], "ocr_flag": false, "verb": "happening", "valency": "S+V", "arity": "1가", "id": "31-6"}], "phonetic_ipa": "dɪˈvɛləp", "derived_words": [{"word": "development", "senses": [{"pos": "n.", "meaning": "개발, 발달"}]}], "eng_defs": ["When something develops, it grows or changes over a period of time.", "If a problem or difficulty develops, it begins to occur.", "a nonindustrialized poor country that is seeking to develop its resources by industrialization the Moon's gravitational pull on the Earth allowed for life to develop 60666 00"], "extra_notes": ["developO| 사람, 생명체와 쓰일 때 : 성장하다, 발달[발전]하다", "develop0| 부정적인 것들과 쓰일 때 : 발생하다, 생기다", "developed countries : 선진국", "developing countries : 개발 도상국(= poor countries)"], "id": 31}, {"word": "suspect", "phonetic": "saspékt", "senses": [{"pos": "v.", "meaning": "의심하다"}], "meaning": "v. 의심하다", "page": 34, "line_start": 1342, "line_end": 1407, "examples": [{"type": "기본예문", "en": "suspect that someone had been exerting undue influence 08", "ko": "누군가 부당한 영향력을 행사하고 있었다고 의심하다", "en_hl": ["suspect"], "ko_hl": ["의심하다"], "ocr_flag": false, "verb": "been", "valency": "V+R-ing", "arity": "2가", "id": "32-0"}, {"type": "예문", "en": "The results were clear, supporting what many researchers have long suspected.", "ko": "그 결과는 명확했으며, 이는 많은 연구자들이 오랫동안 짐작해 왔던 것을 뒷받침한다.", "en_hl": ["have long suspected."], "ko_hl": ["오랫동안", "왔던"], "ocr_flag": false, "verb": "were", "valency": "S+V+C", "arity": "2가", "id": "32-1"}, {"type": "예문", "en": "When people get old, they experience a decrease in the amount of light that passes through the eye. As you might suspect, this change is one reason why older adults do not see well in the dark.", "ko": "사람들은 나이를 먹어갈 때, 눈을 통과하는 빛의 양의 감소를 경험하게 된다. 여러분이 추측흠 + 있는 것처럼., 이 변화가 노인들이 1S 속에서 잘 보 지 못하는 한 가지 이유이다.", "en_hl": ["As you might", "suspect,"], "ko_hl": ["있는 것처럼.,"], "ocr_flag": false, "verb": "experience", "valency": "S+V+O", "arity": "2가", "id": "32-2"}, {"type": "예문", "en": "US researchers suspect that there are definite disadvantages to our powerful brain.", "ko": "미국의 연구자들은 우리의 강력한 두뇌에 분명한 불리한 점이 있지 않을까 하고 생각한다.", "en_hl": ["US researchers suspect"], "ko_hl": ["미국의 연구자들은", "생각한다."], "ocr_flag": false, "verb": "suspect", "valency": "V+that", "arity": "2가", "id": "32-3"}, {"type": "예문", "en": "Neuroscientists suspect that creativity is essentially about discovery rather than anything mystical.", "ko": "신경과학자들은 창의력은 본질적으로 신비스러운 것이 아니라 발견과 관련이 있을 수 있다고 생각한다.", "en_hl": ["Neuroscientists suspect"], "ko_hl": ["신경과학자 들은", "생각한"], "ocr_flag": false, "verb": "suspect", "valency": "V+that", "arity": "2가", "id": "32-4"}, {"type": "예문", "en": "But it is hard not to suspect that the main reason was that wood was just too ordinary, too plain, too common.", "ko": "그러나 주된 이유는 목재가 정말 너무 평범하고, 너무 수수하고, 너무 흔했다는 것이 아닐까 하고 생각하지 않기란 어려운 일이다.", "en_hl": ["hard not", "suspect"], "ko_hl": ["생각하지 않기란 어려운 일이다."], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "32-5"}, {"type": "예문", "en": "There can be no doubt that the development has been led by investment opportunity rather than community demand.", "ko": "그 개발이 지역 사회의 수요보다는 투자 기회에 의해 주도되었다는 것은 의심의 여지가 있을 수 없다.", "en_hl": ["There can be no doubt"], "ko_hl": ["의심의 여지가 있을", "없다."], "ocr_flag": false, "verb": "be", "valency": "S+V+C", "arity": "2가", "id": "32-6"}, {"type": "예문", "en": "So when group members need information, but cannot remember it themselves or doubt that their memories are accurate, they can turn to each other for help.", "ko": "따라서 집단의 구성원이 정보를 필요로 하지만, 스스로 기억할 + 없거나 자신의 기억이 정확하다는 것이 의심스러울 때, 그들은 서로에게 도움을 청 할 수 있다.", "en_hl": ["doubt that their memories are", "accurate,"], "ko_hl": ["스스로"], "ocr_flag": false, "verb": "need", "valency": "S+V+O", "arity": "2가", "id": "32-7"}, {"type": "예문", "en": "| doubt that anyone would disagree that our habits have a powerful hold on us.", "ko": "나는 우리의 습관이 우리에게 강력한 영향을 미친다는 이 사실에 누군가가 동의하지 않을 것이라는 것에 의문을 품는다.", "en_hl": ["doubt that"], "ko_hl": ["것에 의문을 품는다."], "ocr_flag": false, "verb": "disagree", "valency": "V+that", "arity": "1가", "id": "32-8"}, {"type": "예문", "en": "So particularly when issues are controversial or people are dug in, expressing a little doubt can actually be more persuasive.", "ko": "그래서 특히 문제가 논란이 되거나 사람들이 의견을 바꾸지 않을 때, 약간의 의구심을 드러내는 것이 실제로 더 설득력이 있을 수 있다.", "en_hl": ["expressing", "little doubt"], "ko_hl": ["드러내는"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "32-9"}], "phonetic_ipa": "ˈsəˌspɛkt", "derived_words": [], "eng_defs": ["You use suspect when you are stating something that you believe is probably true, in order to make it sound less strong or direct.", "If you doubt whether something is true or possible, you believe that it is probably not true or possible."], "extra_notes": ["suspect? doubt는 같은 해석이지만 전혀 다른 결론이 나온다!", "suspect : (일거라) 의심하다"], "id": 32}, {"word": "adopt", "phonetic": "adapt", "senses": [{"pos": "v.", "meaning": "입양하다, 쓰다[취하다], 채택하다"}], "meaning": "v. 입양하다, 쓰다[취하다], 채택하다", "page": 35, "line_start": 1407, "line_end": 1434, "examples": [{"type": "기본예문", "en": "Just after Christmas, the beagles were adopted as a pair by a loving family.", "ko": "크리스마스가 막 지나고, 이 비글들은 한 쌍으로 사랑스러운 가정에 입양되었다. o 결국 3000[의 본질은 기존에 없었던 새로운 것을 갖게 되는 것이다.", "en_hl": ["adopted"], "ko_hl": ["입양되었다.", "기존에 없었던 새로운 것을 갖게 되는"], "ocr_flag": false, "verb": "were", "valency": "S+V", "arity": "2가", "id": "33-0"}, {"type": "예문", "en": "Turkiye adopted the Roman alphabet.", "ko": "튀르키예는 로마자를 채택했다.", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": "adopted", "valency": "S+V+O", "arity": "2가", "id": "33-1"}, {"type": "예문", "en": "At one time technology forced some language speakers to adopt the dominant language of their community or nation.", "ko": "한때 기술은 일부 언어 사용자들이 자신이 속한 공동체나 국가의 지배적인 언어를 채택하도록 강요했다.", "en_hl": ["adopt the dominant"], "ko_hl": ["지배적인", "채택하도록"], "ocr_flag": false, "verb": "forced", "valency": "S+V+O", "arity": "3가", "id": "33-2"}, {"type": "예문", "en": "Consumers adopt values and beliefs that match the general requirements of the economy.", "ko": "소비자는 경제의 일반 요건에 부응하는 가치와 신념을 채택한다.", "en_hl": ["adopt values", "beliefs"], "ko_hl": ["신념을"], "ocr_flag": false, "verb": "adopt", "valency": "S+V+O", "arity": "2가", "id": "33-3"}, {"type": "예문", "en": "However, when we look at how social media is adopted by teens, it becomes clear that the Internet doesn't level inequality in any practical or widespread way.", "ko": "하지만. 우리가 십대들이 소셜 미디어를 어떻게 쓰는지 살펴보면, 인터넷이 어떤 실제적인 방식으로든 일반적인 방식으로든 불평등을 없애지 않는다 는 것이 명확해진다.", "en_hl": [], "ko_hl": ["십대들이 소셜 미디어를 어떻게 쓰는지"], "ocr_flag": false, "verb": "look", "valency": "V+전치사+O", "arity": "1·2가", "id": "33-4"}], "phonetic_ipa": "əˈdɑpt", "derived_words": [], "eng_defs": ["If you adopt a new attitude, plan, or way of behaving, you begin to have it."], "extra_notes": ["결국 3000[의 본질은 기존에 없었던 새로운 것을 갖게 되는 것이다."], "id": 33}, {"word": "adapt", "phonetic": "edépt", "senses": [{"pos": "v.", "meaning": "맞추대{조정하다], 적응하다"}], "meaning": "v. 맞추대{조정하다], 적응하다", "page": 35, "line_start": 1434, "line_end": 1519, "examples": [{"type": "기본예문", "en": "adapt to many of the effects of climate change", "ko": "기후 변화의 많은 영향에 적응하다", "en_hl": [], "ko_hl": ["적응하다"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "34-0"}, {"type": "예문", "en": "The sooner you start financial planning, the better prepared you'll be to adapt your plans to changing personal circumstances, such as changing or losing a job, relocating to a new state.", "ko": "여러분이 재정 계획을 일찍 시작할수록, 여러분의 직장을 바꾸거나 잃는 것. 새로운 주로 이사하는 것과 같은 변화하는 개인적 상황에 여러분의 계획 을 맞출 준비가 더 잘될 것이다.", "en_hl": ["adapt your plans"], "ko_hl": ["여러분의 계획", "맞출"], "ocr_flag": false, "verb": "start", "valency": "S+V+O", "arity": "1·2가", "id": "34-1"}, {"type": "예문", "en": "restored musical sensitivity by adapting to various octaves 609 060", "ko": "다양한 옥타브에 적응함으로써 음악적 감수성을 회복했다.", "en_hl": ["adapting to various octaves 609 060"], "ko_hl": ["다양한 옥타브에"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "34-2"}, {"type": "예문", "en": "Those species that require more time for reproduction will be slower to adapt to the stress because of the additional time needed for them to produce stress-tolerant offspring.", "ko": "번식에 더 많은 시간이 필요한 그러한 종은 스트레스에 적응하는 것이 더 느릴 것인데. 그들이 스트레스에 내성이 있는 자손을 생산하는 데 필요한 추가 시간 때문이다.", "en_hl": ["to adapt", "the stress"], "ko_hl": ["적응하는"], "ocr_flag": false, "verb": "require", "valency": "S+V+O", "arity": "2·3가", "id": "34-3"}, {"type": "예문", "en": "Adapting to a new and unfamiliar culture, then, is more than survival. It is a life-changing journey.", "ko": "새롭고 낮선 문화에 적응하는 것은., 그러니까, 생존 그 이상이다. 그것은 삶을 바꾸는 여정이다.", "en_hl": ["Adapting", "new and unfamiliar culture,"], "ko_hl": ["새롭고", "적응하는"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "34-4"}, {"type": "예문", "en": "how your brain adapts to a steady caffeine consumption 60900 0660", "ko": "당신의 뇌가 꾸준한 카페인 섭취에 어떻게 적응하는가", "en_hl": ["adapts", "steady caffeine consumption 60900 0660"], "ko_hl": ["꾸준한 카페인 섭취에", "적응하는가"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "34-5"}, {"type": "예문", "en": "Staying the course without adapting to bumps in the road will result in failure.", "ko": "장애물에 적응하지 않고 하던 일을 그대로 계속하는 것은. 실패를 초래할 것이다.", "en_hl": ["without adapting", "the road"], "ko_hl": ["적응하지 않고"], "ocr_flag": false, "verb": "result", "valency": "V+전치사+O", "arity": null, "id": "34-6"}, {"type": "예문", "en": "Each music has its own unique history, related to the history of its culture, to the way people adapt to their natural and social environment.", "ko": "각각의 음악은 그 문화의 역사와 사람들이 자신들의 자연 및 사회 환경에 적응하는 방식과 연관하여 그 자체의 고유한 역사를 가지고 있다.", "en_hl": ["adapt", "their natural", "and social environment."], "ko_hl": ["자연", "사회 환", "적응하는"], "ocr_flag": false, "verb": "has", "valency": "S+V+O", "arity": "2가", "id": "34-7"}, {"type": "예문", "en": "The synopsis receiving the most votes will be adapted into a screenplay!", "ko": "가장 많은 표를 받은 ANSAIAE 영화 대본으로 각색될 것입니대", "en_hl": ["adapted"], "ko_hl": ["각색될"], "ocr_flag": false, "verb": "be", "valency": "S+V", "arity": "2가", "id": "34-8"}, {"type": "예문", "en": "While this is true for adaptations in general, it is especially important for those written with young adults in mind.", "ko": "이것이 각색 작품 전반에 해당하긴 하지만. 청소년을 염두에 두고 쓰인 각색 작품에 특히 중요하다.", "en_hl": ["adaptations"], "ko_hl": ["각색 작품"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "34-9"}, {"type": "예문", "en": "This adaptability is essential for creative thought, as it allows individuals to approach problems from new angles, make novel associations, and think more differently.", "ko": "이 적응성은 창의적 사고에 필수적인더. 개인이 문제를 새로운 시각에서 접근하고, 새로운 연관성을 만들고, 더 다르게 생각하도록 하기 때문이다.", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "34-10"}], "phonetic_ipa": "əˈdæpt", "derived_words": [{"word": "adaptation", "senses": [{"pos": "n.", "meaning": "적응, 각색"}]}, {"word": "adaptability", "senses": [{"pos": "n.", "meaning": "적응성, 융통성"}]}], "eng_defs": ["If you adapt something, you change it to make it suitable for a new purpose or situation.", "If you adapt to a new situation or adapt yourself to it, you change your ideas or behaviour in order to deal with it successfully.", "to adjust means to change in order to work or do better in a new situation"], "extra_notes": ["A는 adapt2| 본질은 changeO|ct.", "adapt A: AS 적응시키다", "adapt to A: A@ 적응하다", "adapt? 다른 뜻 : \\. 각색하다", "adapt adjust 그 이미지가 같다. = adjust \\. 조정[조절]하다, 적응하다(= adapt) 033"], "id": 34}, {"word": "adjust", "phonetic": "adz/st", "senses": [{"pos": "v.", "meaning": "조정[조절]하다, 적응하다"}], "meaning": "v. 조정[조절]하다, 적응하다", "page": 37, "line_start": 1519, "line_end": 1558, "examples": [{"type": "기본예문", "en": "| adjust the microphone, trying to ignore the fact that hundreds of people are watching me.", "ko": "수백 명의 사람들이 나를 지켜보고 있다는 사실을 무시하려 애쓰며 나는 마이크를 조정한다.", "en_hl": ["adjust"], "ko_hl": ["조정한다"], "ocr_flag": false, "verb": "adjust", "valency": "S+V+O", "arity": "1·2가", "id": "35-0"}, {"type": "예문", "en": "Their habitual, hectic thinking won't allow them to adjust the superficial changes they make.", "ko": "그들의 습관적이고 정신없이 바쁜 사고방식은 그들이 만드는 피상적인 변화를 그들이 조정하도록 내버려 두지 않을 것이다.", "en_hl": ["to adjust"], "ko_hl": ["조정하도록"], "ocr_flag": false, "verb": "make", "valency": "S+V", "arity": "2·3가", "id": "35-1"}, {"type": "예문", "en": "Constant adjustment of focusing makes your eye muscles tired.", "ko": "초점을 계속해서 조정하는 것은 당신의 = 근육을 피곤하게 만든다.", "en_hl": ["adjustment", "focusing", "09030"], "ko_hl": ["초점을", "조정하는"], "ocr_flag": false, "verb": "makes", "valency": "S+V+O", "arity": "2·3가", "id": "35-2"}, {"type": "예문", "en": "If we are trying to understand something totally new, however, we need to make larger adjustments to the units of the patterns we already have, which requires changing the strengths of large numbers of connections in our brain, and this is a difficult, tiring process.", "ko": "그러나 완전히 새로운 것을 이해하려고 한다면, 우리는 이미 가지고 있는 패턴의 단위를 더 크게 조정해야 하는데, 이를 위해서는 우리 뇌의 수많은 연결 강도를 변경해야 하며, 이것은 어렵고 피곤한 과정이다.", "en_hl": ["make larger"], "ko_hl": ["크게 조정해야"], "ocr_flag": false, "verb": "need", "valency": "V+to R", "arity": "2가", "id": "35-3"}], "phonetic_ipa": "əˈʤəst", "derived_words": [{"word": "adjustment", "senses": [{"pos": "n.", "meaning": "조정, 적응"}]}], "eng_defs": ["to change (something) in a minor way so that it works better", "to change in order to work or do better in a new situation"], "extra_notes": ["영영사전을 통해 확실한 이미지를 잡자!", "결국 3030[와 유사한 이미지이다."], "id": 35}, {"word": "faith", "phonetic": "feid", "senses": [{"pos": "", "meaning": "믿음[신뢰] 신념"}], "meaning": "믿음[신뢰] 신념", "page": 37, "line_start": 1558, "line_end": 1580, "examples": [{"type": "기본예문", "en": "have faith in oneself rather than having faith in the world", "ko": "세상에 대한 믿음을 갖기보다는 자기 자신에 대한 믿음을 갖다", "en_hl": ["faith", "faith"], "ko_hl": ["믿음을"], "ocr_flag": false, "verb": "faith", "valency": "V+전치사+O", "arity": null, "id": "36-0"}, {"type": "예문", "en": "Therefore, the writer's task is to give us a faithfui picture of life.", "ko": "그러므로 작가가 해야 할 일은 우리에게 충실한 삶의 모습을 보여주는 것이다.", "en_hl": ["faithfui picture", "life."], "ko_hl": ["충실한"], "ocr_flag": false, "verb": "is", "valency": "V+to R", "arity": "2가", "id": "36-1"}, {"type": "예문", "en": "His translation manages to be faithful to the spirit of the original.", "ko": "그의 번역은 원작의 정신을 애써 충실히 지키고 있!", "en_hl": ["manages", "be faithful", "the spirit", "the original."], "ko_hl": ["원작의 정신을 애써 충실히 지키고"], "ocr_flag": false, "verb": "manages", "valency": "V+to R", "arity": "2가", "id": "36-2"}], "phonetic_ipa": "feɪθ", "derived_words": [{"word": "faithful", "senses": [{"pos": "adj.", "meaning": "충실한, 충직한, 신의 있는, 사실대로의, 원본에 충실한 (있는 그대로의)"}]}], "eng_defs": ["A faithful account, translation, or copy of something represents or reproduces the original accurately."], "extra_notes": [], "id": 36}, {"word": "bother", "phonetic": "badar", "senses": [{"pos": "v.", "meaning": "괴롭히다, 귀찮게 하다"}], "meaning": "v. 괴롭히다, 귀찮게 하다", "page": 38, "line_start": 1580, "line_end": 1618, "examples": [{"type": "기본예문", "en": "| don't want to bother her with my problems at the moment.", "ko": "내 문제 때문에 지금 그녀를 괴롭히고 싶지는 않아.", "en_hl": ["bother"], "ko_hl": ["괴롭히고"], "ocr_flag": false, "verb": "do", "valency": "S+V", "arity": "1·2가", "id": "37-0"}, {"type": "예문", "en": "ㅇ rm you do not bother to do something or if you do not bother with it, you do not do it, consider it, or use it because you think it is unnecessary or because you are too lazy. ray Most of us gravitate toward trying to prove our beliefs, to the extent that we bother investigating their validity at all.", "ko": "우리 대부분은 우리의 믿음을 입증하려고 노력하는 것에 자연히 끌리는데, 우리가 그것들의 타당성을 굳이 조사하려 해야만 (조사)하는 정도까지 그 러하다.", "en_hl": ["you do", "you think", "unnecessary", "ray", "bother investigating"], "ko_hl": ["굳이 조사하려 해야만"], "ocr_flag": false, "verb": "do", "valency": "S+V", "arity": "1·2가", "id": "37-1"}, {"type": "예문", "en": "The shop owner didn't bother that Josh understood anything.", "ko": "가게 주인은 Josh7t 이해했는지에 대해 신경 쓰지 않았다.", "en_hl": ["didn't bother"], "ko_hl": ["신경 쓰지 않았다."], "ocr_flag": false, "verb": "did", "valency": "S+V", "arity": "1·2가", "id": "37-2"}, {"type": "예문", "en": "These employees did not bother knowing the person who sent it.", "ko": "이 직원들은 그것을 보낸 사람을 알려고 하지 않았다.", "en_hl": ["did not bother knowing"], "ko_hl": ["알려고 하지 않았다."], "ocr_flag": false, "verb": "did", "valency": "S+V", "arity": "1·2가", "id": "37-3"}, {"type": "예문", "en": "With no appetite for stories lacking humans, many people simply can't be bothered with natural history.", "ko": "인간이 빠져 있는 이야기에 대한 흥미가 없어서. 많은 이들은 굳이 자연사에 개의치 않는다.", "en_hl": ["can't be bothered"], "ko_hl": ["개의치 않는다."], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "37-4"}, {"type": "예문", "en": "If it were only that, we would not bother engaging with it, and it would not occupy such a large part of our lives.", "ko": "만약 그것이 단지 그것뿐이라면. 우리는 굳이 그것에 몰두하려 하지 않을 것이고, 그것은 우리의 삶에 그렇게 2 부분을 차지하지 않을 것이다.", "en_hl": ["would not bother engaging"], "ko_hl": ["굳이", "몰두하려 하지 않을"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "37-5"}], "phonetic_ipa": "ˈbɑðər", "derived_words": [], "eng_defs": ["rm you do not bother to do something or if you do not bother with it, you do not do it, consider it, or use it because you think it is unnecessary or because you are too lazy."], "extra_notes": ["bother9| 다른 뜻 뜻 : v, 흔히 부정문이나 의문문에 쓰여 신경 쓰다, 애를 쓰다"], "id": 37}, {"word": "tolerate", "phonetic": "tdlaréit", "senses": [{"pos": "v.", "meaning": "참다, 용인하다"}], "meaning": "v. 참다, 용인하다", "page": 39, "line_start": 1618, "line_end": 1672, "examples": [{"type": "기본예문", "en": "Some children with hypersensitivities to smells can’t handle food if it is too pungent, while others may need stronger odors and tastes to help them tolerate certain food groups.", "ko": "냄새에 대해 과민증이 있는 어떤 아이들은 음식이 너무 자극적이면 그 음식에 대처할 + 없으며, 반면에 다른 아이들은 특정한 식품군을 참을 수 있게 도움 을 주도록 더 강한 냄새와 맛이 필요할 수도 있다.", "en_hl": ["tolerate"], "ko_hl": ["참을"], "ocr_flag": false, "verb": "’", "valency": "S+V", "arity": null, "id": "38-0"}, {"type": "예문", "en": "factors such as personal freedom, meaningful work, and social tolerance", "ko": "개인의 자유, 의미 있는 일. 그리고 사회적 관용과 같은 요소", "en_hl": ["social tolerance"], "ko_hl": ["사회적", "요소"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "38-1"}, {"type": "예문", "en": "Over millions of years the ecosystem has developed an amazing tolerance to errors and failures.", "ko": "수백 만 년 이상 동안 생태계는 실수와 잘못에 대한 놀라울 정도의 인내를 발휘해 왔다.", "en_hl": ["an amazing tolerance to errors and failures. BEY"], "ko_hl": ["실수와 잘못에 대한 놀라울 정도의"], "ocr_flag": false, "verb": "developed", "valency": "S+V+O", "arity": "1·2가", "id": "38-2"}, {"type": "예문", "en": "Heat and cold tolerance are greatest in individuals who grow up in the conditions of high heat or considerable cold, while persons who move to such conditions can acclimate after a few days without achieving the full tolerance capacity of the natives", "ko": "더위와 추위에 대한 내성은 심한 더위나 상당한 추위의 환경에서 성장하는 개인에게서 가장 크며, 반면에 그런 환경으로 이주하는 사람은 원주민의 완전한 내성 능력을 얻지 못한 채 며칠 후에 순응할 수 있다.", "en_hl": ["full tolerance", "capacity"], "ko_hl": ["완전한 내성"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "38-3"}, {"type": "예문", "en": "Those species that require more time for reproduction will be slower to adapt to the stress because of the additional time needed for them to produce stress—tolerant offspring.", "ko": "번식에 더 많은 시간이 필요한 그러한 종은 스트레스에 적응하는 것이 더 느릴 것인데, 그들이 스트레스에 내성이 있는 자손을 생산하는 데 필요한 추가 시간 때문이다.", "en_hl": ["stress—tolerant offspring. 60099"], "ko_hl": ["있는"], "ocr_flag": false, "verb": "require", "valency": "S+V+O", "arity": "2·3가", "id": "38-4"}, {"type": "예문", "en": "Racism is by definition ‘hatred or intolerance of another race or other races’.", "ko": "인종차별은 '특정한 인종이나 다른 인종들을 아주 싫어하거나 참을 + 없어 하는 것 으로 정의할 + 있다.", "en_hl": ["intolerance"], "ko_hl": ["참을", "없어 하는"], "ocr_flag": false, "verb": "is", "valency": "V+전치사+O", "arity": "2가", "id": "38-5"}, {"type": "예문", "en": "In the human world and in the dog world, as juveniles mature into wildhood and their puppy licenses are no longer valid, a tolerant world becomes irritated and intolerant.", "ko": "인간계와 개의 세계에서. 청소년들이 와일드후드(진화의 세월 동안 모든 종이 경험하는 유년기와 성인기 사이의 시기를 이르는 We 성장하고 그들 의 강아지 면허가 더 이상 유효하지 않을 때, 관대한 세계는 짜증스렵고 너그럽지 못하게 된다.", "en_hl": ["tolerant world becomes", "intolerant."], "ko_hl": ["관대한", "못하게 된다."], "ocr_flag": false, "verb": "mature", "valency": "V+전치사+O", "arity": "1가", "id": "38-6"}], "phonetic_ipa": "ˈtɑlərˌeɪt", "derived_words": [{"word": "tolerance", "senses": [{"pos": "n.", "meaning": "용인, 관용, 아랑, 내성"}]}, {"word": "tolerant", "senses": [{"pos": "adj.", "meaning": "관대한, 잘 견디는"}]}, {"word": "intolerant", "senses": [{"pos": "adj.", "meaning": "너그럽지 못한, 편협한, 못 먹는과민증이 있는"}]}], "eng_defs": ["If you tolerate a situation or person, you accept them although you do not particularly like them."], "extra_notes": ["tolerate를 22t4(sensitivity)o 측면으로 생각해 보자!"], "id": 38}, {"word": "exist", "phonetic": "igzist", "senses": [{"pos": "v.", "meaning": "존재하다"}], "meaning": "v. 존재하다", "page": 40, "line_start": 1672, "line_end": 1710, "examples": [{"type": "기본예문", "en": "Ideally (to some) there should exist ancient cultures for modern consumers to gaze at, or even step into for a while, while travelling or on holiday.", "ko": "이상적으로 말하면 (일부에게는) 요즘의 소비자들이 여행하면서 혹은 휴일에 쳐다보거나 혹은 심지어 잠시라도 들어가 S + 있는 고대 문화가 존재해야", "en_hl": ["exist"], "ko_hl": ["존재해야"], "ocr_flag": false, "verb": "exist", "valency": "S+V+O", "arity": "1가", "id": "39-0"}, {"type": "예문", "en": "Though eliminating waste minimizes the need for new products, it certainly increases the need to service existing products.", " ance society's awareness of such problems by providing people with a wider truth than their existing prejudices.", "ko": "사람들에게 그들의 기존의 편견보다 더 폭넓은 진실을 제공하여 그런 문제에 대한 사회의 인식을 진전시키는 데 도움을 주는 것이 기자가 해야 하는 의무의 일부이다.", "en_hl": ["existing prejudices."], "ko_hl": ["기존의"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "39-8"}], "phonetic_ipa": "ɪgˈzɪst", "derived_words": [], "eng_defs": [], "extra_notes": ["existing A: 기존의 A 헤트 Ｌ"], "id": 39}, {"word": "irony", "phonetic": "diarani", "senses": [{"pos": "", "meaning": "아이러니, 역설적인 점[상황], 반어법"}], "meaning": "아이러니, 역설적인 점[상황], 반어법", "page": 40, "line_start": 1710, "line_end": 1735, "examples": [{"type": "기본예문", "en": "The irony is that when he finally got the job, he discovered he didn't like it.", "ko": "역설적인 것은 그가 마침내 취직을 했는데 그 직장이 마음에 안 든다는 것을 알게 된 점이었다.", "en_hl": ["irony"], "ko_hl": ["역설적인"], "ocr_flag": false, "verb": "is", "valency": "V+that", "arity": "2가", "id": "40-0"}, {"type": "예문", "en": "Ironically, the convenience of downloading digital creations restrains people's creativity.", "ko": "역설적이게도, 디지털 창작물을 다운로드하는 편리함이 사람들의 창의성을 억제한다.", "en_hl": ["Ironically,"], "ko_hl": ["역설적이게도,"], "ocr_flag": false, "verb": "restrains", "valency": "S+V+O", "arity": "2가", "id": "40-1"}, {"type": "예문", "en": "Ironically, inflammation is the life-saving component of your immune system that helps fight off bacteria, viruses, and other foreign invaders.", "ko": "반어적으로, 염증은 박테리아, 바이러스, 그리고 다른 외부 침입자와 싸워 물리치는 것을 도와주는 우리의 면역 체계의 생명 구조 요소이다.", "en_hl": ["Ironically, inflammation", "the life-saving component", "your immune system"], "ko_hl": ["염증은", "우리의 면역", "생명 구조"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "40-2"}], "phonetic_ipa": "ˈaɪrəni", "derived_words": [], "eng_defs": ["If you talk about the irony of a situation, you mean that it is odd or amusing because it involves a contrast."], "extra_notes": ["(+) > (-) or (-) > (+)"], "id": 40}, {"word": "paradox", "phonetic": "pzradaks", "senses": [{"pos": "n.", "meaning": "역설적인 사람[것/상황] 역설, 패러독스"}], "meaning": "n. 역설적인 사람[것/상황] 역설, 패러독스", "page": 41, "line_start": 1735, "line_end": 1770, "examples": [{"type": "기본예문", "en": "There is a paradox surrounding our food choice habits.", "ko": "우리의 음식 선택 습관을 둘러싼 역설이 있다.", "en_hl": ["paradox"], "ko_hl": ["역설이"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "41-0"}, {"type": "예문", "en": "There's no escape from the mapmaking paradox: to present a useful and truthful picture, an accurate map must tell white lie.", "ko": "지도 제작의 역설을 피할 수는 없다: 유용하고 올바른 그림을 제시하기 위해서 정확한 지도는 반드시 하앤선의의) 거짓말을 해야 하는 것이다.", "en_hl": ["mapmaking", "useful and truthful picture,", "white", "HEY"], "ko_hl": ["지도 제작의", "유용하고 올바른", "앤선의의)"], "ocr_flag": false, "verb": "'s", "valency": "S+V+O", "arity": null, "id": "41-1"}, {"type": "예문", "en": "The paradox of modern life is that while technological acceleration — in transportation, communication, and production — should provide more free time, those same inventions increase our options at an exponential rate.", "ko": "현대의 삶의 역설은 운송,, 통신, 그리고 생산에서 기술적 가속이 '더 많은 자유 시간을 제공해야 함에도 불구하고, 그 똑같은 발명품들이 기하급수적 인 속도로 우리가 선택할 수 있는 것을 늘린다는 것이다.", "en_hl": ["paradox of modern life", "more free time,", "increase our options"], "ko_hl": ["선택할", "있는 것을"], "ocr_flag": false, "verb": "is", "valency": "V+that", "arity": "2가", "id": "41-2"}, {"type": "예문", "en": "A paradox of human culture is that many of the technological and biomedical breakthroughs that revolutionized how and how long we live have been strongly opposed at their inception.", "ko": "인간 문화의 역설은 우리가 어떻게 살고 얼마나 오래 사는지를 근본적으로 바꾼 기술 및 의생명의 획기적 발전 중 다수가 그 초기에는 반대가 심했다 는 것이다.", "en_hl": ["paradox", "human culture", "technological and", "breakthroughs", "have been strongly opposed"], "ko_hl": ["인간 문화의", "기술", "의생명의 획기적 발전", "반대가 심했다"], "ocr_flag": false, "verb": "is", "valency": "V+that", "arity": "2가", "id": "41-3"}], "phonetic_ipa": "ˈpɛrəˌdɑks", "derived_words": ": false, "verb": "turned", "valency": "S+V", "arity": "1·2가", "id": "42-8"}, {"type": "예문", "en": "It challenges the assumption that language can be precisely used to represent reality.", "ko": "그것은 언어가 현실을 나타내는 데 정확하게 사용될 + 있다는 가정에 이의를 제기한다.", "en_hl": ["assumption"], "ko_hl": ["가정"], "ocr_flag": false, "verb": "challenges", "valency": "S+V+O", "arity": "2가", "id": "42-9"}], "phonetic_ipa": "əˈsum", "derived_words": [{"word": "assumption", "senses": [{"pos": "n.", "meaning": "가정, 가설, 인수"}]}], "eng_defs": ["If you assume that something is true, you imagine that it is true, sometimes wrongly.", "If something assumes a particular quality, it begins to have that quality."], "extra_notes": ["assume + 5 + \\ : (사실이 아닐 수도 있는 것을 사실이라) 가정하다", "assume + 명사 : ~S 취하다, 가지다"], "id": 42}, {"word": "compromise", "phonetic": "kampramaiz", "senses": [{"pos": "n.", "meaning": "타협[절충]"}, {"pos": "v.", "meaning": "타협하다"}], "meaning": "n. 타협[절충] / v. 타협하다", "page": 43, "line_start": 1840, "line_end": 1892, "examples": [{"type": "기본예문", "en": "Each of us is willing to compromise as we consider the different perspectives of the other and realize that both of us can be right.", "ko": "우리 각자는 서로의 다른 관점을 고려하면서 기꺼이 타협할 수 있고, 둘 다 옮을 + 있다는 것을 깨달았다.", "en_hl": ["HEY"], "ko_hl": ["타협할"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "43-0"}, {"type": "예문", "en": "The loss philosophy fears is a loss of meaning, the compromising of a truth.", "ko": "철학이 두려워하는 손실은 의미의 손실, 즉 진리의 훼손이다.", "en_hl": ["compromising"], "ko_hl": [], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "43-1"}, {"type": "예문", "en": "Personal needs and preferences are often compromised to build, maintain or repair relationships.", "ko": "개인적 요구와 선호도는 흔히 관계를 형성, 유지 또는 회복하기 위해 양보된다.", "en_hl": ["compromised"], "ko_hl": ["양보된다."], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "43-2"}, {"type": "예문", "en": "In a blend, pure black and pure white are diluted when combined into gray. They both compromise their identity; gray is not black and it is not white.", "ko": "혼색에서는 아무것도 섞이지 않은 검은색과 아무것도 섞이지 않은 흰색이 배합되어 회색이 될 때 희석된다. 그 색들은 둘 다 자기 정체성을 잃는데, 회색은 검은색도 아니고 흰색도 아니다.", "en_hl": ["They both", "their identity;"], "ko_hl": ["자기 정체성을"], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "43-3"}, {"type": "예문", "en": "Defeat at this stage would compromise their chances of reaching the finals of the competition.", "ko": "이 단계에서 지면 그들의 대회 결승전 진출 가능성이 위태로워질 + 있다.", "en_hl": ["compromise their chances"], "ko_hl": ["능성이 위태로워질", "있다."], "ocr_flag": false, "verb": "compromise", "valency": "S+V+O", "arity": "1·2가", "id": "43-4"}, {"type": "예문", "en": "Meanings in music are negotiated depending on contexts.", "ko": "음악의 의미는 맥락에 따라 협상된다.", "en_hl": ["are negotiated depending on contexts."], "ko_hl": ["맥락에 따라 협상된다."], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "43-5"}, {"type": "예문", "en": "the negotiator’s behavioural disposition and negotiating tactics 0", "ko": "협상가의 행동적 기질과 협상 전략", "en_hl": ["negotiating tactics 0"], "ko_hl": ["협상 전략"], "ocr_flag": false, "verb": "s", "valency": "S+V+O", "arity": null, "id": "43-6"}, {"type": "예문", "en": "The time to negotiate is before you have eliminated your other options,", "ko": "협상할 시기는 여러분이 여러분의 다른 선택을 없애기 전이다.", "en_hl": ["The time", "negotiate"], "ko_hl": ["협상할"], "ocr_flag": false, "verb": "is", "valency": "V+전치사+O", "arity": "2가", "id": "43-7"}], "phonetic_ipa": "ˈkɑmprəˌmaɪz", "derived_words": [{"word": "negotiate", "senses": [{"pos": "v.", "meaning": "협상[교섭]하다, 합의하다"}]}], "eng_defs": ["A compromise is a situation in which people accept something slightly different from what they really want, because of circumstances or because they are considering the wishes of other people.", "If someone compromises themselves or compromises their beliefs, they do something which damages their reputation for honesty, loyalty, or high moral principles."], "extra_notes": [], "id": 43}, {"word": "biology", "phonetic": "baidladzi", "senses": [{"pos": "n.", "meaning": "생물학, 생명 작용[활동]"}], "meaning": "n. 생물학, 생명 작용[활동]", "page": 44, "line_start": 1892, "line_end": 1966, "examples": [{"type": "기본예문", "en": "Our beliefs about food affect not only the choices we make, but also our biology.", "ko": "음식에 대한 우리의 믿음은 우리가 하는 선택뿐만 아니라. 우리의 '생명 활동'에도 영향을 미친다.", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": "make", "valency": "S+V", "arity": "2·3가", "id": "44-0"}, {"type": "예문", "en": "To some degree, biology is destiny when it comes to communication style.", "ko": "어느 정도는 의사소통 스타일에 관한 한 생물학은 숙명이다[유전적인 특질이 결정한다]", "en_hl": ["biology", "destiny"], "ko_hl": ["생물학은"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "44-1"}, {"type": "예문", "en": "By the second year of life, all infants begin noticing and imitating what others do.", "ko": "생애 두 번째 해에 이를 즈음 모든 아기들은 남들이 하는 것을 알아채고 모방하기 시작한다.", "en_hl": ["all infants begin noticing and imitating"], "ko_hl": ["모든 아기들은"], "ocr_flag": false, "verb": "begin", "valency": "V+R-ing", "arity": "1·2가", "id": "44-2"}, {"type": "예문", "en": "Each human infant must assemble a gut microbiome — and mom provides the start.", "ko": "모든 인간 아기는 각자 소화관 내의 미생물 생태계를 갖추어야 하는데 엄마가 그 시작점을 제공한다.", "en_hl": ["infant", "mom provides the start."], "ko_hl": ["엄마가", "시작점을", "공한다."], "ocr_flag": false, "verb": "assemble", "valency": "S+V+O", "arity": "1·2가", "id": "44-3"}, {"type": "예문", "en": "Michael Tomasello showed in a 2007 study that chimpanzees, gorillas, and bonobos — our nearest cousins — follow the direction of each other's heads, whereas human infants follow the direction of each other's eyes.", "ko": "Michael Tomasello= 한 2007년의 연구에서 우리의 가장 가까운 사촌들인 침팬지, 고릴라. 그리고 보노보는 서로의 '머리' 방향을 따라가는데, 반 면 인간 유아들은 서로의 눈' 방향을 따라간다는 것을 증명했다.", "en_hl": ["human infants"], "ko_hl": ["인간 유아"], "ocr_flag": false, "verb": "showed", "valency": "V+전치사+O", "arity": "2·3가", "id": "44-4"}, {"type": "예문", "en": "We have an inborn ability to extract the rules of morality from the settings in which we live.", "ko": "우리는 우리가 사는 환경에서 도덕성의 규칙을 추출하는 타고난 능력을 가지고 있다.", "en_hl": ["inborn"], "ko_hl": ["타고난"], "ocr_flag": false, "verb": "have", "valency": "S+V+O", "arity": "2가", "id": "44-5"}, {"type": "예문", "en": "Just as we attach the word gravity to our intuitive understanding about how objects move through space, we simply attach words to each of these innate and universal emotions once those words become available.", "ko": "물체가 공간을 통해 움직이는 방식에 대한 우리의 직관적인 이해에 중력이라는 단어를 붙이는 것과 마찬가지로. 우리는 일단 그러한 단어들을 사용할 수 있게 되면 이러한 선천적이고 보편적인 각각의 감정에 간단하게 그 단어를 붙인다.", "en_hl": ["innate"], "ko_hl": ["선천적이고"], "ocr_flag": false, "verb": "attach", "valency": "S+V+O", "arity": "2가", "id": "44-6"}, {"type": "예문", "en": "one’s innate ability precedes mastery 6000", "ko": "사람의 타고난 능력이 숙련보다 앞선다", "en_hl": ["innate ability", "6000"], "ko_hl": ["타고난"], "ocr_flag": false, "verb": "precedes", "valency": "S+V+O", "arity": "2가", "id": "44-7"}, {"type": "예문", "en": "Not only are the six basic emotions universal, they are also instinctual and innate biological responses over which we have little conscious control.", "ko": "여섯 가지 기본적인 감정은 보편적일 뿐만 아니라 우리가 의식적으로 거의 통제할 수 없는 본능적이고 선천적인 생물학적 반응이다.", "en_hl": ["innate biological responses"], "ko_hl": ["선천"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "44-8"}, {"type": "예문", "en": "People’s experiences of interacting with strangers are likely changing our genes.", "ko": "사람들이 낮선 이들과 상호 작용하는 경험이 아마 우리의 유전자를 바꾸고 있을 것이다.", "en_hl": ["are likely", "our", "BEY"], "ko_hl": ["아마 우리", "유전", "바꾸고 있을"], "ocr_flag": false, "verb": "’", "valency": "S+V+O", "arity": null, "id": "44-9"}, {"type": "예문", "en": "But any suggestion that the child's mathematical deficiency might have a genetic origin is likely to be greeted with something approaching despair: if it is in the genes, ‘it is written’, it is ‘determined’ and nothing can be done about it.", "ko": "하지만 그 아이의 수학적 결함에 유전적 원인이 있을 수 있다는 의견은 어떤 것이라도 절망에 근접한 어떤 것과 함께 받아들여질 가능성이 높은데, 그것이 유전자에 있는 것이라면, “손실은 새겨져 있고 그것은 '결정되어' 있으며, 그것에 대해 아무것도 할 수 있는 것이 없다.", "en_hl": ["genetic origin", "the genes,", "‘determined’", "nothing can be done about"], "ko_hl": ["유전적", "유전자", "있는", "그것에 대해 아무것도", "수 있는 것이 없다."], "ocr_flag": false, "verb": "have", "valency": "S+V+O", "arity": "2가", "id": "44-10"}, {"type": "예문", "en": "Without the context provided by cells, organisms, social groups, and culture, DNA is inert. Anyone who says that people are “genetically programmed” to be moral has an oversimplified view of how genes work.", "ko": "세포, 유기체, 사회 집단, 문화에 의해 제공되는 환경이 없으면, ㅁ0444는 비활성 상태이다. 사람들은 도덕적이 되도록 '유전적으로 프로그램이 되어 있다고 말하는 사람은 어느 누구든 유전자가 작동하는 방식에 대해 지나치게 단순화된 견해를 가지고 있는 것이다.", "en_hl": ["are “genetically programmed”"], "ko_hl": ["'유전적으로", "되어"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "44-11"}, {"type": "예문", "en": "Cultural storage and transmission require humans to accomplish the work of storing knowledge and passing it on to the next generation by means other than DNA.", "ko": "문화의 저장과 전달은 인간이 기 바세 이외의 방법으로 지식을 저장하고 그것을 다음 세대에게 전달하는 일을 완수할 것을 요구한다.", "en_hl": ["means other than DNA."], "ko_hl": ["기 바세 이외의"], "ocr_flag": false, "verb": "require", "valency": "S+V+O", "arity": "2·3가", "id": "44-12"}, {"type": "예문", "en": "Some distinctions between good and bad are hardwired into our biology.", "ko": "좋음과 일을 사이의 몇 가지 구별은 우리의 생명 활동 안에 고정되어 있다.", "en_hl": ["are hardwired into our biology."], "ko_hl": ["생명 활동 안에 고정되어 있다."], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "44-13"}], "phonetic_ipa": "baɪˈɑləʤi", "derived_words": [], "eng_defs": [], "extra_notes": ["상징적 의미로서의 biology는 타고남, 내재됨, 유전적의 의미를 지니기도 한다.", "타고남, 내재됨을 상징하는 단어 : biology, infant, inborn, innate, gene, genetic, 매, hardwire"], "id": 44}, {"word": "exclusive", "phonetic": "iksklu:siv", "senses": [{"pos": "adj.", "meaning": "배타적인, 독점적인"}], "meaning": "adj. 배타적인, 독점적인", "page": 45, "line_start": 1966, "line_end": 2025, "examples": [{"type": "기본예문", "en": "The two negotiators’ claims on the oranges were assumed to be mutually exclusive.", "ko": "오렌지에 대한 두 협상가의 요구는 상호 배타적인 것으로 가정되었다.", "en_hl": [], "ko_hl": ["배타적인"], "ocr_flag": false, "verb": "’", "valency": "S+V+O", "arity": null, "id": "45-0"}, {"type": "예문", "en": "To thank you for your loyalty, we are thrilled to offer you an exclusive promotion!", "ko": "여러분의 충심에 대해 감사드리고자, 저희가 여러분에게 독점 판촉 상품을 제공하게 되어 매우 기뽑니대!", "en_hl": ["an exclusive promotion!"], "ko_hl": ["독점 판촉"], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "45-1"}, {"type": "예문", "en": "exclusive access to shop a day early", "ko": "하루 일찍 쇼핑할 + 있는 독점적인 접근권", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "45-2"}, {"type": "예문", "en": "His mother has told ‘The Times’ about his death in an exclusive interview.", "ko": "그의 어머니가 '타임스'와의 독점 인터뷰에서 그의 죽음에 대해 말했다.", "en_hl": ["an exclusive interview."], "ko_hl": ["독점"], "ocr_flag": false, "verb": "told", "valency": "S+V", "arity": "2·3가", "id": "45-3"}, {"type": "예문", "en": "While it has been found that young children rely exclusively on geometric information to determine the location of an object hidden in a small enclosure, exclusive use of geometry does not occur in larger spaces.", "ko": "어린아이들은 작은 에워싸인 장소에 숨겨진 물체의 위치를 파악하는 데 오로지 기하학적 정보에만 의존하는 것으로 밝혀졌지만, 더 2 공간에서는 기 하학의 단독 사용이 일어나지 않는다.", "en_hl": [], "ko_hl": ["오로지"], "ocr_flag": false, "verb": "does", "valency": "S+V", "arity": "1·2가", "id": "45-4"}, {"type": "예문", "en": "From the 8th to the 12th century CE, while Europe suffered the perhaps overdramatically named Dark Ages, science on planet Earth could be found almost ® exclusively in the Islamic world.", "ko": "서기 8세기부터 12세기까지 유렵이 아마도 지나치게 극적인 이름이 붙여진 '암흑시대'를 겪고 있던 시기에. 지구상의 과학은 거의 오로지 이슬람 세계에서만 발견될 수 있었다.", "en_hl": ["exclusively"], "ko_hl": ["오로지"], "ocr_flag": false, "verb": "suffered", "valency": "S+V+O", "arity": "1·2가", "id": "45-5"}, {"type": "예문", "en": "Its research and development activities are directed almost exclusively at these affluent nations.", "ko": "그것의 연구 개발 활동이 거의 전적으로 이러한 부유한 국가들을 겨냥하고 있다.", "en_hl": ["almost exclusively"], "ko_hl": ["거의 전적으로"], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "45-6"}, {"type": "예문", "en": "In both cases the focus is exclusively on the object.", "ko": "두 경우 모두 초점은 오로지 그 물체에 있다.", "en_hl": ["exclusively"], "ko_hl": ["오로지 그"], "ocr_flag": false, "verb": "is", "valency": "V+전치사+O", "arity": "2가", "id": "45-7"}, {"type": "예문", "en": "This is the true moral position, not the one emerging exclusively from self-interest.", "ko": "오로지 사욕에서 나오는 것이 아닌, 바로 이것이 진정한 도덕적 입장이다.", "en_hl": ["exclusively"], "ko_hl": ["오로지"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "45-8"}, {"type": "예문", "en": "focus exclusively on figures we admire BUZEIE UE", "ko": "우리가 존경하는 인물들에만 집중할", "en_hl": ["exclusively on figures", "BUZEIEUE"], "ko_hl": ["에만"], "ocr_flag": false, "verb": "admire", "valency": "S+V+O", "arity": "2가", "id": "45-9"}], "phonetic_ipa": "ɪkˈsklusɪv", "derived_words": [{"word": "exclusively", "senses": [{"pos": "adv.", "meaning": "배타적으로, 독점적으로, 오로지 > exclusively는 only? 의미를 담고 있다."}]}], "eng_defs": ["Something that is exclusive is used or owned by only one person or group, and not shared with anyone else.", "Exclusively is used to refer to situations or activities that involve only the thing or things mentioned, and nothing else."], "extra_notes": ["| exclusively love you, : 나는 너를 배타적으로 사랑한다. (x) = 너만 사랑해. (ㅇ)", "Exclusive 다 : 배타적 보도 (x) = 독점 보도 (0)"], "id": 45}, {"word": "prescribe", "phonetic": "priskraib", "senses": [{"pos": "v.", "meaning": "처방을 내리다, 처방하다, 처방전을 쓰다"}], "meaning": "v. 처방을 내리다, 처방하다, 처방전을 쓰다", "page": 46, "line_start": 2025, "line_end": 2064, "examples": [{"type": "기본예문", "en": "prescribe medicine for a patient", "ko": "환자에게 약을 처방하다", "en_hl": ["prescribe"], "ko_hl": ["처방하다"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "46-0"}, {"type": "예문", "en": "People with a strong sense of self-efficacy, therefore, may be more willing to step outside the culturally prescribed behaviors.", "ko": "그러므로 강한 자기 효능감을 가진 사람들은 문화적으로 규정된 행동 밖으로 더 기꺼이 발을 디디려 할 수도 있다.", "en_hl": ["the culturally prescribed", "behaviors."], "ko_hl": ["문화적으로 규정된 행동"], "ocr_flag": false, "verb": "be", "valency": "S+V+C", "arity": "2가", "id": "46-1"}, {"type": "예문", "en": "In general, people accept and deal with the set consequences of their actions prescribed by their surroundings.", "ko": "일반적으로 사람들은 자신의 환경에 의해 규정된 자기 행동의 정해진 결과를 받아들이고 처리한다.", "en_hl": ["prescribed by their"], "ko_hl": ["자신의 환경에 의해 규정된"], "ocr_flag": false, "verb": "accept", "valency": "S+V", "arity": "2가", "id": "46-2"}, {"type": "예문", "en": "In the study, students were asked to express a traumatic experience using bodily movement, to express an experience using movement and then write about it, or to exercise in a prescribed manner for three days, ten minutes per day.", "ko": "이 연구에서, 학생들은 신체 움직임을 이용하여 충격적 경험을 표현하거나, 움직임을 이용하여 경험을 표현하고 그 뒤에 그것에 대해 글을 쓰거나. | 는 하루에 10분씩 3일간 정해진 방법대로 운동을 하도록 요구받았다.", "en_hl": ["prescribed manner"], "ko_hl": ["정해진 방법대로"], "ocr_flag": false, "verb": "were", "valency": "S+V", "arity": "2가", "id": "46-3"}, {"type": "예문", "en": "It is therefore essential that students learn to think through ethical issues rather than follow a prescribed set of ethical codes or rules.", "ko": "따라서 학생들은 규정된 일련의 윤리 규범이나 규칙을 따르는 것보다는 윤리적 문제를 충분히 생각하는 발을 배우는 것이 필수적이다.", "en_hl": ["prescribed"], "ko_hl": ["규정된"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "46-4"}], "phonetic_ipa": "prəˈskraɪb", "derived_words": [], "eng_defs": ["If a person or set of laws or rules prescribes an action or duty, they state that it must be carried out."], "extra_notes": ["prescribe2| 다른 뜻 : \\. 규정하다, 지시하다, 명령하다"], "id": 46}, {"word": "presume", "phonetic": "prizi:m", "senses": [{"pos": "", "meaning": "추정하대[여기다/생각하다]"}], "meaning": "추정하대[여기다/생각하다]", "page": 47, "line_start": 2064, "line_end": 2087, "examples": [{"type": "기본예문", "en": "| presume they're not coming, since they haven't replied to the invitation.", "ko": "내가      }|기에, 초대에 답을 하지 않은 걸로 보아 그들은 오지 않을 것이다.", "en_hl": ["presume"], "ko_hl": [], "ocr_flag": false, "verb": "'re", "valency": "V+R-ing", "arity": null, "id": "47-0"}, {"type": "예문", "en": "Darwin's theories of evolution presume that individuals should act to preserve their own interests, not those of the species as a whole.", "ko": "다윈의 진화론은 개개인이 전체로서의 종족의 이익이 아닌, 자기 자신의 이익을 보호하기 위해 행동한다고 가정한다.", "en_hl": ["Darwin's theories", "evolution presume"], "ko_hl": ["다윈의", "가정한다."], "ocr_flag": false, "verb": "act", "valency": "V+to R", "arity": null, "id": "47-1"}, {"type": "예문", "en": "Based on our biases in Western culture, we generally presume that all actions have an antecedent cause.", "ko": "서양 문화 속에서 우리가 갖고 있는 편견에 근거하여 우리는 일반적으로 모든 행위에는 선행하는 원인이 있다고 추정한다.", "en_hl": ["we generally presume"], "ko_hl": ["우리는 일반적으로", "추정한다."], "ocr_flag": false, "verb": "presume", "valency": "V+that", "arity": "2가", "id": "47-2"}], "phonetic_ipa": "prɪˈzum", "derived_words": [], "eng_defs": ["If you presume that something is the case, you think that it is the case, although you are not certain."], "extra_notes": ["presume 숨은 뜻 : \\. (실질적인 증거는 없지만 사실일 것이라고) 추정하다여기다/생각하다"], "id": 47}, {"word": "mere", "phonetic": "miar", "senses": [{"pos": "adj.", "meaning": "그저, 겨우 ~의, 단지 ~에 불과한"}], "meaning": "adj. 그저, 겨우 ~의, 단지 ~에 불과한", "page": 47, "line_start": 2087, "line_end": 2146, "examples": [{"type": "기본예문", "en": "It took her a mere 20 minutes to win.", "ko": "그녀가 이기는 데는 겨우 20분밖에 안 걸렸다.", "en_hl": ["mere"], "ko_hl": ["겨우"], "ocr_flag": false, "verb": "took", "valency": "S+V+O", "arity": "2가", "id": "48-0"}, {"type": "예문", "en": "His mere presence made her feel afraid.", "ko": but rather a sort of dirty grey.", "ko": "그 벽들은 흰색이 아니었다. 차라리 일종의 지저분한 회색이었다.", "en_hl": ["rather"], "ko_hl": ["차라리"], "ocr_flag": false, "verb": "were", "valency": "S+V+C", "arity": "2가", "id": "69-1"}, {"type": "예문", "en": "To give an example ‘when | am melancholic it is not just that | feel as though the world is grey. Rather, when | am melancholic the world is grey.’", "ko": "예를 들어 '내가 우울할 때 단순히 내가 세상이 회색인 것처럼 느끼는 것이 아니다. 오히려. 내가 우울할 때 세상은 회색이다.'", "en_hl": ["Rather,"], "ko_hl": ["아니다. 오히려."], "ocr_flag": false, "verb": "am", "valency": "S+V+O", "arity": "2가", "id": "69-2"}, {"type": "예문", "en": "While this definition is widely used in research, an important aspect of creativity is often ignored: Generating creative ideas rarely is the final goal. Rather, to successfully solve problems or innovate requires one or a few good ideas that really work, and work better than previous approaches.", "ko": "이러한 정의가 연구에서 널리 사용되지만. 창의성의 중요한 측면이 흔히 간과되는데, 창의적인 아이디어를 생성하는 것이 최종 목표인! 경우는 거의 없다는 것이다. 오히려, 문제를 성공적으로 해결하거나 혁신하기 위해서는, 실제로 작동하고 이전 접근 방식보다 더 잘 작동하는 하나 또는 몇 개의 좋은 아이디어가 필요하다.", "en_hl": ["rarely", "Rather,"], "ko_hl": ["거의", "오히려,"], "ocr_flag": false, "verb": "is", "valency": "S+V", "arity": "2가", "id": "69-3"}, {"type": "예문", "en": "The most consequential cases of social learning in humans have not depended on pure demonstration or instruction. Rather, most social learning is hybrid learning.", "ko": "인간의 사회적 학습의 가장 중대한 사례는 순전한 시연이나 설명에 의존하지 않았다. 오히려, 대부분의 사회적 학습은 하이브리드 학습이다.", "en_hl": ["Rather,"], "ko_hl": ["않았다. 오히려,"], "ocr_flag": false, "verb": "have", "valency": "S+V", "arity": "2가", "id": "69-4"}, {"type": "예문", "en": "None of these cases reveal an ultimate or total renouncement of technology, but rather a temporary interruption of its use or a preference for a slower pace.", "ko": "이런 경우 중 어떤 것도 기술에 대한 근본적이거나 완전한 단념이 아니라. 오히려 기술 사용의 일시적 중지 혹은 더 느린 속도에 대한 선호를 드러", "en_hl": ["None", "but rather"], "ko_hl": ["아니라. 오히려"], "ocr_flag": false, "verb": "reveal", "valency": "S+V+O", "arity": "2가", "id": "69-5"}, {"type": "예문", "en": "Similarly the US form of contemporary colonization, which involves occupying economies and political parties rather than physical territories, is accompanied by the power of both Hollywood and the satellite to represent the world to and for the US.", "ko": "마찬가지로 물리적 영토라기보다는 경제와 정당을 차지하는 것을 포함하는 미국의 현대 식민지화 형태는 세계를 미국에 그리고 미국을 위해 표현하 기 위해 할리우드와 인공위성 둘 다의 힘에 의해 동반된다.", "en_hl": ["occupying economies and political parties rather", "than physical territories,"], "ko_hl": ["물리적 영토라기보다는 경제와 정당을 차지하는"], "ocr_flag": false, "verb": "involves", "valency": "V+R-ing", "arity": "2가", "id": "69-6"}, {"type": "예문", "en": "To the extent that an agent relies on the prior knowledge of its designer rather than on its own percepts, we say that the agent lacks autonomy.", "ko": "에이전트가 자신이 지각한 내용보다 설계자의 사전 지식에 의존하는 경우, 우리는 그 에이전트가 자율성이 부족하다고 말한다.", "en_hl": ["the prior knowledge of its designer rather than on its own percepts,"], "ko_hl": ["자신이 지각한 내용보다 설계자의 사전"], "ocr_flag": false, "verb": "say", "valency": "V+that", "arity": "2가", "id": "69-7"}, {"type": "예문", "en": "An alternative view is that we make sense of the sensations we feel and the facial expressions we see only when we attach words to them — we develop rather than inherit our emotional concepts.", "ko": "른 관점은 우리가 느끼는 감각과 우리가 보는 얼굴 표정에 단어를 붙일 때만 그것들을 이해한다는 것. 즉 우리는 감정 관련 개념을 물려받기보다는 발달시킨다는 것이다.", "en_hl": ["rather than"], "ko_hl": ["물려받기보다는"], "ocr_flag": false, "verb": "is", "valency": "V+that", "arity": "2가", "id": "69-8"}], "phonetic_ipa": "ˈrəðər", "derived_words": [], "eng_defs": ["You use rather when you are correcting something that you have just said, especially when you are describing a particular situation after saying what it is not."], "extra_notes": ["rather7 연결어로 사용될 때, 앞에 부정적 뉘앙스를 가진 문장을 달고 나온다.", "A rather than 8 : B7} 아니라 A", "rather than 세, B~ : A7 아니라 B"], "id": 69}, {"word": "instead", "phonetic": "instéd", "senses": [{"pos": "adv.", "meaning": "대신에"}], "meaning": "adv. 대신에", "page": 67, "line_start": 3061, "line_end": 3116, "examples": [{"type": "기본예문", "en": "He didn't reply. Instead, he turned on his heel and left the room.", "ko": "그는 대답을 하지 않았다. 대신 핵 돌아서더니 방을 나가 버렸다.", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": "did", "valency": "S+V", "arity": "1·2가", "id": "70-0"}, {"type": "예문", "en": "Orchids and a few other flowering plants offer no food to bee pollinators. Instead, they deceive male bees into thinking a particular orchid flower is a receptive, ready, and waiting female of their species to make them pollinate.", "ko": "난초와 일부 다른 꽃을 피우는 식물들은 벌 수분 매개자에게 어떤 먹이도 제공하지 않는다. 대신에, 그것들은 그것들(수컷 벌들)이 화분을 암술머리에 나르게 하기 위해 수컷 대답을 속여서 난초의 특정한 꽃이 수용적이고, 준비가 되어 있고, 기다리고 있는 같은 종의 암컷인 것으로 생각하게 한다.", "en_hl": ["offer no food", "Instead,"], "ko_hl": ["어떤 먹이도 제공하지 않는다."], "ocr_flag": false, "verb": "offer", "valency": "S+V+O", "arity": "2·3가", "id": "70-1"}, {"type": "예문", "en": "One consequence of the hierarchical organization of action is that when we reach for a cup of coffee, we do not need to consciously activate the sequence of muscles to send our arm and hand out toward the cup. Instead, most action plans are made at a higher level — we want to taste the coffee, and our arm, hand, and mouth coordinate to make it so.", "ko": "행동의 위계적 구조와 관련된 St 가지 결과는 우리가 커피 한 잔에 손을 뻔을 때, 우리의 팔과 손을 컵 쪽으로 보내기 위해 근육의 순서를 의식적으로 활성화할 필요가 없다는 점이다. 대신 대부분의 동작 계획들은 더 높은 수준에서 만들어지는데, 우리가 커피를 맛보고 싶고, 우리의 팔, 손 그리고 입 은 그렇게 하기 위해 조화하여 움직인다.", "en_hl": ["do not", "need", "Instead,", "EAA"], "ko_hl": ["필요가", "대신"], "ocr_flag": false, "verb": "is", "valency": "V+that", "arity": "2가", "id": "70-2"}, {"type": "예문", "en": "If we had to constantly think carefully about every one of those stimuli (or even a small subset thereof), in order to understand its nature and function, we would never get anything done! Instead, we learn about different stimuli, and tend to group them in terms of common features, attributes, or functions." 성'으로 알 려진 두 가지 기본적인 공정성 조건 중 하나를 위반하지 않고 단일 대안을 선택할 결정적 방법은 없다.", "en_hl": ["two agents"], "ko_hl": ["행위자가"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "100-5"}, {"type": "예문", "en": "Turning oneself into an agent of a particular kind by conceiving of oneself as that type of agent does not suffice to make it the case that                :", "ko": "자신을 그러한 유형의 행위자로 생각함으로써 자신을 특정 유형의 행위자로 바꾸는 것은             것이 사실이 되게 하기에는 충분하지 않다.", "en_hl": ["an agent", "particular kind", "that type", "agent"], "ko_hl": ["그러한 유형의", "특정"], "ocr_flag": false, "verb": "does", "valency": "S+V", "arity": "1·2가", "id": "100-6"}, {"type": "예문", "en": "one actually is that type of agent BERGER)", "ko": "한 사람이 실제로 그러한 유형의 행위자이다", "en_hl": ["agent BERGER)"], "ko_hl": ["행위자"], "ocr_flag": false, "verb": "is", "valency": "V+that", "arity": "2가", "id": "100-7"}, {"type": "예문", "en": "But with the emerging mass automobility in the first decades of the twentieth century, the negative effects of human agency behind the steering wheel — accidents for example — became a serious topic of concern.", "ko": "하지만 20세기의 첫 몇십 년 중 자동차에 의한 대규모 이동성이 생겨나면서. 가령 (자동차) 사고와 같은 운전대 뒤에 있는 인간 행위의 부정적인 영향 이 심각한 우려의 주제가 되었다.", "en_hl": ["human"], "ko_hl": ["인간"], "ocr_flag": false, "verb": "became", "valency": "S+V+C", "arity": "2가", "id": "100-8"}, {"type": "예문", "en": "Fashion can also strengthen agency in various ways, opening up space for action.", "ko": "패션은 또한 행동을 위한 공간을 열어주며 다양한 방법으로 행동력을 강화할 수 있다.", "en_hl": ["strengthen agency"], "ko_hl": ["행동력을 강화할"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "100-9"}, {"type": "예문", "en": "The long-term benefits are secured through one’s own agency.", "ko": "장기적인 이익이 자기 자신의 행위로 확보된다.", "en_hl": ["one’s own agency."], "ko_hl": ["자기 자신의"], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "100-10"}], "phonetic_ipa": "ˈeɪʤənt", "derived_words": [{"word": "agency", "senses": [{"pos": "n.", "meanin

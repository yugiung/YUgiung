den ways of encountering the world — may become labelled as merely subjective, and therefore of little account in terms of describing the way the world is.", "ko": "그 결과. 현실에 대한 비과학적 접근 방식은 — 그런데 그것에는 모든 예술, 종교, 그리고 세상을 접하는 개인적, 감정적, 가치 판단적인 방식이 포함 수 있다 ㅡ 주관적인 것에 불과하고, 따라서 세상이 존재하는 방식을 기술하는 것의 관점에서 거의 중요하지 않은 것으로 분류될지도 모른다.", "en_hl": ["little account"], "ko_hl": ["거의 중요하지 않은"], "ocr_flag": false, "verb": "is", "valency": "V+that", "arity": "2가", "id": "102-4"}, {"type": "예문", "en": "feel less accountable for the offence", "ko": "그 범죄에 대해 책임감을 S 느끼다", "en_hl": ["feel less accountable"], "ko_hl": ["책임감을", "느끼다"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "102-5"}, {"type": "예문", "en": "Leaders are accountable to their supporters.", "ko": "지도자들은 자신의 지지자들에 대한 책임이 있다.", "en_hl": ["Leaders are accountable"], "ko_hl": ["지도자들은", "책임이 있다."], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "102-6"}, {"type": "예문", "en": "When deciding whether to invest in a company, for example, they may take into account the people at the helm.", "ko": "예컨대 어떤 회사에 투자해야 할지의 여부를 결정할 때 실권을 가진 사람들을 고려할지도 모른다.", "en_hl": ["they may take into account the people at the helm."], "ko_hl": ["실권을 가진", "고려할지도 모른다."], "ocr_flag": false, "verb": "take", "valency": "V+전치사+O", "arity": "2가", "id": "102-7"}, {"type": "예문", "en": "In addition, they must also earn a living and so they must sell it for more than they have paid the farmer taking all the costs they have incurred into account.", "ko": "게다가. 상인은 생계도 꾸려야 하고, 그래서 자신이 발생시킨 모든 비용을 고려하여 자신이 농부에게 지불한 것보다 더 비싼 값에 그것을 팔아야 한다.", "en_hl": ["taking all", "the costs they have incurred into account."], "ko_hl": ["자신이 발생시킨 모든", "고려하여"], "ocr_flag": false, "verb": "sell", "valency": "S+V+O", "arity": "2·3가", "id": "102-8"}, {"type": "예문", "en": "In pluralistic societies ethnic minorities and indigenous groups sometimes ask the legal system to take their cultural background into account in criminal and civil cases.", "ko": "다민족 사회에서 소수 민족과 원주민 집단들은 형사 사건과 민사 사건에서 자신들의 문화적 배경을 고려해 달라고 사법 체계에 때때로 요구한다.", "en_hl": ["take their", "cultural background into account"], "ko_hl": ["문화적 배경을 고려해 달라고"], "ocr_flag": false, "verb": "ask", "valency": "S+V+O", "arity": "2·3가", "id": "102-9"}, {"type": "예문", "en": "A black —and—white view cannot account for the variety of burnout experience, though.", "ko": "그러나. 흑백 논리의 관점은 번아웃 경험의 다양성을 가질 + 없다.", "en_hl": ["cannot account for"], "ko_hl": ["가질 + 없다."], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "102-10"}, {"type": "예문", "en": "For the physicist, understanding the ordinary, the habitual, and the frequent thus allows us to account for the frightening and the singular.", "ko": "그러므로 물리학자로 말할 A 같으면, 평범한 것. 습관적인 것. 빈번한 것을 이해하여 우리가 무서운 것과 기묘한 것을 설명할 수 있게 해준다.", "en_hl": ["account for", "06969"], "ko_hl": ["설명할"], "ocr_flag": false, "verb": "allows", "valency": "S+V+O", "arity": "2·3가", "id": "102-11"}, {"type": "예문", "en": "Personality might account for, say, 40 percent of happiness, whereas life events might account for 60 percent.", "ko": "가령, 성격이 행복에서 40퍼센트를 차지할 수도 있고. 반면에 인생에서 일어나는 사건이 60퍼센트를 차지할 수도 있었다.", "en_hl": ["account for 60 percent."], "ko_hl": ["60퍼센트를 차지할"], "ocr_flag": false, "verb": "account", "valency": "V+전치사+O", "arity": "1가", "id": "102-12"}], "phonetic_ipa": "əˈkaʊnt", "derived_words": [{"word": "accountable", "senses": [{"pos": "adj.", "meaning": "책임이 있는, 책임감을 느끼는"}]}], "eng_defs": ["If you say that something is of no account or of little account, you mean that it is very unimportant and is not worth considering."], "extra_notes": ["account?! 다른 뜻 : n, 설명[이야기/말], 중요성 v. 간주하다, 여기다", "unaccountable 301. 책임을 질 필요가 없는, 설명할 수 없는", "take A into account : 를 고려하다", "account for A: AS 차지하다, AS 설명하다"], "id": 102}, {"word": "edge", "phonetic": null, "senses": [{"pos": "n.", "meaning": "끝, 가장자리, 모서리, 경계"}], "meaning": "n. 끝, 가장자리, 모서리, 경계", "page": 92, "line_start": 4473, "line_end": 4517, "examples": [{ 가", "id": "125-7"}, {"type": "예문", "en": "Emotions must be conditioned to operate in accordance with the rules of reason.", "ko": "감정은 이성의 규칙에 따라서 작동하도록 조건화되어야 한다.", "en_hl": ["be conditioned to operate", "accordance with the rules", "reason."], "ko_hl": ["이성의", "따라서 작동하도록 조건화되어야"], "ocr_flag": false, "verb": "be", "valency": "S+V", "arity": "2가", "id": "125-8"}, {"type": "예문", "en": "She gave her children unconditional love.", "ko": "그녀는 자녀들에게 무조건적인 사랑을 베풀었다.", "en_hl": ["unconditional love."], "ko_hl": ["무조건적인"], "ocr_flag": false, "verb": "gave", "valency": "S+V+O", "arity": "2·3가", "id": "125-9"}, {"type": "예문", "en": "a pursuit of unconditional academic status", "ko": "무조건적 학문적 지위의 추구", "en_hl": ["unconditional"], "ko_hl": ["무조건적"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "125-10"}, {"type": "예문", "en": "The availability of transportation infrastructure and services has been considered a fundamental precondition for tourism.", "ko": "교통 기반 시설과 서비스의 이용 가능성이 관광 산업의 기본적인 전제 조건으로 간주되어 왔다.", "en_hl": ["fundamental precondition for", "tourism."], "ko_hl": ["관광", "기본적인 전제"], "ocr_flag": false, "verb": "been", "valency": "S+V", "arity": "2가", "id": "125-11"}], "phonetic_ipa": "kənˈdɪʃən", "derived_words": [{"word": "unconditional", "senses": [{"pos": "adj.", "meaning": "무조건적인"}]}, {"word": "precondition", "senses": [{"pos": "n.", "meaning": "전제 조건"}]}], "eng_defs": ["The conditions under which something is done or happens are all the factors or circumstances which directly affect it.", "If someone is conditioned by their experiences or environment, they are influenced by them over a period of time so that they do certain things or think in a particular way."], "extra_notes": ["condition은 대부분의 경우 '상태'의 의미로 사람/사물의 상태, 건강 상태, 생활/직업의 상황 및 상태 등을 광범위하게 다룰 + 있는 단 이다.", "동사로 '좌우하다, (무엇의 방식에) 영향을 미치다'라는 뜻도 있다.", "명사로 \"조건 동사로 '길들이다, 훈련시키다'의 의미도 매우 중요하니 알아두자!(사실 이것도 무언가에 '조건화시키다'라는 말과 일맥 상 통한다. 마치 파블로프의 개처럼^^)"], "id": 125}, {"word": "minute", "phonetic": "minit", "senses": [{"pos": "n.", "meaning": "분, (정확한 어느) 순간"}], "meaning": "n. 분, (정확한 어느) 순간", "page": 109, "line_start": 5466, "line_end": 5502, "examples": [{"type": "기본예문", "en": "I'll be back in a few minutes.", "ko": "난 몇 분 있으면[금방] 돌아올 거야. 지으려", "en_hl": ["minutes."], "ko_hl": ["몇 분"], "ocr_flag": false, "verb": "be", "valency": "V+전치사+O", "arity": "2가", "id": "126-0"}, {"type": "예문", "en": "At that very minute, Tom walked in.", "ko": "바로 그 순간에 톰이 걸어 들어왔다.", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": "walked", "valency": "V+전치사+O", "arity": "1·2가", "id": "126-1"}, {"type": "예문", "en": "A flea cannot be beautiful because it is too minute.", "ko": "벼룩은 너무 미세하기 때문에 아름다울 수 없!", "en_hl": ["because"], "ko_hl": ["너무"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "126-2"}, {"type": "예문", "en": "minute amounts of chemicals in the water", "ko": "그 240 든 극미량의 화학 Sas", "en_hl": ["amounts"], "ko_hl": ["극미량"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "126-3"}, {"type": "예문", "en": "The kitchen on the boat is minute.", "ko": "그 배의 부얼은 아주 작다.", "en_hl": ["minute."], "ko_hl": ["아주 작다."], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "126-4"}], "phonetic_ipa": "ˈmɪnət", "derived_words": [], "eng_defs": ["If you say that something is minute, you mean that it is very small. (=tiny)"], "extra_notes": ["minute! 다른 뜻 : adj, 미세한 [mainju:t)"], "id": 126}, {"word": "invariable", "phonetic": "invéariab!", "senses": [{"pos": "adj.", "meaning": "변함없는, 변치 않는"}], "meaning": "adj. 변함없는, 변치 않는", "page": 110, "line_start": 5502, "line_end": 5529, "examples": [{"type": "기본예문", "en": "It was her invariable habit to pray before going to bed.", "ko": "잠자리에 들기 전에 기도하는 것이 그녀의 어김없는 습관이었다.", "en_hl": ["invariable"], "ko_hl": ["어김없는"], "ocr_flag": false, "verb": "was", "valency": "S+V+C", "arity": "2가", "id": "127-0"}, {"type": "예문", "en": "an invariably favorable wind", "ko": "변함없이 부는 순풍", "en_hl": ["invariably"], "ko_hl": ["변함없이"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "127-1"}, {"type": "예문", "en": "Experienced writers invariably write in a climate of discussion.", "ko": "노련하게 글을 쓰는 사람은 언제나 토론하는 분위기에서 글을 쓴", "en_hl": [], "ko_hl": ["언제나"], "ocr_flag": false, "verb": "write", "valency": "V+전치사+O", "arity": "1·2가", "id": "127-2"}, {"type": "예문", "en": "If one is asked to bisect a perpendicular line without measuring it, one almost invariably places the mark too high.", "ko": "측정하지 않고 수직선을 이등분하도록 하면, 사람들은 거의 예외 없이 지나치게 높게 표시를 한다.", "en_hl": ["almost invariably"], "ko_hl": ["않고", "거의 예외 없이"], "ocr_flag": false, "verb": "places", "valency": "S+V+O", "arity": "2가", "id": "127-3"}], "phonetic_ipa": "ˌɪnˈvɛriəbəl", "derived_words": [{"word": "invariably", "senses": [{"pos": "adv.", "meaning": "항상, 언제나, 예외 없이"}]}], "eng_defs": ["If something invariably happens or is invariably true, it always happens or is always true."], "extra_notes": ["invariably는 invariable! 부사형이지만, 시험에 굉장히 많이 나오니 이미지만 갖고 있지 말고 따로 암기해 놓자!"], "id": 127}, {"word": "question", "phonetic": "kwéstfan", "senses": [{"pos": "n.", "meaning": "질문, 의문"}, {"pos": "v.", "meaning": "질문하다, 의문하다"}], "meaning": "n. 질문, 의문 / v. 질문하다, 의문하다", "page": 110, "line_start": 5529, "line_end": 5576, "examples": [{"type": "기본예문", "en": "Which route is better remains an open question.", "ko": "어느 루트가 더 나으냐 하는 것은 결정이 되지 않은 문제이다.", "en_hl": [], "ko_hl": [], "ocr_flag": false, "verb": "is", "valency": "S+V", "arity": "2가", "id": "128-0"}, {"type": "예문", "en": "Given the level of anonymity with all that resides on the Internet, it's sensible to question the validity of any data that you may receive.", "ko": "인터넷에 있는 모든 것의 익명성 수준을 고려할 때, 여러분이 받을지도 모르는 어떤 자료든 그것의 타당성에 대해 의문을 제기하는 것이 합리적이다.", "en_hl": ["it's sensible", "question"], "ko_hl": ["제기하는 것이 합리적이다."], "ocr_flag": false, "verb": "'s", "valency": "S+V", "arity": null, "id": "128-1"}, {"type": "예문", "en": "But, when we do not know we are ignorant, we do not know enough to even question, let alone investigate, our ignorance.", "ko": "그런데, 우리가 무지하다는 것을 우리가 모를 때 우리의 무지함에 대해 조사하는 것을 말할 것을 없이 의문을 제기할 만큼 충분히 알지 못한다.", "en_hl": ["do not know enough", "even question,"], "ko_hl": ["만큼 충분히 알지 못한다."], "ocr_flag": false, "verb": "do", "valency": "S+V", "arity": "1·2가", "id": "128-2"}, {"type": "예문", "en": "He was one of early Vienna modernism’s most important figures, but already in the beginning of the 1920s he started to question modernism’s growing pragmatism.", "ko": "그는 초기 비엔나 모더니즘의 가장 중요한 인물 중 한 명이었지만 이미 1920년대 초에 모더니즘의 고조되는 실용주의에 의문을 제기하기 시작했다.", "en_hl": ["started", "question"], "ko_hl": ["의문을 제기하기 시작했다."], "ocr_flag": false, "verb": "was", "valency": "S+V", "arity": "2가", "id": "128-3"}, {"type": "예문", "en": "An approach based on critical theory calls into question the idea that objectivity is desirable or even possible.", "ko": "비판적 이론에 근거한 접근법에서는 객관성이 바람직하다거나 심지어 '가능하다 는 생각에 의문을 제기한다.", "en_hl": ["calls into question"], "ko_hl": ["의문을 제기한다."], "ocr_flag": false, "verb": "calls", "valency": "V+전치사+O", "arity": "2·3가", "id": "128-4"}, {"type": "예문", "en": "In autobiographical narratives, imaginative acts of remembering always overlap with such rhetorical acts as assertion, justification, judgment, conviction, and questioning.", "ko": "자서전적인 서술에서. 기억을 떠올리는 상상적 행위는 항상 단언, 정당화, 판단, 확신 그리고 의문 제기와 같은 수사적 행위와 중첩된다.", "en_hl": [], "ko_hl": ["의문"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "128-5"}, {"type": "예문", "en": "raises questions about negative attitudes toward social disharmony 0096030691", "ko": "사회적 불화를 향한 부정적 태도에 대해 의문을 제기한다", "en_hl": ["raises questions", "0096030691"], "ko_hl": ["의문을"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "128-6"}], "phonetic_ipa": "kˈwɛʃən", "derived_words": [], "eng_defs": ["If you question something, you have or express doubts about whether it is true, reasonable, or worthwhile.", "If there is doubt or uncertainty about something, you can say that there is a question mark over it."], "extra_notes": ["question은 확장된 의미로서는 단순히 질문이 아닌, 어떤 사항에 대해서 아닐 수도 있지 않을까?라는 전제가 깔려있다. 그래서 해석은 '의심하다, 의문을 갖다, 이의를 제기하다'로도 할 수 있다."], "id": 128}, {"word": "immune", "phonetic": "imju:n", "senses": [{"pos": "adj.", "meaning": "(S43 질병에) 면역성이 있는"}], "meaning": "adj. (S43 질병에) 면역성이 있는", "page": 111, "line_start": 5576, "line_end": 5612, "examples": [{"type": "기본예문", "en": "Your immune system is powerful.", "ko": "여러분의 면역 체계는 강력하다.", "en_hl": [], "ko_hl": ["면역"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "129-0"}, {"type": "예문", "en": "No organization is immune to social engineering.", "ko": "사회 공학에 영향을 받지 않는 조직은 없다.", "en_hl": ["immune", "social engineering."], "ko_hl": ["사회 공", "영향을 받지 않는"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "129-1"}, {"type": "예문", "en": "You'll eventually become immune to criticism.", "ko": "결국에는 비판에 면역이 될 것이다.", "en_hl": ["become immune", "criticism."], "ko_hl": ["면역이"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "129-2"}, {"type": "예문", "en": "She seemed to be immune to those emotions.", "ko": "그녀는 그런 감정에는 면역이 된 것처럼 보였다.", "en_hl": ["be immune to those emotions."], "ko_hl": ["그런 감정에는 면역"], "ocr_flag": false, "verb": "seemed", "valency": "V+to R", "arity": "2가", "id": "129-3"}, {"type": "예문", "en": "Such a view which grounds equality not in human uniformity but in the interplay of uniformity and difference is immune to monist distortion.", "ko": "평등의 기초를 인간의 획일성이 아니라 획일성과 차이의 상호작용에 두는 그러한 견해는 일원론적 왜꼭을 면하게 된다.", "en_hl": ["immune to monist distortion."], "ko_hl": ["일원론적", "면하게 된다."], "ocr_flag": false, "verb": "grounds", "valency": "S+V+O", "arity": "2가", "id": "129-4"}], "phonetic_ipa": "ˌɪmˈjun", "derived_words": [], "eng_defs": ["If you are immune to a particular disease, you cannot be affected by it."], "extra_notes": ["be immune to A: 에 대해서 면역성을 지니고 있다는 것은 결국 라는 대상에 의해 크게 흔들리거나 영향 ic_ipa": "məˈkænɪkəl", "derived_words": [], "eng_defs": [], "extra_notes": ["mechanical 우리말로는 '못마땅한 행동, 진심이 담기지 않은'의 뉘앙스를 나타내기 위해서 사용된다."], "id": 135}, {"word": "code", "phonetic": null, "senses": [{"pos": "n.", "meaning": "암호, 부호"}], "meaning": "n. 암호, 부호", "page": 116, "line_start": 5860, "line_end": 5910, "examples": [{"type": "기본예문", "en": "To take advantage of this offer, simply go to our website and enter the promotion code ‘ROC25’.", "ko": "이 혜택을 받으려면, 저희 홈페이지에 들어가서 ‘ROC25 라는 암호만 입력하면 됩니다.", "en_hl": ["code"], "ko_hl": ["암호"], "ocr_flag": true, "verb": null, "valency": null, "arity": null, "id": "136-0"}, {"type": "예문", "en": "Therefore, in order to analyse ethical issues and think ethically, it is necessary to understand the personal factors that influence your own ‘code of behaviour’ and how these may coincide", "ko": "따라서 윤리적 문제를 분석하고 윤리적으로 사고하기 위해서는. 자신의 `행동 규범'에 영향을 미치는 개인적 요인들이 무엇인지, 그리고 그것들이 어 떻게 다른 요소들과 일치할 수 있는지를 이해하는 것이 필요하다.", "en_hl": ["‘code", "behaviour’"], "ko_hl": ["행동 규범"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "136-1"}, {"type": "예문", "en": "It is also important to recognise and accept that the factors driving other people's codes and decision making may be different.", "ko": "또한 다른 사람들의 행동 규범과 의사결정을 이끄는 요인들은 당신과 다를 수 있다는 사실을 인식하고 받아들이는 것도 중요하다.", "en_hl": ["other people's codes"], "ko_hl": ["다른", "람들의 행동"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "136-2"}, {"type": "예문", "en": "Far-reaching Impacts of Ethics on Behavioural Codes GEWSE)", "ko": "윤리가 행동 규범에 미치는 광범위한 영향", "en_hl": ["Behavioural Codes GEWSE)"], "ko_hl": ["행동"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "136-3"}, {"type": "예문", "en": "By this code, ancient Big Men were not allowed to act controllingly and modern office managers are not allowed to silence anyone at will.", "ko": "이러한 행동 규범에 따르면. 고대의 “Big 160(지도자들)은 지배적으로 행동할 수 없었고. 현대의 사무실 관리자들 역시 자기 마음대로 누구의 말을 막을 수 없다.", "en_hl": "ko_hl": ["가격을"], "ocr_flag": false, "verb": "determine", "valency": "S+V+O", "arity": "2가", "id": "192-1"}, {"type": "예문", "en": "According to the principle of social proof, one way individuals determine appropriate behavior for themselves in a situation is to examine the behavior of others there — especially similar others.", "ko": "사회적 증거의 원리에 따르면, 어떤 상황에서 사람들이 자신에게 적합한 행동을 결정하는 한 가지 방법은 그곳에 있는 다른 사람들의 행동, 특히 유사 한 다른 사람들의 행동을 살펴보는 것이다.", "en_hl": ["one way individuals determine appropriate behavior"], "ko_hl": ["람들이", "적합한 행동을 결정하는", "가지"], "ocr_flag": false, "verb": "determine", "valency": "S+V+O", "arity": "2가", "id": "192-2"}, {"type": "예문", "en": "At any given time, the experts in a society determine the nature of current understanding.", "ko": "어느 시대나 한 사회의 전문가들이 (그 시대에) 통용되고 있는 이해의 본질을 결정한다.", "en_hl": ["determine the nature", "current"], "ko_hl": ["있는"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "192-3"}, {"type": "예문", "en": "It therefore aims at the unmasking of previous illusions of determinacy and precision by the production of new and alternative representations.", "ko": "그러므로 그것은 새롭고 대안적인 진술의 생성에 의해 확정성과 정확성에 대해 이전에 가진 환상의 정체를 드러내는 것을 목표로 한다.", "en_hl": ["determinacy"], "ko_hl": ["확정성과"], "ocr_flag": false, "verb": "aims", "valency": "V+전치사+O", "arity": "1·2가", "id": "192-4"}, {"type": "예문", "en": "Thus, it is inadequate to categorically assert the dominance of genetic determinants over an organism's capacity to adapt to its environment.", "ko": "그러므로, 유기체의 환경 적응 능력보다 유전적 결정 요인들이 더 우세하다고 단정적으로 주장하는 것은 부적절하다.", "en_hl": ["genetic determinants"], "ko_hl": ["유전", "결정"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "192-5"}, {"type": "예문", "en": "Thus, a rosy memory — accurate or not — is a major determinant for future plans for vacation travel.", "ko": "따라서, 정확하든 아니든 것을! 기억은 미래의 휴가 여행 계획에 있어 주요한 결정 요인이다.", "en_hl": ["major"], "ko_hl": ["주요한 결정"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "192-6"}, {"type": "예문", "en": "The fact that emotions are unlearned, automated, and set by the genome always raises the specter of genetic determinism.", "ko": "감정이 학습되지 않고, 자동화되고, 유전자 총체에 의해 설정된다는 사실은 항상 유전자 결정론의 망령을 불러일으킨다.", "en_hl": ["genetic", "determinism."], "ko_hl": ["유전자"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "192-7"}], "phonetic_ipa": "dɪˈtərmən", "derived_words": [{"word": "determinacy", "senses": [{"pos": "n.", "meaning": "결정성, 확정성"}]}, {"word": "determination", "senses": [{"pos": "n.", "meaning": "결정, 결심, 결댄(력), 확인"}]}, {"word": "determinant", "senses": [{"pos": "n.", "meaning": "결정 요인"}]}, {"word": "determinism", "senses": [{"pos": "n.", "meaning": "결정론"}]}], "eng_defs": ["If a particular factor determines the nature of a thing or event, it causes it to be of a particular kind.", "the quality of being defined or fixed"], "extra_notes": ["AS 8 사이의 관계를 명심하자!", "Adetermine 6 : 4 - 6"], "id": 192}, {"word": "distinguish", "phonetic": "distingwif", "senses": [{"pos": "v.", "meaning": "구별하다, 구분하다, 식별하다"}], "meaning": "v. 구별하다, 구분하다, 식별하다", "page": 155, "line_start": 7688, "line_end": 7738, "examples": [{"type": "기본예문", "en": "In common speech we do not distinguish between things caused by human behaviour.", "ko": "일반적인 말에서 우리는 인간 행동에 의해 유발된 일들을 구분하지 않는다.", "en_hl": ["distinguish"], "ko_hl": ["분하지"], "ocr_flag": false, "verb": "do", "valency": "S+V", "arity": "1·2가", "id": "193-0"}, {"type": "예문", "en": "unintended effects of distinguishing insiders from outsiders", "ko": "내부자와 외부자 구별의 의도되지 않은 영향", "en_hl": ["distinguishing insiders from outsiders"], "ko_hl": ["내부자와 외부자 구별"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "193-1"}, {"type": "예문", "en": "The basic aim of a nation at war in establishing an image of the enemy is to distinguish as sharply as possible the act of killing from the act of murder.", "ko": "적의 이미지를 확립하는 데 있어서 전쟁을 하고 있는 국가의 기본적인 목표는 죽이는 행위와 살인의 행위를 가능한 한 뚜렸이 구별하는 것이다.", "en_hl": ["distinguish", "act of killing from the act", "murder."], "ko_hl": ["죽이는 행위와 살인의 행위를", "구별하는"], "ocr_flag": false, "verb": "is", "valency": "V+to R", "arity": "2가", "id": "193-2"}, {"type": "예문", "en": "Hyper-mobility — the notion that more travel at faster speeds covering longer distances generates greater economic success — seems to be a distinguishing feature of urban areas, where more than half of the world’s population currently reside.", "ko": "더 먼 거리를 더 빠른 속도로 더 많이 이동하는 것이 더 2 경제적 성공을 만든다는 개념인 하이퍼 모빌리티는 현재 세계 인구의 절반보다 더 많은 사람이 거주하는 도시 지역의 두드러진 특징인 것으로 보인다.", "en_hl": ["distinguishing feature"], "ko_hl": ["두드러진 특징인"], "ocr_flag": false, "verb": "—", "valency": "S+V+O", "arity": null, "id": "193-3"}, {"type": "예문", "en": "Erikson believes that another distinguishing feature of adulthood is the emergence of an inborn desire to teach.", "ko": "Erikson® 성인기의 & 다른 독특한 } 특징은 가르치고자 하는 타고난 욕구의 출현이라고 믿는다.", "en_hl": ["another distinguishing feature", "adulthood"], "ko_hl": ["성인기의", "다른"], "ocr_flag": false, "verb": "believes", "valency": "V+that", "arity": "1·2가", "id": "193-4"}, {"type": "예문", "en": "Yet, Nicholas Delbanco, a distinguished American writer, said something about it.", "ko": "그러나 미국의 유명한 작가인 Nicholas Delbanco= 그것에 대하여 무언가를 말했다.", "en_hl": ["distinguished American writer,"], "ko_hl": ["미국의 유명한"], "ocr_flag": false, "verb": "said", "valency": "S+V+O", "arity": "2가", "id": "193-5"}, {"type": "예문", "en": "Neither do distinguished computer scientists, no matter how gifted in their field, automatically understand the complex systems of power, money, and politics that will govern the use of their products in the future.", "ko": "뛰어난 컴퓨터 과학자들도 자신의 분야에서 아무리 재능이 뛰어나더라도, 미래에 자신들의 산출물 사용을 좌우할 권력, 돈, 정치의 복잡한 체계를 저 절로 이해하지는 못한다.", "en_hl": ["distinguished computer scientists,"], "ko_hl": ["뛰어난 컴퓨터 과학자"], "ocr_flag": false, "verb": "do", "valency": "S+V", "arity": "1·2가", "id": "193-6"}], "phonetic_ipa": "dɪˈstɪŋgwɪʃ", "derived_words": [], "eng_defs": ["If you can distinguish one thing from another or distinguish between two things, you can see or understand how they are different."], "extra_notes": ["distinguish A from B: A> B", "distinguishing (형용사로 쓰일 때) : adj. 독특한, 특유의", "distinguished (형용사로 쓰일 때) : adj. 유명한, 저명한"], "id": 193}, {"word": "reflect", "phonetic": "riflékt", "senses": [{"pos": "v.", "meaning": "반사하다, 반향을 일으키다, 나타내다[반영하다]"}], "meaning": "v. 반사하다, 반향을 일으키다, 나타내다[반영하다]", "page": 156, "line_start": 7738, "line_end": 7804, "examples": [{"type": "기본예문", "en": "Happiness typically indicates one's harmonious relations with others, and anger often reflects a feeling of injustice.", "ko": "행복은 전형적으로 타인과의 조화로운 관계를 나타내며. 분노는 흔히 부당함의 감정을 반영한다.               0", "en_hl": ["reflects"], "ko_hl": ["반영"], "ocr_flag": false, "verb": "indicates", "valency": "S+V", "arity": "2가", "id": "194-0"}, {"type": "예문", "en": "the mental performances that reflect meaning and purpose BEY", "ko": "의미와 목적을 반영하는 정신적 행위", "en_hl": ["reflect meaning and purpose BEY"], "ko_hl": ["의미와 목적을 반영하는"], "ocr_flag": false, "verb": "reflect", "valency": "S+V+O", "arity": "1·2가", "id": "194-1"}, {"type": "예문", "en": "Maps do indeed reflect the world views of their makers.", "ko": "지도는 정말로 지도 제작자의 세계관을 반영한다.", "en_hl": ["reflect the world views", "their makers."], "ko_hl": ["지도 제작자의"], "ocr_flag": false, "verb": "do", "valency": "S+V", "arity": "1·2가", "id": "194-2"}, {"type": "예문", "en": "Your body is not a vehicle you inhabit; it is a creation of your nonphysical being and therefore reflects your personality characteristics.", "ko": "여러분의 몸은 여러분이 거주하는 매개체가 아니라, 그것은 여러분의 육체가 아닌 존재가 만들어 낸 것이며, 그로 인해 여러분의 성격 특성을 반영한다.", "en_hl": ["reflects your", "personality characteristics."], "ko_hl": ["성격"], "ocr_flag": false, "verb": "is", "valency": "V+IO+DO", "arity": "2가", "id": "194-3"}, {"type": "예문", "en": "| have reflected at length on our last conversation.", "ko": "저는 우리의 지난번 대화에 관해 오랫동안 생각했습니다.", "en_hl": ["reflected", "on our last conversation."], "ko_hl": ["우리의 지난번", "관해", "생각했습니다."], "ocr_flag": false, "verb": "reflected", "valency": "V+전치사+O", "arity": "1·2가", "id": "194-4"}, {"type": "예문", "en": "It reduced his ability to focus and reflect because he now craved a constant stream of stimulation.", "ko": "이것은 그의 집중하고 성찰하는 능력을 감소시켰는데, 그는 이제 끊임없는 자극의 흐름을 갈망하게 되었기 때문이다.", "en_hl": ["ability to focus and reflect"], "ko_hl": ["집중하고 성찰하는"], "ocr_flag": false, "verb": "reduced", "valency": "S+V+O", "arity": "1·2가", "id": "194-5"}, {"type": "예문", "en": "reflect on athletes’ failures and mistakes ZEISS)", "ko": "운동선수들의 실패와 실수를 숙고하다", "en_hl": ["reflect on", "ZEISS)"], "ko_hl": ["숙고 하다"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "194-6"}, {"type": "예문", "en": "This active involvement provides a basis for depth of aesthetic processing and reflection on the meaning of the work.", "ko": "이러한 적극적인 관여는 미학적 처리와 작품 의미 성찰의 깊이에 대한 기반을 제공한다.", "en_hl": ["reflection on the meaning of the", "work."], "ko_hl": ["작품 의미"], "ocr_flag": false, "verb": "provides", "valency": "S+V+O", "arity": "2·3가", "id": "194-7"}, {"type": "예문", "en": "It's been popular to suppose, for instance, that we don’t know that we have lost the lottery just by reflecting on how unlikely winning is.", "ko": "예를 들어, 얼마나 당첨의 가능성이 낮은지를 그저 숙고하는 것만으로는 우리가 복권에 당첨되지 않았다는 것을 '알지' 못한다고 가정하는 것이 일반 적이다.", "en_hl": ["reflecting on"], "ko_hl": ["숙고하는"], "ocr_flag": false, "verb": "'s", "valency": "S+V", "arity": null, "id": "194-8"}, {"type": "예문", "en": "In other words, individuals are acting without reflection more often than they are thinking carefully and deliberately.", "ko": "다시 말해서, 개인은 조심스럽고 신중하게 '생각하고 있기보다는 더 자주 심사숙고 없이 '행동하고' 있다.", "en_hl": ["without reflection"], "ko_hl": ["심사숙고 없이"], "ocr_flag": false, "verb": "acting", "valency": "V+전치사+O", "arity": null, "id": "194-9"}, {"type": "예문", "en": "acknowledge one’s limitation through reflection 600966069.0", "ko": "성찰을 통해 자신의 한계를 인정하다", "en_hl": ["through reflection 6009 munication requires heightened emotional awareness — not only to express ourselves effectively but also to decode                ¢", "ko": "이것이 디지털 의사소통이 고도의 감정 인식을 요구하는 이유이며, 이는 우리 자신을 효과적으로 표현하기 위한 것뿐만 아니라. 우리가 을 해독하기 위해서다.", "en_hl": ["requires"], "ko_hl": ["요구하는"], "ocr_flag": false, "verb": "is", "valency": "S+V", "arity": "2가", "id": "195-4"}, {"type": "예문", "en": "It has been claimed that no specific knowledge or experience is required to attain insight in the problem situation.", "ko": "문제 상황에서 통찰력을 얻기 위해 특별한 지식이나 경험이 필요하지 않다고 주장되어 왔다.", "en_hl": ["no specific knowledge or experience", "required"], "ko_hl": ["특별한 지식이나 경험이 필요하지"], "ocr_flag": false, "verb": "been", "valency": "S+V", "arity": "2가", "id": "195-5"}], "phonetic_ipa": "ˌrikˈwaɪər", "derived_words": [], "eng_defs": [], "extra_notes": ["AS 8 사이의 관계를 명심하자!", "스 B:A—B", "depend upon 155"], "id": 195}, {"word": "depend", "phonetic": "dipénd", "senses": [{"pos": "v.", "meaning": "의지하다"}], "meaning": "v. 의지하다", "page": 158, "line_start": 7848, "line_end": 7894, "examples": [{"type": "기본예문", "en": "He began to depend on drugs in a weak moment.", "ko": "그는 마음이 허할 때 약물에 의존하기 시작했다.", "en_hl": [], "ko_hl": ["의존하기"], "ocr_flag": false, "verb": "began", "valency": "V+to R", "arity": "1·2가", "id": "196-0"}, {"type": "예문", "en": "Like pain, taste is not just the product of sensory signals; it depends also on psychological factors: you don't just taste the wine; you taste its price.", "ko": "통증과 같이 미각은 단순히 감각 신호의 산물일 뿐만 아니라, 그것은 심리적 요인에도 좌우된다. 여러분은 와인을 단순히 맛보는 것이 아니다. 여러분 은 그것의 가격을 맛보는 것이다.", "en_hl": ["depends also on", "factors:"], "ko_hl": ["심리적 요인에도 좌우된다."], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "196-1"}, {"type": "예문", "en": "Internalization depends on supports for autonomy.", "ko": "내면화는 자율성에 대한 지지에 의존한다.", "en_hl": ["depends on"], "ko_hl": ["의존한다."], "ocr_flag": false, "verb": "depends", "valency": "V+전치사+O", "arity": "1가", "id": "196-2"}, {"type": "예문", "en": "In other w ": "'s", "valency": "S+V", "arity": null, "id": "200-0"}, {"type": "예문", "en": "The attempts to outgrow neighboring seedlings are likely to succeed", "ko": "근처에 있는 묘목들보다 더 커지려는 시도는 성공할 가능성이 높다", "en_hl": ["The attempts", "outgrow"], "ko_hl": ["커지려는"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "200-1"}, {"type": "예문", "en": "Monoculture is a natural outgrowth of an industrial approach to agriculture.", "ko": "단일 경작은 농업에 대한 산업적인 접근의 자연적인 결과물이다.", "en_hl": ["natural outgrowth", "an industrial approach", "agriculture."], "ko_hl": ["농업", "대한 산업", "접근의 자연적인 결과", "이다."], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "200-2"}, {"type": "예문", "en": "Thus, cultural ideas show ‘advances’ and ‘developments’ because they are outgrowths of previous ideas.", "ko": "따라서, 문화적 사상은 이전 사상의 결과물이기 때문에 '진보'와 '발전'을 보여 준다.", "en_hl": ["they are outgrowths of previous"], "ko_hl": ["문화적 사상은 이전 사상의"], "ocr_flag": false, "verb": "show", "valency": "S+V+O", "arity": "2·3가", "id": "200-3"}, {"type": "예문", "en": "Slang has always started in cities — an outgrowth of all those different people so frequently exposed to one another.", "ko": "속어는 항상 도시에서 시작되었는데, 그 모든 별의 별 사람이 그렇게도 빈번히 서로에게 접촉한 결과물이다.", "en_hl": ["— an outgrowth of all those", "people so", "exposed", "one", "another."], "ko_hl": ["모든", "그렇게도 빈번히 서로에게 접촉한"], "ocr_flag": false, "verb": "has", "valency": "S+V", "arity": "2가", "id": "200-4"}], "phonetic_ipa": "ˌaʊtˈgroʊ", "derived_words": [{"word": "outgrowth", "senses": [{"pos": "n.", "meaning": "결과(물)"}]}], "eng_defs": ["outgrow : to grow too large for (someone or something)", "outgrowth : something that develops or results from something else"], "extra_notes": ["\\단어에서 매우 많이 강조한 4 04 8의 형태이다. (A>B)", "단, 명사의 형태 outgrowth 아예 뜻을 따로 암기하는 것이 매우 중요해졌다."], "id": 200}, {"word": "subordinate", "phonetic": "sab3:rdanat", "senses": [{"pos": "adj.", "meaning": "종속된), 하급의, 부차적인"}], "meaning": "adj. 종속된), 하급의, 부차적인", "page": 162, "line_start": 8070, "line_end": 8107, "examples": [{"type": "기본예문", "en": "All the other issues are subordinate to this one.", "ko": "다른 모든 논점들이 이 하나에 예속된다.", "en_hl": ["are subordinate"], "ko_hl": ["예속된다"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "201-0"}, {"type": "예문", "en": "Subordinates are more restricted in where they can look and when.", "ko": "하급자들은 그들이 어디를 S 수 있고, 언제 볼 수 있는지에 있어서 더 제한적이다.", "en_hl": ["Subordinates"], "ko_hl": ["급자"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "201-1"}, {"type": "예문", "en": "In so doing Aristotle emphasizes the universal to be subordinate to the individual in contrast to Hegel.", "ko": "아리스토텔레스는 그렇게 하는 것을 통해 헤겔과는 반대로 보편자가 개별자에게 종속된다고 강조한다.", "en_hl": ["be subordinate"], "ko_hl": ["개별자에게"], "ocr_flag": false, "verb": "emphasizes", "valency": "S+V+O", "arity": "2가", "id": "201-2"}, {"type": "예문", "en": "Facts are subordinate to our political point of view.", "ko": "사실이 우리의 정치적 관점에 종속되어 있다.", "en_hl": ["subordinate"], "ko_hl": ["있다."], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "201-3"}, {"type": "예문", "en": "Depending on the type of bridge and the site, it is subordinate to the surroundings, or it makes a strong statement.", "ko": "다리의 유형과 지역에 따라, 다리는 주변 환경에 종속적이기도 하고. 강하게 드러나기도 한다.", "en_hl": ["subordinate", "the surroundings,"], "ko_hl": ["주변 환경에", "하고."], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "201-4"}, {"type": "예문", "en": "The individual's needs are subordinate to those of the group.", "ko": "개인의 요구는 집단의 요구에 종속된다.", "en_hl": ["are subordinate"], "ko_hl": ["종속된다"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "201-5"}], "phonetic_ipa": "səˈbɔrdəˌneɪt", "derived_words": [], "eng_defs": ["Someone who is subordinate to you has a less important position than you and has to obey you."], "extra_notes": ["상호 관계에 주의하자.", "쓰 subordinate to 8 : A<B 또는 4 …- ㅁ"], "id": 201}, {"word": "independent", "phonetic": "indipéndant", "senses": [{"pos": "adj.", "meaning": "독립적인[독자적인], 독립된, 별개의"}], "meaning": "adj. 독립적인[독자적인], 독립된, 별개의", "page": 163, "line_start": 8107, "line_end": 8157, "examples": [{"type": "기본예문", "en": "In some ways, beagles are very independent and bold.", "ko": "어떤 면에서, 비글은 매우 독립적이고 대담해.", "en_hl": ["independent"], "ko_hl": ["독립적이고"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "202-0"}, {"type": "예문", "en": "Cooking has always been independent from formal science.", "ko": "요리는 형식적 과학과 항상 분리되어 왔다.", "en_hl": ["Cooking has always been independent from formal science."], "ko_hl": ["요리는 형식적 과학과 항상 분리되어 왔다."], "ocr_flag": false, "verb": "has", "valency": "S+V", "arity": "2가", "id": "202-1"}, {"type": "예문", "en": "The external world is independent of our own interpretations.", "ko": "부 세상은 우리 자신의 해석과 독립되어 있다.", "en_hl": ["The external world", "independent", "our own interpretations."], "ko_hl": ["세상은 우리 자신의 해석과 독립되어 있다."], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "202-2"}, {"type": "예문", "en": "Reshoring is fundamentally concerned with where manufacturing activities are to be performed, independent of who is performing the manufacturing activities.", "ko": "리쇼어링은 누가 해당 제조 활동을 수행하는지와 관계없이 기본적으로 어디에서 제조 활동이 수행되어야 하는지와 관련이 있다.", "en_hl": ["independent of", "performing the manufacturing activities."], "ko_hl": ["누가 해당 제조 활동을 수행하는지와"], "ocr_flag": false, "verb": "is", "valency": "S+V", "arity": "2가", "id": "202-3"}, {"type": "예문", "en": "The assumption that the conclusions reached by physicists and chemists are independent of time and place is fundamental to the way geologists. biologists and cosmologists use them.", "ko": "물리학자와 화학자가 도달한 결론이 시간과 장소에 구애받지 않는다는 가정은 지질학자, 생물학자, 우주론자가 그것을 사용하는 방식에 매우 중요", "en_hl": ["are independent of time and place"], "ko_hl": ["시간과 장소에 구애받지"], "ocr_flag": false, "verb": "are", "valency": "S+V+C", "arity": "2가", "id": "202-4"}, {"type": "예문", "en": "Particle physics is part of brute reality and so it will carry on independent of any human agreement or understanding of what it is.", "ko": "입자 물리학은 적나라한 현실의 일부이고 따라서 어떤 인간의 합의나 그것이 무엇인지에 대한 이해와 별도로 계속될 것이다.", "en_hl": ["independent"], "ko_hl": ["별도로"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "202-5"}, {"type": "예문", "en": "Anonymity requires that the collective choice ought to be independent of the agents’ identities whereas neutrality requires impartiality towards the alternatives.", "ko": "익명성은 집단적 선택이 행위자들의 정체성과는 무관해야 한다고 요구하고, 반면 중립성은 대안에 대한 공정성을 요구한다.", "en_hl": ["ought", "be independent"], "ko_hl": ["해야"], "ocr_flag": false, "verb": "requires", "valency": "V+that", "arity": "2·3가", "id": "202-6"}, {"type": "예문", "en": "5) A physical reaction occurs automatically, independent of a performer's deliberate intention.", "ko": "신체적 반응은 자동적으로 일어나며, 행위자의 의도적인 의지와는 독립적이다.", "en_hl": [], "ko_hl": ["독립적이다."], "ocr_flag": false, "verb": "occurs", "valency": "S+V", "arity": "1가", "id": "202-7"}], "phonetic_ipa": "ˌɪndɪˈpɛndənt", "derived_words": [], "eng_defs": ["If one thing or person is independent of another, they are separate and not connected, so the first one is not affected or influenced by the second."], "extra_notes": ["쓰 independent from/of 8 : ㅅ와 B는 서로 분리된 관계 혹은 서로 반대의 관계"], "id": 202}, {"word": "owe", "phonetic": "ou", "senses": [{"pos": "v.", "meaning": "빛지고 있다"}], "meaning": "v. 빛지고 있다", "page": 164, "line_start": 8157, "line_end": 8194, "examples": [{"type": "기본예문", "en": "She still owes her father $3,000.", "ko": "그녀는 아직 아버지께 3.000달러의 빛이 있다.", "en_hl": ["owes"], "ko_hl": ["있다."], "ocr_flag": false, "verb": "owes", "valency": "S+V+O", "arity": "2·3가", "id": "203-0"}, {"type": "예문", "en": "Our kitchens owe much to the brilliance of science.", "ko": "우리의 부얼은 과학의 훌륭함의 덕을 많이 보고 있다.", "en_hl": ["owe much to the brilliance", "science."], "ko_hl": ["덕을 많이 보고 있다."], "ocr_flag": false, "verb": "owe", "valency": "S+V", "arity": "2·3가", "id": "203-1"}, {"type": "예문", "en": "Modern people owe much to their ancestors.", "ko": "현대인들은 그들의 조상에게 많은 것을 빚지고 있다.", "en_hl": ["ancestors."], "ko_hl": ["그들의 조상에게 많은 것을 빚지고 있다."], "ocr_flag": false, "verb": "owe", "valency": "S+V", "arity": "2·3가", "id": "203-2"}, {"type": "예문", "en": "you owe the benefits to your friend Al", "ko": "여러분은 여러분의 친구인 시에게 그 혜택을 빛지고 있다는 것", "en_hl": ["owe"], "ko_hl": ["빛지고"], "ocr_flag": false, "verb": "owe", "valency": "S+V+O", "arity": "2·3가", "id": "203-3"}, {"type": "예문", "en": "But it does not seem a sound philosophical point to say that somebody or something owes its very existence to our desire to exploit it, as if that confers some special moral right upon us.", "ko": "그러나 누군가 덕을 무언가의 생존 자체가 그것을 착취하고자 하는 우리의 욕망 덕택이라고, 마치 그것이 우리에게 어떤 특별한 도덕적 권리를 준! 는 듯이 말하는 것은 건전한 철학적 관점으로 보이지 않는다.", "en_hl": ["owes its very existence", "our", "desire"], "ko_hl": ["생존 자체가", "우리의 욕망 덕택이라고,"], "ocr_flag": false, "verb": "does", "valency": "S+V", "arity": "1·2가", "id": "203-4"}], "phonetic_ipa": "oʊ", "derived_words": [], "eng_defs": [], "extra_notes": ["owe 내에 8 : 는 덕분이다, AS 8에게 빚지다신세지다 (A … 8)"], "id": 203}, {"word": "school", "phonetic": "50000", "senses": [{"pos": "", "meaning": "학교"}], "meaning": "학교", "page": 168, "line_start": 8194, "line_end": 8226, "examples": [{"type": "기본예문", "en": "Apparently he had the advantage of fresh eyes. since he hadn't even been a swimmer himself. studying movement science in school and coaching soccer and track.", "ko": "그는 학교에서 운동 과학을 공부하고 축구와 육상을 지도했지만 스스로 수영을 해 본 적조차 없었기 때문에 분명히 신선한 시각의 장점을 누리고 있었다.", "en_hl": ["school"], "ko_hl": ["학교에서"], "ocr_flag": false, "verb": "had", "valency": "S+V+O", "arity": "2가", "id": "204-0"}, {"type": "예문", "en": "When eating from a school of fish, dolphins encircle the fish and take turns eating. one dolphin at a time.", "ko": "물고기 떼를 잡아먹을 때, 돌고래들은 물고기를 에워싸고 한 번에 돌고래 한 마리씩 교대로 먹는다.", "en_hl": ["fish,"], "ko_hl": ["물고기"], "ocr_flag": false, "verb": "dolphins", "valency": "S+V", "arity": null, "id": "204-1"}, {"type": "예문", "en": "So far as diet is concerned, | belong to no school.", "ko": "음식에 관한 한, 나는 아무 파에도 속해 있지 않다.", "en_hl": ["belong", "no school."], "ko_hl": ["나는 아무 파", "속해 있지 않다."], "ocr_flag": false, "verb": "is", "valency": "S+V", "arity": "2가", "id": "204-2"}, {"type": "예문", "en": "In analyzing ethical issues, we turn to Kant and other schools of thought and ask, “What if everyone behaved this way? What would the world be like?”", "ko": "윤리적 사안을 분석할 때 우리는 칸트와 다른 학파들에 의지하여 \"만약 모든 사람이 이 방식으로 행동한다면 어떨까? MAS 어떻게 될까?\"라고 묻", "en_hl": ["Kant and other schools", "CHE"], "ko_hl": ["칸트와 다른 학파들"], "ocr_flag": true, "verb": "turn", "valency": "S+V", "arity": "1·2가", "id": "204-3"}, {"type": "예문", "en": "Like politicians in elections, advocates of particular schools try to put ‘clear blue water’ between themselves and their rivals.", "ko": "선거철의 정치인들처럼, 특정 학파의 옹호자들은 '맑고 푸른 물두 집단 간 극명한 입장 차이)을 그들 자신과 자신들의 경쟁자들 사이에 두려고 노력한다.", "en_hl": ["particular schools"], "ko_hl": ["특정"], "ocr_flag": false, "verb": "try", "valency": "V+to R", "arity": "1·2가", "id": "204-4"}], "phonetic_ipa": "skul", "derived_words": [], "eng_defs": [], "extra_notes": ["school® 학파, 무리, 떼의 의미도 있으니 기억하자."], "id": 204}, {"word": "new", "phonetic": "nu", "senses": [{"pos": "adj.", "meaning": "새로운"}], "meaning": "adj. 새로운", "page": 168, "line_start": 8226, "line_end": 8253, "examples": [{"type": "기본예문", "en": "It does enable new types of access to information, but people's experiences of that access are uneven at best.", "ko": "그것(기술)은 정보에 새로운 유형의 접근을 실제로 가능하게 하지만. 그런 접근에 대한 사람들의 경험은 아무리 잘해도 공평하지 않다.", "en_hl": [], "ko_hl": ["새로운"], "ocr_flag": false, "verb": "does", "valency": "S+V+O", "arity": "1·2가", "id": "205-0"}, {"type": "예문", "en": "had any experience of it. Teachers who are new to the integration of social media into their teaching practice often make the mistake of focusing on a particular tool they want to use with their class instead of on the purposes or intended outcomes of a teaching and learning episode.", "ko": "소설미디어를 자신들의 수업 실행에 통합하는 것을 것을 해 보는 교사들은 흔히 수업의 목적이나 의도된 결과 대신 수업에 사용하고 싶은 특정한 도 구에 집중하는 실수를 저지른다.", "en_hl": ["experience", "Teachers who are new", "the integration", "social media into their teaching practice"], "ko_hl": ["소설미디어를 자신들의 수업 실행에 통합하는 것을 것을", "보는 교사"], "ocr_flag": false, "verb": "had", "valency": "S+V+O", "arity": "2가", "id": "205-1"}], "phonetic_ipa": "nu", "derived_words": [], "eng_defs": ["If you are new to a situation or place, or if the situation or place is new to you, you have not previously seen it or had any experience of it."], "extra_notes": ["new to A: 4에 미숙한"], "id": 205}, {"word": "cost", "phonetic": "ko:st", "senses": [{"pos": "n.", "meaning": "=, 비용"}, {"pos": "v.", "meaning": "(비용이) 들다"}], "meaning": "n. =, 비용 / v. (비용이) 들다", "page": 169, "line_start": 8253, "line_end": 8334, "examples": [{"type": "기본예문", "en": "There is thus frequently an economic cost to wilderness preservation.", "ko": "따라서 야생 보호 구역 보존에는 흔히 경제적인 비용이 존재한다.", "en_hl": [], "ko_hl": ["경제적인"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "206-0"}, {"type": "예문", "en": "Continuous emissions measurement can be costly, particularly where there are many separate sources of emissions, and for many pollution problems this may be a major disincentive to direct taxation of emissions.", "ko": "지속적인 배출물 측정은 특히 개별 배출원이 많은 경우 비용이 많이 들 수 있으며, 많은 오염 문제에 있어 이는 배출물에 직접적으로 과세하는 것에 주요한 저해 요소가 될 수 있다.", "en_hl": ["can be costly,"], "ko_hl": ["비용이", "있으며,"], "ocr_flag": false, "verb": "be", "valency": "S+V+C", "arity": "2가", "id": "206-1"}, {"type": "예문", "en": "Before you think that having such a fantastic memory would be great, it came with a cost.", "ko": "여러분이 그러한 환상적인 기억력을 갖는 것이 좋을 것이라고 생각하기 전어. 그것은 대가를 수반했다.", "en_hl": ["came with", "cost."], "ko_hl": ["그것은 대가", "수반했다."], "ocr_flag": false, "verb": "came", "valency": "V+전치사+O", "arity": "1가", "id": "206-2"}, {"type": "예문", "en": "The need for productivity gains through working harder and longer has a limit and a human toll.", "ko": "더 열심히 그리고 더 오래 일하는 ㅅ를 통한 생산성 증진의 필요성에는 한계가 있고 사람들의 희생이 따른다.", "en_hl": ["human", "BEY"], "ko_hl": [], "ocr_flag": false, "verb": "has", "valency": "S+V+O", "arity": "2가", "id": "206-3"}, {"type": "예문", "en": "Farming, compared to hunting and gathering, provided a more abundant food supply for early crop-planters, at the cost of much more labor for crop management. and poorer health caused by less diverse foods.", "ko": "수렵 ㆍ채집과 비교하여, 농사는 초기의 농작물 재배자들에게 더 풍성한 식량 죽음을 제공했는더, 농작물 관리를 위한 훨씬 더 많은 노동. 그리고 덜 다양한 식품으로 인한 더 나쁜 건강의 대가를 치르고서였다.", "en_hl": ["cost", "much more labor for crop management."], "ko_hl": ["농작물 관리를 위한 훨씬", "많은 노동.", "대가", "치르", "서였다."], "ocr_flag": false, "verb": "provided", "valency": "S+V+O", "arity": "2·3가", "id": "206-4"}, {"type": "예문", "en": "Often, these models are implemented at the expense of poor and marginalized residents and users of resources from the areas.", "ko": "흔히, 이러한 모델은 가난하고 소외된 거주자와 그 지역에서 나는 자원의 사용자의 희생으로 실행된다.", "en_hl": ["the expense"], "ko_hl": ["희생으로"], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "206-5"}, {"type": "예문", "en": "As an example, in Kenya, farmers are actively encouraged to grow export crops such as tea and coffee at the expense of basic food production.", "ko": "한 예로서, <608에서, 농부들은 기초식품 생산을 희생해가면서 차와 커피와 같은 수출 무을 재배하도록 적극적으로 독려된다.", "en_hl": ["at the", "expense of basic food production."], "ko_hl": ["기초식품 생산을 희생해가면서", "무을"], "ocr_flag": false, "verb": "are", "valency": "S+V", "arity": "2가", "id": "206-6"}, {"type": "예문", "en": "Perhaps it is important to enrich the drug manufacturers, even at the expense of one’s own health.", "ko": "아마도 심지어 자신의 건강을 희생하더라도 제약 회사들을 풍요롭게 하는 것이 중요할지도 모른다.", "en_hl": ["own"], "ko_hl": ["자신의 건강을 희생하더라도"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "206-7"}, {"type": "예문", "en": "While we encourage you to enjoy your pets, we also want to se."], "ko_hl": ["부분 일식"], "ocr_flag": false, "verb": "be", "valency": "S+V", "arity": "2가", "id": "219-1"}, {"type": "예문", "en": "As a species, we have a childlike disinterest and partial disbelief in the time before our appearance on Earth.", "ko": "하나의 종으로서, 우리는 지구에 우리가 나타나기 전의 시간에 대해 어린아이와 같은 무관심과 편파적인 불신을 지니고 있다.", "en_hl": ["partial disbelief"], "ko_hl": ["편파적인"], "ocr_flag": false, "verb": "have", "valency": "S+V+O", "arity": "2가", "id": "219-2"}, {"type": "예문", "en": "Moreover, the best practices of objectivity often combine partiality and impartiality.", "ko": "더욱이 객관성의 가장 좋은 실천들은 종종 편파성과 공정성을 결합한다.", "en_hl": ["partiality", "impartiality."], "ko_hl": ["편파성과 공정성"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "219-3"}, {"type": "예문", "en": "impartial formulation of standards for its assessment EEISEESa", "ko": "그것의 평가를 위한 기준의 공정한 공식화", "en_hl": ["impartial formulation", "EEISEESa"], "ko_hl": ["공정한 공식화"], "ocr_flag": false, "verb": null, "valency": null, "arity": null, "id": "219-4"}, {"type": "예문", "en": "Allowing lotteries as social outcomes hence seems like a necessity for impartial collective choice.", "ko": "따라서 사회적 결과로 추첨을 허용하는 것은 공정한 집단적 선택을 위해 필수적인 것처럼 보인다.", "en_hl": ["impartial collective choice."], "ko_hl": ["공정한 집단적"], "ocr_flag": false, "verb": "seems", "valency": "V+전치사+O", "arity": "2가", "id": "219-5"}, {"type": "예문", "en": "It is not a failure of impartiality to imprison a convicted criminal.", "ko": "유죄 판결을 받은 범죄자를 감금하는 것은 공평함을 위반하는 것이 아니다.", "en_hl": ["impartiality"], "ko_hl": ["공평함을"], "ocr_flag": false, "verb": "is", "valency": "S+V+C", "arity": "2가", "id": "219-6"}, {"type": "예문", "en": "Anonymity requires that the collective choice ought to be independent of the agents’ identities whereas neutrality requires impartiality towards the alternatives.", "ko": "익명성은 집단적 선택이 행위자들의 정체성과는 무관해야 한다고 요구하고, 반면 공정성을 대안에 대한 공정성을 요구한다.", "en_hl": ["ought", "impartiality"], "ko_hl": ["공정성을"], "ocr_flag": false, "verb": "require function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- highlight rendering: uses pixel-detected underline phrases from the original book ----
function applyHighlights(text, groups) {
  // groups: array of {phrases: [...], cls: 'hl'|'verb-hl', priority: number (higher wins on overlap)}
  const escapedText = escapeHtml(text);
  let ranges = [];
  for (const g of groups) {
    if (!g.phrases) continue;
    for (const p of g.phrases) {
      const escaped = escapeHtml(p);
      if (!escaped) continue;
      const idx = escapedText.indexOf(escaped);
      if (idx >= 0) ranges.push([idx, idx + escaped.length, g.cls, g.priority]);
    }
  }
  if (ranges.length === 0) return escapedText;
  // higher priority first, then earlier position, then longer span
  ranges.sort((a, b) => b[3]-a[3] || a[0]-b[0] || (b[1]-b[0])-(a[1]-a[0]));
  const kept = [];
  const occupied = [];
  for (const r of ranges) {
    const [s, e] = r;
    const overlaps = occupied.some(([os, oe]) => s < oe && e > os);
    if (!overlaps) {
      kept.push(r);
      occupied.push([s, e]);
    }
  }
  kept.sort((a, b) => a[0] - b[0]);
  let out = '';
  let pos = 0;
  for (const [s, e, cls] of kept) {
    out += escapedText.slice(pos, s) + '<mark class="' + cls + '">' + escapedText.slice(s, e) + '</mark>';
    pos = e;
  }
  out += escapedText.slice(pos);
  return out;
}

function render() {
  const main = document.getElementById('main');
  const q = currentQuery.trim().toLowerCase();
  let html = '';
  let visibleWordCount = 0;
  let visibleExCount = 0;

  DATA.forEach(entry => {
    let examples = entry.examples;
    if (currentFilter === 'checked') examples = examples.filter(ex => checkedSet.has(ex.id));
    if (currentFilter === 'flagged') examples = examples.filter(ex => ex.ocr_flag);
    if (q) {
      const wordMatch = entry.word && entry.word.toLowerCase().includes(q);
      if (!wordMatch) {
        examples = examples.filter(ex => ex.en.toLowerCase().includes(q) || ex.ko.includes(q));
      }
    }
    if (examples.length === 0) return;

    visibleWordCount++;
    visibleExCount += examples.length;

    // build combined word list: headword (with all its senses) + derived words
    const wordUnits = [];
    wordUnits.push({
      word: entry.word || '',
      senses: entry.senses || []
    });
    (entry.derived_words || []).forEach(d => {
      wordUnits.push({ word: d.word, senses: d.senses || [] });
    });

    const chipsHtml = wordUnits.map((u, i) =>
      (i > 0 ? '<span class="sep">/</span>' : '') + `<span class="chip-word">${escapeHtml(u.word)}</span>`
    ).join('');

    const meaningsHtml = wordUnits.map((u, i) => {
      const m = u.senses.map(s => `<span class="m-pos">${escapeHtml(s.pos||'')}</span>${escapeHtml(s.meaning||'')}`).join(' ');
      return (i > 0 ? '<span class="sep">/</span>' : '') + m;
    }).join('');

    const notesHtml = (entry.extra_notes && entry.extra_notes.length)
      ? entry.extra_notes.map(n => `<div class="extra-note">💡 ${escapeHtml(n)}</div>`).join('')
      : '';

    const engDefsHtml = (entry.eng_defs || []).map(d => `<div class="eng-def">📖 ${escapeHtml(d)}</div>`).join('');

    html += `<div class="word-card">
      <div class="word-head">
        <span class="word-num">#${entry.id + 1}</span>
        ${entry.phonetic_ipa ? `<span class="word-phonetic">[${escapeHtml(entry.phonetic_ipa)}]</span>` : ''}
      </div>
      <div class="word-chips" onclick="toggleWordMeaning(${entry.id})">${chipsHtml}</div>
      <div class="word-meanings" id="wmeaning-${entry.id}">${meaningsHtml}${notesHtml}</div>
      ${engDefsHtml}`;

    examples.forEach(ex => {
      const checked = checkedSet.has(ex.id);
      const tagClass = ex.type === '기본예문' ? 'base' : 'extra';
      html += `<div class="sent-card" id="card-${ex.id}">
        <div class="sent-row">
          <div class="left-col">
            <button class="listen-btn" id="listen-${ex.id}" onclick="playTTS('${ex.id}', event)">▶</button>
            ${ex.valency ? `<div class="valency-tag">${escapeHtml(ex.valency)}</div>` : ''}
            ${ex.arity ? `<div class="arity-tag">${escapeHtml(ex.arity)}</div>` : ''}
          </div>
          <div class="sent-body">
            <span class="tag ${tagClass}">${ex.type}</span>
            ${ex.ocr_flag ? '<span class="tag flag" title="OCR 인식이 불확실한 단어가 있어 원문 대조가 필요해요">⚠ 확인필요</span>' : ''}
            <div class="sent-en" onclick="toggleReveal('${ex.id}')">${applyHighlights(ex.en, [
              {phrases: ex.en_hl, cls: 'hl', priority: 2},
              {phrases: ex.verb ? [ex.verb] : [], cls: 'verb-hl', priority: 1}
            ])}</div>
            <div class="sent-ko">${applyHighlights(ex.ko, [{phrases: ex.ko_hl, cls: 'hl', priority: 2}])}</div>
          </div>
          <div class="right-col">
            <button class="chk-btn${checked ? ' checked' : ''}" onclick="toggleCheck('${ex.id}', event)">✓</button>
          </div>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  if (visibleWordCount === 0) html = '<div class="empty-msg">검색 결과가 없습니다.</div>';

  main.innerHTML = html;
  document.getElementById('statsLine').innerHTML =
    `전체 ${TOTAL_WORDS}개 단어 · ${TOTAL_EX}개 예문   |   현재 표시: ${visibleWordCount}개 단어 · ${visibleExCount}개 예문` +
    `<span class="flagnote">⚠ 확인필요(${TOTAL_FLAGGED}개)는 자동 보정 후에도 원본과 다를 수 있는 문장이야. 나머지는 원본 밑줄 위치를 픽셀 분석해서 정확히 대조하고 자동으로 오타까지 고친 거야.</span>`;
}

function toggleReveal(id) { document.getElementById('card-' + id).classList.toggle('revealed'); }

function toggleWordMeaning(entryId) {
  const el = document.getElementById('wmeaning-' + entryId);
  if (el) el.classList.toggle('revealed');
}

function toggleCheck(id, evt) {
  evt.stopPropagation();
  if (checkedSet.has(id)) checkedSet.delete(id); else checkedSet.add(id);
  saveChecked(); render();
}

function revealAll(show) {
  document.querySelectorAll('.sent-card').forEach(c => { if (show) c.classList.add('revealed'); else c.classList.remove('revealed'); });
}

function setFilter(f) {
  currentFilter = f;
  document.getElementById('btnAll').classList.toggle('active', f === 'all');
  document.getElementById('btnChecked').classList.toggle('active', f === 'checked');
  document.getElementById('btnFlagged').classList.toggle('active', f === 'flagged');
  render();
}

function clearSearch() { currentQuery=''; document.getElementById('searchInput').value=''; render(); }
document.getElementById('searchInput').addEventListener('input', (e) => { currentQuery = e.target.value; render(); });

// ---- settings / API key ----
function openSettings() {
  document.getElementById('apiKeyInput').value = localStorage.getItem('elevenlabs_key') || '';
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
function saveApiKey() {
  const v = document.getElementById('apiKeyInput').value.trim();
  if (v) localStorage.setItem('elevenlabs_key', v);
  else localStorage.removeItem('elevenlabs_key');
  closeSettings();
}

// ---- TTS ----
function findExampleById(id) {
  const [wi, si] = id.split('-').map(Number);
  return DATA[wi].examples[si];
}

async function playTTS(id, evt) {
  evt.stopPropagation();
  const btn = document.getElementById('listen-' + id);
  const key = localStorage.getItem('elevenlabs_key');
  if (!key) { openSettings(); return; }

  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    document.querySelectorAll('.listen-btn.playing').forEach(b => b.classList.remove('playing'));
  }

  if (audioCache[id]) {
    const audio = new Audio(audioCache[id]);
    currentAudio = audio;
    btn.classList.add('playing');
    audio.playbackRate = 0.7;
    audio.play();
    audio.onended = () => btn.classList.remove('playing');
    return;
  }

  const ex = findExampleById(id);
  btn.classList.add('loading');
  btn.textContent = '…';
  try {
    const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
      method: 'POST',
      headers: { 'xi-api-key': key, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: ex.en,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.4, similarity_boost: 0.75 }
      })
    });
    if (!resp.ok) throw new Error('TTS request failed: ' + resp.status);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    audioCache[id] = url;
    const audio = new Audio(url);
    currentAudio = audio;
    btn.classList.remove('loading');
    btn.textContent = '▶';
    btn.classList.add('playing');
    audio.playbackRate = 0.7;
    audio.play();
    audio.onended = () => btn.classList.remove('playing');
  } catch (err) {
    btn.classList.remove('loading');
    btn.textContent = '▶';
    alert('TTS 오류: ' + err.message + '\n(API 키가 올바른지, 크레딧이 남아있는지 확인해줘)');
  }
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수능특강 VOCA 1800 — WEEK 1~10</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f8f6;
  --card: #ffffff;
  --card2: #f3f4f8;
  --border: #e2e2de;
  --text: #1a1a18;
  --sub: #6b6b66;
  --accent: #3a4aaa;
  --accent-light: #eef2ff;
  --green: #1a7a3a;
  --num-color: #bbb;
  --day-bg: #3a4aaa;
  --ko-color: #7a5800;
  --badge-1: #dbeafe; --badge-1t: #1d4ed8;
  --badge-2: #d1fae5; --badge-2t: #065f46;
  --badge-3: #fef3c7; --badge-3t: #92400e;
}

body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── HEADER ── */
header { background:var(--day-bg); padding:12px 14px 10px; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(58,74,170,.2); }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.header-title { font-size:14px; font-weight:700; color:#fff; }
.header-sub { font-size:10px; color:rgba(255,255,255,.65); margin-top:1px; }
.search-row { display:flex; gap:8px; }
.search-input { flex:1; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); border-radius:8px; padding:7px 12px; font-size:14px; color:#fff; outline:none; }
.search-input::placeholder { color:rgba(255,255,255,.5); }
.search-input:focus { background:rgba(255,255,255,.22); border-color:rgba(255,255,255,.5); }
.quiz-toggle { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); border-radius:8px; padding:6px 12px; font-size:12px; color:#fff; cursor:pointer; white-space:nowrap; font-weight:600; flex-shrink:0; }
.quiz-toggle.active { background:rgba(255,255,255,.3); }

/* ── WEEK TABS ── */
.week-tabs { display:flex; overflow-x:auto; background:#fff; border-bottom:2px solid var(--border); scrollbar-width:none; position:sticky; top:88px; z-index:150; }
.week-tabs::-webkit-scrollbar { display:none; }
.week-tab { flex-shrink:0; padding:9px 16px; font-size:12px; font-weight:600; color:var(--sub); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; white-space:nowrap; transition:all .15s; }
.week-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.week-tab:hover { color:var(--accent); background:var(--accent-light); }

/* ── DAY FILTER ── */
.day-filter { display:flex; gap:5px; padding:7px 10px; overflow-x:auto; background:#fafafa; border-bottom:1px solid var(--border); scrollbar-width:none; position:sticky; top:128px; z-index:140; }
.day-filter::-webkit-scrollbar { display:none; }
.day-btn { padding:3px 12px; border-radius:20px; border:1.5px solid var(--border); background:#fff; font-size:11px; cursor:pointer; white-space:nowrap; color:var(--sub); font-weight:500; transition:all .15s; }
.day-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── SENTENCE LIST ── */
.sentence-list { padding:6px 10px 100px; }
.day-header { padding:12px 6px 5px; font-size:10px; font-weight:700; color:var(--accent); letter-spacing:.1em; text-transform:uppercase; }

/* ── CARD ── */
.sent-card { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:5px; overflow:hidden; }

.sent-row1 { display:flex; align-items:stretch; cursor:default; min-height:44px; }

.listen-btn {
  flex-shrink:0; width:50px;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:2px;
  background:var(--accent-light); border:none; border-right:1px solid var(--border);
  font-size:10px; color:var(--accent); cursor:pointer; font-weight:700;
  transition:background .15s; padding:0 3px; line-height:1.2;
}
.listen-btn:hover { background:#dce3ff; }
.listen-btn.loading { color:var(--sub); background:#f3f4f8; cursor:wait; }
.listen-btn.playing { color:var(--day-bg); background:#dce3ff; }
.listen-btn.error { color:#c00; background:#fff0f0; }
.listen-icon { font-size:13px; }

.sent-en-wrap { flex:1; padding:9px 11px; font-size:14px; line-height:1.55; cursor:pointer; }
.sent-en-wrap:active { background:var(--card2); }
.sent-en-wrap .hw { color:var(--accent); font-weight:700; }
.sent-en-wrap .vw { color:var(--green); font-weight:600; }

.valency-row { display:flex; gap:3px; margin-top:5px; flex-wrap:wrap; }
.val-badge { font-size:10px; font-weight:700; border-radius:4px; padding:1px 5px; }
.val-1 { background:var(--badge-1); color:var(--badge-1t); }
.val-2 { background:var(--badge-2); color:var(--badge-2t); }
.val-3 { background:var(--badge-3); color:var(--badge-3t); }

.sent-ko { display:none; padding:8px 11px 8px 50px; font-size:13px; color:var(--ko-color); line-height:1.55; border-top:1px solid var(--border); background:#fffdf5; }
.sent-ko .hw-ko { color:var(--accent); font-weight:700; }
.sent-ko .vw-ko { color:var(--green); font-weight:600; }
.sent-ko .meaning-tag { color:var(--sub); font-size:11px; }
.sent-card.revealed .sent-ko { display:block; }

/* ── QUIZ ── */
.quiz-wrap { display:none; padding:14px 10px 100px; flex-direction:column; gap:12px; }
.quiz-wrap.active { display:flex; }
.sentence-list.hidden { display:none; }
.quiz-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:26px 20px 20px; text-align:center; }
.quiz-progress { text-align:center; font-size:12px; color:var(--sub); }
.quiz-num { font-size:11px; color:var(--num-color); margin-bottom:6px; }
.quiz-word { font-size:28px; font-weight:800; color:var(--accent); font-family:Georgia,serif; margin-bottom:20px; }
.quiz-reveal-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:11px 28px; font-size:14px; cursor:pointer; font-weight:700; }
.quiz-answer { display:none; text-align:left; margin-top:14px; border-top:1px solid var(--border); padding-top:12px; }
.quiz-answer.shown { display:block; }
.quiz-meaning { font-size:16px; font-weight:700; color:var(--ko-color); margin-bottom:10px; }
.quiz-pair { margin-bottom:8px; }
.quiz-pair-en { font-size:13px; color:var(--text); line-height:1.5; margin-bottom:2px; }
.quiz-pair-ko { font-size:12px; color:var(--sub); line-height:1.4; }
.quiz-nav { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.quiz-nav-btn { padding:9px 18px; border-radius:10px; border:1.5px solid var(--border); background:var(--card); color:var(--accent); font-size:13px; cursor:pointer; font-weight:600; }
.quiz-nav-btn:hover { background:var(--accent-light); }

.empty-state { text-align:center; color:var(--sub); padding:60px 20px; font-size:14px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="header-title">수능특강 VOCA 1800</div>
      <div class="header-sub" id="headerSub">WEEK 1~10 · 1,800단어</div>
    </div>
    <button class="quiz-toggle" id="quizToggle" onclick="toggleQuiz()">퀴즈 모드</button>
  </div>
  <div class="search-row">
    <input class="search-input" id="searchInput" type="text" placeholder="단어 또는 뜻 검색..." oninput="onSearch()">
  </div>
</header>

<div class="week-tabs" id="weekTabs">
  <div class="week-tab active" onclick="selectWeek(0,this)">전체</div>
  <div class="week-tab" onclick="selectWeek(1,this)">WEEK 1</div>
  <div class="week-tab" onclick="selectWeek(2,this)">WEEK 2</div>
  <div class="week-tab" onclick="selectWeek(3,this)">WEEK 3</div>
  <div class="week-tab" onclick="selectWeek(4,this)">WEEK 4</div>
  <div class="week-tab" onclick="selectWeek(5,this)">WEEK 5</div>
  <div class="week-tab" onclick="selectWeek(6,this)">WEEK 6</div>
  <div class="week-tab" onclick="selectWeek(7,this)">WEEK 7</div>
  <div class="week-tab" onclick="selectWeek(8,this)">WEEK 8</div>
  <div class="week-tab" onclick="selectWeek(9,this)">WEEK 9</div>
  <div class="week-tab" onclick="selectWeek(10,this)">WEEK 10</div>
</div>

<div class="day-filter" id="dayFilter"></div>

<div class="sentence-list" id="sentenceList"></div>

<div class="quiz-wrap" id="quizWrap">
  <div class="quiz-progress" id="quizProgress"></div>
  <div class="quiz-card">
    <div class="quiz-num" id="quizNum"></div>
    <div class="quiz-word" id="quizWord"></div>
    <button class="quiz-reveal-btn" onclick="revealQuiz()">뜻 확인</button>
    <div class="quiz-answer" id="quizAnswer"></div>
  </div>
  <div class="quiz-nav">
    <button class="quiz-nav-btn" onclick="prevQuiz()">◀ 이전</button>
    <button class="quiz-nav-btn" onclick="shuffleQuiz()">🔀 섞기</button>
    <button class="quiz-nav-btn" onclick="nextQuiz()">다음 ▶</button>
  </div>
</div>

<script>
const ALL_DATA = [{"num": 1, "wk": 1, "word": "enrich", "meaning": "풍요롭게 하다 풍부하게 하다", "pairs": [{"en": "The cultural diversity that enriches our community.", "ko": "우리 공동체를 풍요롭게 하는 문화적 다양성"}, {"en": "This variability enriches the social fabric.", "ko": "이러한 변동성은 사회구조를 풍부하게 한다."}]}, {"num": 2, "wk": 1, "word": "cuisine", "meaning": "요리 요리법", "pairs": [{"en": "A special chance to explore global cuisine.", "ko": "세계의 요리를 살펴 볼 특별한 기회"}, {"en": "Kevin mastered traditional Korean cuisine.", "ko": "케빈은 전통적인 한국 요리법을 익혔다."}]}, {"num": 3, "wk": 1, "word": "diversity", "meaning": "다양성", "pairs": [{"en": "The unity that diversity brings to our school.", "ko": "다양성이 우리 학교에 가져다주는 화학"}, {"en": "Embrace diversity, identities, and cultural differences.", "ko": "다양성, 정체성, 문화적 차이를 포용하다."}]}, {"num": 4, "wk": 1, "word": "manuscript", "meaning": "원고", "pairs": [{"en": "The revision deadline of your manuscript.", "ko": "귀하의 원고 수정 마담일"}, {"en": "Jane submitted her manuscript for review.", "ko": "제인은 심사를 위해 원고를 제출했다."}]}, {"num": 5, "wk": 1, "word": "cooperation", "meaning": "협조 협력 협동", "pairs": [{"en": "We kindly ask for your cooperation in addressing the reviewers comments.", "ko": "저희는 검토자들의 의견을 처리하는 데 귀하의 협조를 간곡히 부탁 드립니다."}, {"en": "Facilitate cooperation between people.", "ko": "사람들 사이의 협력을 촉진하다."}]}, {"num": 6, "wk": 1, "word": "insightful", "meaning": "통찰력 있는", "pairs": [{"en": "The reviewers have provided insightful and critical feedback.", "ko": "검토자들은 통찰력 있고 중대한 피드백을 제공했습니다."}, {"en": "The most charming and insightful person.", "ko": "가장 매력적이고 통찰력 있는 사람"}]}, {"num": 7, "wk": 1, "word": "submit", "meaning": "제출하다 항복하다", "pairs": [{"en": "Please submit a revised version of your manuscript.", "ko": "귀하에 원고 수정본을 제출해 주시기 바랍니다."}, {"en": "Commit a one-minute voice recording.", "ko": "1분짜리 목소리 녹음을 제출하다."}]}, {"num": 8, "wk": 1, "word": "incorporate", "meaning": "포함하다 통합하다", "pairs": [{"en": "Incorporating these suggestions will significantly improve the manuscript.", "ko": "이 제안사항들을 포함하 // state
let currentWeek = 0;
let currentDay  = 0;  // 0=전체, 1~6=해당 day
let searchQ     = '';

// helpers
function getDay(num) {
  const within = (num-1) % 180;
  return Math.floor(within/30) + 1;
}

function filteredData() {
  return ALL_DATA.filter(e => {
    if (currentWeek && e.wk !== currentWeek) return false;
    if (currentDay  && getDay(e.num) !== currentDay) return false;
    if (searchQ) {
      const q = searchQ;
      return e.word.toLowerCase().includes(q) ||
             e.meaning.toLowerCase().includes(q) ||
             e.pairs.some(p => p.en.toLowerCase().includes(q) || p.ko.includes(q));
    }
    return true;
  });
}

function highlightEN(sentence, headword) {
  const hw = headword.toLowerCase().replace(/[^a-z]/g,'');
  const hwV = new Set([hw,hw+'s',hw+'es',hw+'ed',hw+'ing',hw+'er',hw+'ly',hw+'d',
    hw.replace(/e$/,'ing'),hw.replace(/e$/,'ed'),hw.replace(/e$/,'er'),
    hw.replace(/y$/,'ies'),hw.replace(/y$/,'ied')]);
  const csatKeys = Object.keys(CSAT_VOCAB).filter(k=>k!==hw);
  function csatMatch(tok) {
    const t=tok.toLowerCase().replace(/[^a-z]/g,'');
    if(!t)return false;
    return csatKeys.includes(t)||csatKeys.includes(t.replace(/s$/,''))||
           csatKeys.includes(t.replace(/es$/,''))||csatKeys.includes(t.replace(/ed$/,''))||
           csatKeys.includes(t.replace(/ing$/,''))||csatKeys.includes(t.replace(/er$/,''));
  }
  return sentence.split(/(\b[A-Za-z'-]+\b)/).map(tok=>{
    const cl=tok.toLowerCase().replace(/[^a-z]/g,'');
    if(!cl)return tok;
    if(hwV.has(cl))return`<span class="hw">${tok}</span>`;
    if(csatMatch(tok))return`<span class="vw">${tok}</span>`;
    return tok;
  }).join('');
}

function highlightKO(ko, meaning, sentence, headword) {
  const hw=headword.toLowerCase().replace(/[^a-z]/g,'');
  const meaningTerms=meaning.replace(/[,，·]/g,' ').split(/\s+/)
    .map(t=>t.trim()).filter(t=>t.length>=2).sort((a,b)=>b.length-a.length);

  // 예문에 등장하는 csat 어휘 수집
  const csatInSent=[];
  Object.entries(CSAT_VOCAB).forEach(([eng,kor])=>{
    if(eng===hw)return;
    const sl=sentence.toLowerCase();
    if([eng,eng+'s',eng+'es',eng+'ed',eng+'ing',eng+'er',eng+'ly',
        eng.replace(/e$/,'ing'),eng.replace(/e$/,'ed'),eng.replace(/y$/,'ied')]
        .some(v=>sl.includes(v)))
      csatInSent.push({kor});
  });

  // 한국어 어미 변형 후보 생성 (사전값 '이성적인' → ['이성적인','이성적','이성적으로','이성적이'])
  function koVariants(base) {
    const b = base.replace(/[이하]다$/, '').replace(/인$/, '').replace(/한$/, '').replace(/된$/, '').replace(/적$/, '');
    const stems = [base, b];
    // 동사형 어미
    const vs = [];
    for(const s of stems) {
      vs.push(s, s+'인', s+'한', s+'는', s+'이', s+'을', s+'으로', s+'하다', s+'하는', s+'하여', s+'하고', s+'됨', s+'됩', s+'적인', s+'적');
    }
    return [...new Set(vs)].filter(v=>v.length>=2);
  }

  let result=ko;

  // 표제어 뜻 파란색
  for(const term of meaningTerms.slice(0,3)){
    if(result.includes(term)&&!result.includes('§HW§')){
      result=result.replace(term,`§HW§${term}§/HW§`);break;
    }
  }

  // csat 어휘 뜻 초록색 - 변형 포함 매칭
  for(const {kor} of csatInSent){
    const candidates = koVariants(kor).sort((a,b)=>b.length-a.length);
    let matched=false;
    for(const kt of candidates){
      if(kt.length<2)continue;
      const idx=result.indexOf(kt);
      if(idx>=0){
        // 이미 마킹된 구간인지 확인
        const before=result.slice(0,idx);
        const openHW=(before.match(/§HW§/g)||[]).length;
        const closeHW=(before.match(/§\/HW§/g)||[]).length;
        const openVW=(before.match(/§VW§/g)||[]).length;
        const closeVW=(before.match(/§\/VW§/g)||[]).length;
        if(openHW===closeHW && openVW===closeVW){
          result=result.slice(0,idx)+`§VW§${kt}§/VW§`+result.slice(idx+kt.length);
          matched=true; break;
        }
      }
    }
  }

  return result
    .replace(/§HW§(.*?)§\/HW§/g,'<span class="hw-ko">$1</span>')
    .replace(/§VW§(.*?)§\/VW§/g,'<span class="vw-ko">$1</span>');
}

// ── RENDER DAY FILTER ──
function renderDayFilter() {
  const df = document.getElementById('dayFilter');
  const wk = currentWeek;
  if (!wk) { df.innerHTML=''; return; }

  let html = `<button class="day-btn${currentDay===0?' active':''}" onclick="selectDay(0,this)">전체</button>`;
  const dayStart = (wk-1)*6+1;
  for(let d=1;d<=6;d++){
    const globalDay=dayStart+d-1;
    html+=`<button class="day-btn${currentDay===d?' active':''}" onclick="selectDay(${d},this)">Day ${globalDay}</button>`;
  }
  df.innerHTML=html;
}

// ── RENDER LIST ──
function renderList() {
  const list=document.getElementById('sentenceList');
  const data=filteredData();
  if(!data.length){list.innerHTML='<div class="empty-state">검색 결과 없음</div>';return;}

  let html='';
  let lastDay=-1;

  data.forEach(entry=>{
    const day=getDay(entry.num);
    const globalDay=(entry.wk-1)*6+day;
    if(day!==lastDay){
      const label=currentWeek?`Day ${globalDay}`:`WEEK ${entry.wk} · Day ${globalDay}`;
      html+=`<div class="day-header">${label}</div>`;
      lastDay=day;
    }
    const valData=VALENCY[entry.word.toLowerCase()];
    entry.pairs.forEach((p,pi)=>{
      const key=`${entry.num}-${pi}`;
      const revealed=revealedSet.has(key);
      const enHtml=highlightEN(p.en,entry.word);
      const koHtml=highlightKO(p.ko,entry.meaning,p.en,entry.word);
      let valHtml='';
      if(pi===0&&valData){
        valHtml='<div class="valency-row">'+valData.map(v=>{
          const cls=v==='1가'?'val-1':v==='2가'?'val-2':'val-3';
          return`<span class="val-badge ${cls}">${v}</span>`;
        }).join('')+'</div>';
      }
      const safeText=p.en.replace(/"/g,'&quot;');
      html+=`<div class="sent-card${revealed?' revealed':''}" id="card-${key}">
  <div class="sent-row1">
    <button class="listen-btn" id="btn-${key}" data-text="${safeText}" onclick="handleListen(event,'${key}')">
      <span class="listen-icon">▶</span><span>듣기</span>
    </button>
    <div class="sent-en-wrap" onclick="toggleReveal('${key}')">
      ${enHtml}${valHtml}
    </div>
  </div>
  <div class="sent-ko">${koHtml} <span class="meaning-tag">(${entry.meaning})</span></div>
</div>`;
    });
  });
  list.innerHTML=html;
  // update sub header
  const total=data.length;
  document.getElementById('headerSub').textContent=
    `${currentWeek?'WEEK '+currentWeek:'WEEK 1~10'} · ${total}개 표시 중`;
}

// ── EVENTS ──
function selectWeek(wk, el) {
  currentWeek=wk; currentDay=0;
  document.querySelectorAll('.week-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderDayFilter();
  renderList();
}

function selectDay(day, el) {
  currentDay=day;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function onSearch() {
  searchQ=document.getElementById('searchInput').value.toLowerCase();
  renderList();
}

function toggleReveal(key) {
  if(revealedSet.has(key))revealedSet.delete(key);
  else revealedSet.add(key);
  const card=document.getElementById('card-'+key);
  if(card)card.classList.toggle('revealed',revealedSet.has(key));
}

// ── TTS ──
async function handleListen(e, key) {
  e.stopPropagation();
  const btn=document.getElementById('btn-'+key);
  const text=btn.getAttribute('data-text');
  if(playingKey===key){
    if(playingAudio){playingAudio.pause();playingAudio=null;}
    btn.innerHTML='<span class="listen-icon">▶</span><span>듣기</span>';
    btn.className='listen-btn';playingKey=null;return;
  }
  if(playingAudio){playingAudio.pause();playingAudio=null;}
  if(playingKey){
    const pb=document.getElementById('btn-'+playingKey);
    if(pb){pb.innerHTML='<span class="listen-icon">▶</span><span>듣기</span>';pb.className='listen-btn';}
  }
  playingKey=key;
  btn.innerHTML='<span class="listen-icon">◌</span><span>로딩</span>';
  btn.className='listen-btn loading';
  try{
    let url=audioCache[key];
    if(!url){
      const res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`,{
        method:'POST',
        headers:{'Content-Type':'application/json','xi-api-key':EL_KEY},
        body:JSON.stringify({text,model_id:TTS_MODEL,voice_settings:{stability:.5,similarity_boost:.75,speed:.7}})
      });
      if(!res.ok)throw new Error('API 오류');
      url=URL.createObjectURL(await res.blob());
      audioCache[key]=url;
    }
    const audio=new Audio(url);playingAudio=audio;
    btn.innerHTML='<span class="listen-icon">■</span><span>정지</span>';
    btn.className='listen-btn playing';
    audio.onended=()=>{btn.innerHTML='<span class="listen-icon">▶</span><span>듣기</span>';btn.className='listen-btn';playingKey=null;playingAudio=null;};
    audio.onerror=()=>{btn.innerHTML='<span class="listen-icon">⚠</span><span>오류</span>';btn.className='listen-btn error';setTimeout(()=>{btn.innerHTML='<span class="listen-icon">▶</span><span>듣기</span>';btn.className='listen-btn';},2000);playingKey=null;playingAudio=null;};
    audio.play();
  }catch(err){
    btn.innerHTML='<span class="listen-icon">⚠</span><span>오류</span>';btn.className='listen-btn error';
    setTimeout(()=>{btn.innerHTML='<span class="listen-icon">▶</span><span>듣기</span>';btn.className='listen-btn';},2500);
    playingKey=null;playingAudio=null;
  }
}

function toggleQuiz(){
  quizMode=!quizMode;
  const tog=document.getElementById('quizToggle');
  const lst=document.getElementById('sentenceList');
  const qw=document.getElementById('quizWrap');
  if(quizMode){
    tog.textContent='학습 모드';tog.classList.add('active');

    quizList=[...filteredData()];quizIndex=0;renderQuiz();
  }else{
    tog.textContent='퀴즈 모드';tog.classList.remove('active');
    lst.classList.remove('hidden');qw.classList.remove('active');
  }
}

function renderQuiz(){
  const e=quizList[quizIndex];
  document.getElementById('quizProgress').textContent=`${quizIndex+1} / ${quizList.length}`;
  document.getElementById('quizNum').textContent=`#${String(e.num).padStart(4,'0')} · WEEK${e.wk}`;
  document.getElementById('quizWord').textContent=e.word;
  const ans=document.getElementById('quizAnswer');
  ans.classList.remove('shown');ans.innerHTML='';
}

function revealQuiz(){
  const e=quizList[quizIndex];
  let html=`<div class="quiz-meaning">${e.meaning}</div>`;
  e.pairs.forEach(p=>{
    html+=`<div class="quiz-pair"><div class="quiz-pair-en">${highlightEN(p.en,e.word)}</div><div class="quiz-pair-ko">${p.ko}</div></div>`;
  });
  const ans=document.getElementById('quizAnswer');ans.innerHTML=html;ans.classList.add('shown');
}

function nextQuiz(){quizIndex=(quizIndex+1)%quizList.length;renderQuiz();}
function prevQuiz(){quizIndex=(quizIndex-1+quizList.length)%quizList.length;renderQuiz();}
function shuffleQuiz(){
  for(let i=quizList.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[quizList[i],quizList[j]]=[quizList[j],quizList[i]];
  }
  quizIndex=0;renderQuiz();
}

// init
renderList();
</script>

V O]", "tag": "v2", "verb": "influence"}, {"type": "item", "num": 424, "en": "Initial conditions determine long-term trajectories.", "ko": "초기 조건이 장기적 궤적을 결정한다.", "point": "[S V O/wh-]", "tag": "v2", "verb": "determine"}, {"type": "item", "num": 425, "en": "Nature selects for traits that aid survival.", "ko": "자연은 생존에 도움이 되는 특성을 선택한다.", "point": "[S V O]", "tag": "v2", "verb": "select"}, {"type": "item", "num": 426, "en": "The brain filters irrelevant stimuli automatically.", "ko": "뇌는 무관한 자극을 자동으로 걸러낸다.", "point": "[S V O]", "tag": "v2", "verb": "filter"}, {"type": "item", "num": 427, "en": "DNA encodes the instructions for life.", "ko": "DNA는 생명의 지침을 부호화한다.", "point": "[S V O]", "tag": "v2", "verb": "encode"}, {"type": "item", "num": 428, "en": "Stress hormones activate the fight-or-flight response.", "ko": "스트레스 호르몬은 투쟁-도피 반응을 활성화한다.", "point": "[S V O]", "tag": "v2", "verb": "activate"}, {"type": "item", "num": 429, "en": "Pain inhibits normal cognitive function.", "ko": "통증은 정상적인 인지 기능을 억제한다.", "point": "[S V O]", "tag": "v2", "verb": "inhibit"}, {"type": "item", "num": 430, "en": "The liver regulates blood sugar levels.", "ko": "간은 혈당 수치를 조절한다.", "point": "[S V O]", "tag": "v2", "verb": "regulate"}, {"type": "item", "num": 431, "en": "Species that cannot adapt tend to disappear.", "ko": "적응하지 못하는 종은 사라지는 경향이 있다.", "point": "[S (to NP)]", "tag": "v2", "verb": "adapt", "multiVal": [1, 3], "note": "3가(adapt O to)와 구별"}, {"type": "item", "num": 432, "en": "Living systems respond to environmental feedback.", "ko": "생명 시스템은 환경 피드백에 반응한다.", "point": "[S (to NP)]", "tag": "v2", "verb": "respond", "note": "1탄 respond와 예문 다름"}, {"type": "item", "num": 433, "en": "Cells compete for limited resources.", "ko": "세포들은 제한된 자원을 두고 경쟁한다.", "point": "[S (with NP/for NP)]", "tag": "v2", "verb": "compete"}, {"type": "item", "num": 434, "en": "Ideas survive when they are useful.", "ko": "아이디어는 유용할 때 살아남는다.", "point": "[S (NP)]", "tag": "v2", "verb": "survive"}, {"type": "item", "num": 435, "en": "Organisms that reproduce faster dominate populations.", "ko": "더 빠르게 번식하는 유기체가 개체군을 지배한다.", "point": "[S]", "tag": "v2", "verb": "reproduce", "multiVal": [1, 2], "note": "2탄의 reproduce(재생산하다)와 구별"}, {"type": "item", "num": 436, "en": "Outcomes always depend on context.", "ko": "결과는 항상 맥락에 달려 있다.", "point": "[S (on NP)]", "tag": "v2", "verb": "depend", "note": "on-구 의미상 필수"}, {"type": "item", "num": 437, "en": "Intuition and logic rely on different neural systems.", "ko": "직관과 논리는 서로 다른 신경 시스템에 의존한다.", "point": "[S (on NP)]", "tag": "v2", "verb": "rely"}, {"type": "item", "num": 438, "en": "Every component contributes to the whole.", "ko": "모든 구성 요소는 전체에 기여한다.", "point": "[S (to NP)]", "tag": "v2", "verb": "contribute", "note": "to-구 의미상 필수"}, {"type": "item", "num": 439, "en": "Small changes can result in large effects.", "ko": "작은 변화가 큰 효과를 낳을 수 있다.", "point": "[S (in/from NP)]", "tag": "v2", "verb": "result", "note": "in/from 구별 중요"}, {"type": "item", "num": 440, "en": "Systems tend toward equilibrium.", "ko": "시스템은 평형 상태로 향하는 경향이 있다.", "point": "[S to-inf]", "tag": "v2", "verb": "tend", "multiVal": [1, 2], "note": "to-inf 필수"}, {"type": "item", "num": 441, "en": "The brain constantly seeks patterns in noise.", "ko": "뇌는 끊임없이 소음 속에서 패턴을 찾는다.", "point": "[S V O/to-inf]", "tag": "v2", "verb": "seek"}, {"type": "item", "num": 442, "en": "Every theory attempts to reduce complexity.", "ko": "모든 이론은 복잡성을 줄이려 시도한다.", "point": "[S V O/to-inf]", "tag": "v2", "verb": "attempt"}, {"type": "item", "num": 443, "en": "Novices struggle with what experts do automatically.", "ko": "초보자는 전문가가 자동으로 하는 것을 힘겨워한다.", "point": "[S (to-inf/with NP)]", "tag": "v2", "verb": "struggle"}, {"type": "item", "num": 444, "en": "Gardeners tend the soil before planting.", "ko": "정원사는 심기 전에 토양을 가꾼다.", "point": "[S V O]", "tag": "v2", "verb": "tend", "multiVal": [1, 2], "note": "440번의 타동사 용법"}, {"type": "item", "num": 445, "en": "Good questions gain us better understanding.", "ko": "좋은 질문은 우리에게 더 나은 이해를 가져다준다.", "point": "[S V IO DO]", "tag": "v2", "verb": "gain", "multiVal": [2, 3], "note": "394번의 추가 패턴"}, {"type": "item", "num": 446, "en": "Poor communication loses teams their momentum.", "ko": "소통 부재는 팀에게서 추진력을 빼앗는다.", "point": "[S V IO DO]", "tag": "v2", "verb": "lose", "multiVal": [2, 3]}, {"type": "item", "num": 447, "en": "Trust must be earned, not assumed.", "ko": "신뢰는 가정하는 것이 아니라 얻어야 한다.", "point": "[S V O]", "tag": "v2", "verb": "earn"}, {"type": "item", "num": 448, "en": "Organisms spend energy on reproduction.", "ko": "유기체는 번식에 에너지를 소비한다.", "point": "[S V O (on NP)]", "tag": "v2", "verb": "spend"}, {"type": "item", "num": 449, "en": "Inefficient systems waste enormous resources.", "ko": "비효율적인 시스템은 방대한 자원을 낭비한다.", "point": "[S V O]", "tag": "v2", "verb": "waste"}, {"type": "item", "num": 450, "en": "Cities consume 80% of global energy.", "ko": "도시는 전 세계 에너지의 80%를 소비한다.", "point": "[S V O]", "tag": "v2", "verb": "consume"}, {"type": "item", "num": 451, "en": "Anxiety produces distorted risk assessments.", "ko": "불안은 왜곡된 위험 평가를 만들어낸다.", "point": "[S V O]", "tag": "v2", "verb": "produce", "note": "293번과 예문 다름"}, {"type": "item", "num": 452, "en": "Cells receive signals through receptor proteins.", "ko": "세포는 수용체 단백질을 통해 신호를 받는다.", "point": "[S V O]", "tag": "v2", "verb": "receive"}, {"type": "item", "num": 453, "en": "Blood delivers nutrients to every organ.", "ko": "혈액은 모든 기관에 영양소를 전달한다.", "point": "[S V O (to NP)]", "tag": "v2", "verb": "deliver", "note": "수여 패턴도 가능"}, {"type": "item", "num": 454, "en": "Conflict generates creative solutions.", "ko": "갈등은 창의적 해결책을 만들어낸다.", "point": "[S V O]", "tag": "v2", "verb": "generate", "note": "1탄과 예문 다름"}, {"type": "item", "num": 455, "en": "Feedback loops maintain system stability.", "ko": "피드백 루프는 시스템 안정성을 유지한다.", "point": "[S V O]", "tag": "v2", "verb": "maintain"}, {"type": "item", "num": 456, "en": "Writing preserves knowledge across generations.", "ko": "글쓰기는 세대를 넘어 지식을 보존한다.", "point": "[S V O]", "tag": "v2", "verb": "preserve"}, {"type": "item", "num": 457, "en": "Rest restores the brain's processing capacity.", "ko": "휴식은 뇌의 처리 능력을 회복시킨다.", "point": "[S V O (to NP)]", "tag": "v2", "verb": "restore"}, {"type": "item", "num": 458, "en": "Chronic inflammation damages tissue over time.", "ko": "만성 염증은 시간이 지나면서 조직을 손상시킨다.", "point": "[S V O]", "tag": "v2", "verb": "damage"}, {"type": "item", "num": 459, "en": "Experience alters synaptic connections.", "ko": "경험은 시냅스 연결을 변화시킨다.", "point": "[S V O]", "tag": "v2", "verb": "alter", "note": "1탄과 예문 다름"}, {"type": "item", "num": 460, "en": "Early attachment shapes adult relationships.", "ko": "초기 애착은 성인의 관계를 형성한다.", "point": "[S V O]", "tag": "v2", "verb": "shape", "note": "2탄과 예문 다름"}, {"type": "item", "num": 461, "en": "Reading transforms the structure of the brain.", "ko": "독서는 뇌의 구조를 변화시킨다.", "point": "[S V O]", "tag": "v2", "verb": "transform", "multiVal": [2, 3], "note": "2탄(transform into)의 자동사 용법"}, {"type": "item", "num": 462, "en": "Repetition establishes automatic behaviour.", "ko": "반복은 자동 행동을 확립한다.", "point": "[S V O]", "tag": "v2", "verb": "establish"}, {"type": "item", "num": 463, "en": "Challenge strengthens adaptive capacity.", "ko": "도전은 적응 능력을 강화한다.", "point": "[S V O]", "tag": "v2", "verb": "strengthen"}, {"type": "item", "num": 464, "en": "Isolation weakens immune function.", "ko": "고립은 면역 기능을 약화시킨다.", "point": "[S V O]", "tag": "v2", "verb": "weaken"}, {"type": "item", "num": 465, "en": "Curiosity expands the range of possible responses.", "ko": "호기심은 가능한 반응의 범위를 확장한다.", "point": "[S V O]", "tag": "v2", "verb": "expand", "note": "1가(팽창하다)로도 쓰임"}, {"type": "item", "num": 466, "en": "Fear narrows attention to the perceived threat.", "ko": "두려움은 지각된 위협으로 주의를 좁힌다.", "point": "[S V O]", "tag": "v2", "verb": "narrow", "note": "1가(좁아지다)로도 쓰임"}, {"type": "item", "num": 467, "en": "Climate change shifts species distributions.", "ko": "기후변화는 종의 분포를 이동시킨다.", "point": "[S V O]", "tag": "v2", "verb": "shift", "note": "1가(이동하다)로도 쓰임"}, {"type": "item", "num": 468, "en": "Self-interest drives much of human behaviour.", "ko": "자기 이익이 많은 인간 행동을 이끈다.", "point": "[S V O]", "tag": "v2", "verb": "drive", "multiVal": [2, 3], "note": "377번의 기본 2가 패턴"}, {"type": "item", "num": 469, "en": "Trauma can block normal memory formation.", "ko": "트라우마는 정상적인 기억 형성을 방해할 수 있다.", "point": "[S V O]", "tag": "v2", "verb": "block"}, {"type": "item", "num": 470, "en": "A single cue can trigger a deeply ingrained habit.", "ko": "단 하나의 신호가 깊이 새겨진 습관을 촉발할 수 있다.", "point": "[S V O]", "tag": "v2", "verb": "trigger", "note": "1탄과 예문 다름"}, {"type": "item", "num": 471, "en": "The team tested the hypothesis on a large sample.", "ko": "팀은 대규모 샘플로 가설을 검증했다.", "point": "[S V O on NP]", "tag": "v2", "verb": "test", "multiVal": [2, 3], "note": "323번의 추가 패턴"}, {"type": "item", "num": 472, "en": "We base predictions on historical patterns.", "ko": "우리는 역사적 패턴에 근거해 예측한다.", "point": "[S V O on NP]", "tag": "v2", "verb": "base"}, {"type": "item", "num": 473, "en": "Good teaching focuses attention strategically.", "ko": "좋은 가르침은 주의를 전략적으로 집중시킨다.", "point": "[S V O (on NP)]", "tag": "v2", "verb": "focus", "note": "자동사(focus on)로도 쓰임"}, {"type": "item", "num": 474, "en": "Resources should be directed toward the root cause.", "ko": "자원은 근본 원인을 향해 투입되어야 한다.", "point": "[S V O to/toward NP]", "tag": "v2", "verb": "direct"}, {"type": "item", "num": 475, "en": "Abstract principles must be applied carefully.", "ko": "추상적 원칙은 신중하게 적용되어야 한다.", "point": "[S V O (to NP)]", "tag": "v2", "verb": "apply", "note": "1가(apply to)로도 쓰임"}, {"type": "item", "num": 476, "en": "Universities introduce students to new frameworks.", "ko": "대학은 학생들에게 새로운 틀을 소개한다.", "point": "[S V IO O / S V O to NP]", "tag": "v2", "verb": "introduce"}, {"type": "item", "num": 477, "en": "Travel exposes people to different problem-solving styles.", "ko": "여행은 사람들을 다양한 문제 해결 방식에 노출시킨다.", "point": "[S V O to NP]", "tag": "v2", "verb": "expose", "note": "2탄·1탄과 예문 다름"}, {"type": "item", "num": 478, "en": "The theory connects brain structure to behaviour.", "ko": "이론은 뇌 구조를 행동에 연결한다.", "point": "[S V O to NP]", "tag": "v2", "verb": "connect", "multiVal": [2, 3], "note": "319번의 추가 패턴"}, {"type": "item", "num": 479, "en": "Reductionism reduces complex systems to their parts.", "ko": "환원주의는 복잡한 시스템을 부품으로 축소한다.", "point": "[S V O to NP]", "tag": "v2", "verb": "reduce", "multiVal": [2, 3], "note": "305번의 추가 패턴"}, {"type": "item", "num": 480, "en": "The body converts sunlight into vitamin D.", "ko": "몸은 햇빛을 비타민 D로 전환한다.", "point": "[S V O into NP]", "tag": "v2", "verb": "convert", "note": "2탄과 예문 다름"}, {"type": "item", "num": 481, "en": "Education turns raw talent into refined skill.", "ko": "교육은 원석 같은 재능을 정교한 기술로 바꾼다.", "point": "[S V O into NP]", "tag": "v2", "verb": "turn", "multiVal": [1, 3], "note": "248번의 확장"}, {"type": "item", "num": 482, "en": "Analysis breaks complexity into manageable parts.", "ko": "분석은 복잡성을 다루기 쉬운 부분으로 나눈다.", "point": "[S V O into NP]", "tag": "v2", "verb": "break", "multiVal": [2, 3], "note": "328번의 추가 패턴"}, {"type": "item", "num": 483, "en": "One rule does not hold for all cases.", "ko": "하나의 규칙이 모든 경우에 적용되지는 않는다.", "point": "[S V O for NP]", "tag": "v2", "verb": "hold", "multiVal": [1, 2, 3]}, {"type": "item", "num": 484, "en": "Dialogue opens the mind to other possibilities.", "ko": "대화는 마음을 다른 가능성에 열어준다.", "point": "[S V O to NP]", "tag": "v2", "verb": "open", "multiVal": [2, 3], "note": "329번의 추가 패턴"}, {"type": "item", "num": 485, "en": "Certainty closes the mind to new evidence.", "ko": "확신은 새로운 증거에 마음을 닫게 한다.", "point": "[S V O to NP]", "tag": "v2", "verb": "close", "multiVal": [2, 3], "note": "330번의 추가 패턴"}, {"type": "item", "num": 486, "en": "Automation frees workers from dangerous tasks.", "ko": "자동화는 노동자를 위험한 작업에서 해방시킨다.", "point": "[S V O from NP]", "tag": "v2", "verb": "free"}, {"type": "item", "num": 487, "en": "Rest clears the brain of metabolic waste.", "ko": "휴식은 뇌에서 대사 노폐물을 제거한다.", "point": "[S V O of NP]", "tag": "v2", "verb": "clear"}, {"type": "item", "num": 488, "en": "Good narrative fills data with meaning.", "ko": "좋은 서사는 데이터를 의미로 채운다.", "point": "[S V O with NP]", "tag": "v2", "verb": "fill"}, {"type": "item", "num": 489, "en": "The leader charged the team with finding a solution.", "ko": "리더는 팀에게 해결책을 찾는 임무를 맡겼다.", "point": "[S V O with NP]", "tag": "v2", "verb": "charge"}, {"type": "item", "num": 490, "en": "We tend to credit individuals with collective achievements.", "ko": "우리는 집단적 성과를 개인의 공으로 돌리는 경향이 있다.", "point": "[S V O with NP]", "tag": "v2", "verb": "credit"}, {"type": "item", "num": 491, "en": "Evolution rewards cooperation with long-term stability.", "ko": "진화는 협력에 장기적 안정성으로 보상한다.", "point": "[S V O with NP]", "tag": "v2", "verb": "reward"}, {"type": "item", "num": 492, "en": "The brain matches incoming input with stored patterns.", "ko": "뇌는 들어오는 입력을 저장된 패턴과 대조한다.", "point": "[S V O with/to NP]", "tag": "v2", "verb": "match"}, {"type": "item", "num": 493, "en": "Nothing can compare evolution to intelligent design.", "ko": "진화를 지적 설계와 단순 비교할 수는 없다.", "point": "[S V O to/with NP]", "tag": "v2", "verb": "compare"}, {"type": "item", "num": 494, "en": "Researchers relate early experience to adult behaviour.", "ko": "연구자들은 초기 경험을 성인 행동과 연결한다.", "point": "[S V O to NP]", "tag": "v2", "verb": "relate"}, {"type": "item", "num": 495, "en": "Scrutiny exposed the argument as circular.", "ko": "면밀한 검토는 그 논증이 순환 논리임을 드러냈다.", "point": "[S V O as NP]", "tag": "v2", "verb": "expose"}, {"type": "item", "num": 496, "en": "The case study revealed deep flaws to the committee.", "ko": "사례 연구는 위원회에 심각한 결함을 드러냈다.", "point": "[S V O to NP]", "tag": "v2", "verb": "reveal", "multiVal": [2, 3]}, {"type": "item", "num": 497, "en": "Experiments show humans to be deeply social.", "ko": "실험들은 인간이 깊이 사회적임을 보여준다.", "point": "[S V O to-inf]", "tag": "v2", "verb": "show", "multiVal": [2, 3]}, {"type": "item", "num": 498, "en": "The shortcut proved itself a fatal error.", "ko": "그 지름길은 치명적 실수임이 드러났다.", "point": "[S V O OC(adj/NP)]", "tag": "v2", "verb": "prove", "multiVal": [2, 3], "note": "343번의 추가 패턴"}, {"type": "item", "num": 499, "en": "The crisis made cooperation a necessity.", "ko": "위기는 협력을 필수로 만들었다.", "point": "[S V O OC(NP)] causative", "tag": "v2", "verb": "make", "multiVal": [2, 3], "note": "242번의 추가 패턴"}, {"type": "item", "num": 500, "en": "Future generations may find our certainties naive.", "ko": "미래 세대는 우리의 확신을 순진하게 여길지도 모른다.", "point": "[S V O OC(adj)] discovery", "tag": "v2", "verb": "find", "multiVal": [2, 3], "note": "245번의 추가 패턴"}, {"type": "head", "text": "구문문법 1탄 · 사역·지각 구문", "tag": "cx"}, {"type": "item", "num": 501, "en": "Scarcity makes resources more valuable.", "ko": "희소성은 자원을 더 가치 있게 만든다.", "point": "make + O + adj/NP — O를 ~한 상태로 만들다", "tag": "cx"}, {"type": "item", "num": 502, "en": "Pressure makes diamonds — and breaks weak systems.", "ko": "압력은 다이아몬드를 만들기도 하고 약한 시스템을 부수기도 한다.", "point": "make + O + V (bare inf) — O가 V하게 강요하다", "tag": "cx"}, {"type": "item", "num": 503, "en": "The teacher had students design their own experiments.", "ko": "교사는 학생들이 직접 실험을 설계하게 했다.", "point": "have + O + V (bare inf) — O에게 ~시키다 (부드러운 사역)", "tag": "cx"}, {"type": "item", "num": 504, "en": "Good mentors let learners make — and learn from — mistakes.", "ko": "좋은 멘토는 학습자가 실수하고 그것으로부터 배우게 한다.", "point": "let + O + V (bare inf) — O가 V하도록 허용하다", "tag": "cx"}, {"type": "item", "num": 505, "en": "How do you get people to change long-held habits?", "ko": "어떻게 하면 오래된 습관을 바꾸게 할 수 있을까?", "point": "get + O + to-inf — 설득·유도해서 O가 ~하게 하다", "tag": "cx"}, {"type": "item", "num": 506, "en": "Scientists watched the colony collapse in real time.", "ko": "과학자들은 군집이 실시간으로 붕괴되는 것을 지켜봤다.", "point": "see/hear/watch + O + V / V-ing — O가 ~하는 것을 직접 지각하다", "tag": "cx"}, {"type": "item", "num": 507, "en": "Researchers found the relationship surprisingly robust.", "ko": "연구자들은 그 관계가 놀랍도록 견고함을 발견했다.", "point": "find + O + OC (adj/V-ing) — O가 ~임을 (경험으로) 알게 되다", "tag": "cx"}, {"type": "item", "num": 508, "en": "Diversity keeps ecosystems functioning under stress.", "ko": "다양성은 생태계가 스트레스 아래서도 기능하게 유지시킨다.", "point": "keep + O + V-ing / adj — O를 계속 ~한 상태로 유지하다", "tag": "cx"}, {"type": "item", "num": 509, "en": "Rapid change leaves many workers ill-equipped.", "ko": "급격한 변화는 많은 노동자들을 준비 부족 상태로 남긴다.", "point": "leave + O + adj / V-ed — O를 ~한 상태로 (의도 없이) 남기다", "tag": "cx"}, {"type": "item", "num": 510, "en": "The injury rendered the athlete unable to compete.", "ko": "부상은 그 운동선수를 경기할 수 없는 상태로 만들었다.", "point": "render + O + adj/NP — O를 ~한 상태로 만들다 (격식체)", "tag": "cx"}, {"type": "head", "text": "구문문법 1탄 · 비교·대조 구문", "tag": "cx"}, {"type": "item", "num": 511, "en": "The more complex a system, the harder it is to predict.", "ko": "시스템이 복잡할수록 예측이 어렵다.", "point": "the + 비교급, the + 비교급 — ~할수록 더 ~하다", "tag": "cx"}, {"type": "item", "num": 512, "en": "Success depends not on talent but on consistent effort.", "ko": "성공은 재능이 아니라 지속적인 노력에 달려 있다.", "point": "not A but B — A가 아니라 B다", "tag": "cx"}, {"type": "item", "num": 513, "en": "Language not only reflects culture but also shapes it.", "ko": "언어는 문화를 반영할 뿐만 아니라 형성하기도 한다.", "point": "not only A but (also) B — A뿐만 아니라 B도", "tag": "cx"}, {"type": "item", "num": 514, "en": "We should address causes rather than symptoms.", "ko": "증상보다 원인을 해결해야 한다.", "point": "A rather than B — B가 아닌 A (A를 선택)", "tag": "cx"}, {"type": "item", "num": 515, "en": "While quantity increases, quality often declines.", "ko": "양이 증가하는 반면 질은 종종 저하된다.", "point": "while / whereas + S V, S V — ~인 반면에 (동시 대조)", "tag": "cx"}, {"type": "item", "num": 516, "en": "Cooperation is as important as competition for survival.", "ko": "생존에 있어 협력은 경쟁만큼 중요하다.", "point": "as + adj + as — ~만큼 ~하다 (동등 비교)", "tag": "cx"}, {"type": "item", "num": 517, "en": "Compared to a century ago, life expectancy has nearly doubled.", "ko": "100년 전과 비교했을 때 기대 수명은 거의 두 배가 됐다.", "point": "compared to/with + NP, S V — ~와 비교했을 때", "tag": "cx"}, {"type": "item", "num": 518, "en": "In contrast to popular belief, multitasking reduces efficiency.", "ko": "일반적인 믿음과 달리 멀티태스킹은 효율을 낮춘다.", "point": "in contrast to/with + NP — ~와 대조적으로", "tag": "cx"}, {"type": "item", "num": 519, "en": "Logic requires precision; intuition, on the other hand, thrives on ambiguity.", "ko": "논리는 정확성을 요구하는 반면 직관은 모호함 속에서 번성한다.", "point": "A, on the other hand, B — 한편으로 A, 다른 한편으로 B", "tag": "cx"}, {"type": "item", "num": 520, "en": "Creativity is more a habit than a talent.", "ko": "창의성은 재능이라기보다는 습관이다.", "point": "more A than B — B라기보다는 오히려 A다", "tag": "cx"}, {"type": "head", "text": "구문문법 1탄 · 원인·결과 구문", "tag": "cx"}, {"type": "item", "num": 521, "en": "Deforestation causes habitats to disappear rapidly.", "ko": "삼림 벌채는 서식지가 빠르게 사라지게 한다.", "point": "cause + O + to-inf — O가 ~하게 야기하다", "tag": "cx"}, {"type": "item", "num": 522, "en": "Overconfidence leads to systematic errors in judgment.", "ko": "과잉 자신감은 판단의 체계적 오류로 이어진다.", "point": "lead to + NP/-ing — ~로 이어지다", "tag": "cx"}, {"type": "item", "num": 523, "en": "Small changes in temperature can result in massive ecosystem shifts.", "ko": "온도의 작은 변화가 대규모 생태계 변화를 낳을 수 있다.", "point": "result in + NP/-ing — 결과적으로 ~을 낳다", "tag": "cx"}, {"type": "item", "num": 524, "en": "Many social problems stem from a lack of trust.", "ko": "많은 사회적 문제는 신뢰 부족에서 비롯된다.", "point": "stem from + NP — ~에서 비롯되다", "tag": "cx"}, {"type": "item", "num": 525, "en": "The data was so complex that no single model could explain it.", "ko": "데이터가 너무 복잡해서 어떤 단일 모델도 설명할 수 없었다.", "point": "so + adj/adv + that + S V — 너무 ~해서 결국 ~하다", "tag": "cx"}, {"type": "item", "num": 526, "en": "There was such overwhelming evidence that the theory collapsed.", "ko": "압도적인 증거가 있어서 이론이 붕괴됐다.", "point": "such + NP + that + S V — 그러한 ~이어서 결국 ~하다", "tag": "cx"}, {"type": "item", "num": 527, "en": "The problem was too complex to solve with a single approach.", "ko": "문제가 너무 복잡해서 단일 접근법으로는 풀 수 없었다.", "point": "too + adj + to-inf — 너무 ~해서 ~할 수 없다", "tag": "cx"}, {"type": "item", "num": 528, "en": "The evidence is strong enough to support the hypothesis.", "ko": "증거는 가설을 지지하기에 충분히 강하다.", "point": "adj + enough + to-inf — ~할 만큼 충분히 ~하다", "tag": "cx"}, {"type": "item", "num": 529, "en": "The idea slowly worked its way into mainstream science.", "ko": "그 아이디어는 서서히 주류 과학 속으로 파고들었다.", "point": "V one's way + 방향어구 — ~하면서 나아가다", "tag": "cx"}, {"type": "item", "num": 530, "en": "Inertia prevents systems from correcting themselves.", "ko": "관성은 시스템이 스스로 교정하지 못하게 막는다.", "point": "prevent/stop/keep + O + from -ing — O가 ~하지 못하게 막다", "tag": "cx"}, {"type": "head", "text": "구문문법 1탄 · 강조·도치 구문", "tag": "cx"}, {"type": "item", "num": 531, "en": "It is context that determines meaning, not the word itself.", "ko": "의미를 결정하는 것은 바로 맥락이지 단어 자체가 아니다.", "point": "It is/was ~ that ... (강조구문) — 바로 ~이 ...하는 것이다", "tag": "cx"}, {"type": "item", "num": 532, "en": "What makes humans unique is cumulative cultural learning.", "ko": "인간을 독특하게 만드는 것은 바로 누적적 문화 학습이다.", "point": "What + S V is/was + NP/adj — ~이 바로 ...이다 (의사분열문)", "tag": "cx"}, {"type": "item", "num": 533, "en": "Never before had science advanced so rapidly.", "ko": "과학이 이렇게 빠르게 발전한 적은 결코 없었다.", "point": "부정어 + 도치 (Never/Rarely/Seldom...) — 결코 ~하지 않다 (강한 부정 강조)", "tag": "cx"}, {"type": "item", "num": 534, "en": "Only by questioning assumptions can science progress.", "ko": "가정에 의문을 제기해야만 비로소 과학이 발전할 수 있다.", "point": "Only + 부사구 + 도치 — ~해야만 비로소 ...하다", "tag": "cx"}, {"type": "item", "num": 535, "en": "Not until the data was replicated did scientists accept the result.", "ko": "데이터가 재현되고 나서야 비로소 과학자들은 결과를 받아들였다.", "point": "Not until ~ + 도치 — ~하고 나서야 비로소 ...하다", "tag": "cx"}, {"type": "item", "num": 536, "en": "Evolution does produce extraordinary complexity from simple rules.", "ko": "진화는 정말로 단순한 규칙에서 놀라운 복잡성을 만들어낸다.", "point": "do/does/did + V (동사 강조) — 정말로 ~하다 (강조)", "tag": "cx"}, {"type": "item", "num": 537, "en": "At the heart of the theory lies a single insight.", "ko": "이론의 핵심에는 단 하나의 통찰이 자리한다.", "point": "장소부사구 + 도치 — ~에 ...이 있다 (존재 강조)", "tag": "cx"}, {"type": "item", "num": 538, "en": "So profound was the discovery that it rewrote textbooks.", "ko": "발견이 너무 심오해서 교과서를 다시 썼다.", "point": "So + adj/adv + 도치 — 매우 ~해서 (강조 도치)", "tag": "cx"}, {"type": "item", "num": 539, "en": "The method works; what is more, it is cheap and replicable.", "ko": "방법이 효과적이고, 더 나아가 저렴하고 재현 가능하다.", "point": "what is more / more importantly — 더 나아가, 더 중요하게는", "tag": "cx"}, {"type": "item", "num": 540, "en": "Above all, good science must be honest about its limits.", "ko": "무엇보다도 좋은 과학은 자신의 한계에 솔직해야 한다.", "point": "above all / first and foremost — 무엇보다도", "tag": "cx"}, {"type": "head", "text": "구문문법 1탄 · 조건·양보 구문", "tag": "cx"}, {"type": "item", "num": 541, "en": "If feedback loops are ignored, small problems become crises.", "ko": "피드백 루프를 무시하면 작은 문제가 위기가 된다.", "point": "if + S V (present), S will V — ~하면 ...할 것이다 (1종 조건)", "tag": "cx"}, {"type": "item", "num": 542, "en": "If humans lacked language, culture could not accumulate.", "ko": "인간에게 언어가 없다면 문화는 축적될 수 없을 것이다.", "point": "if + S V (past), S would V — 만약 ~하다면 ...할 텐데 (2종 조건)", "tag": "cx"}, {"type": "item", "num": 543, "en": "Systems fail unless they receive consistent feedback.", "ko": "시스템은 지속적인 피드백을 받지 않으면 실패한다.", "point": "unless + S V, S V — ~하지 않으면 ...하다", "tag": "cx"}, {"type": "item", "num": 544, "en": "Innovation thrives provided that failure is treated as data.", "ko": "실패를 데이터로 다루는 한 혁신은 번성한다.", "point": "provided (that) / as long as + S V — ~하는 한, ~라는 조건 하에", "tag": "cx"}, {"type": "item", "num": 545, "en": "Instinct persists even if rational analysis contradicts it.", "ko": "비록 이성적 분석이 모순되더라도 본능은 지속된다.", "point": "even if / even though + S V — 비록 ~일지라도", "tag": "cx"}, {"type": "item", "num": 546, "en": "Although correlation is not causation, it is a useful starting point.", "ko": "상관관계가 인과관계는 아니지만 유용한 출발점이다.", "point": "although / though + S V, S V — ~이지만, ~임에도", "tag": "cx"}, {"type": "item", "num": 547, "en": "Evolution operates regardless of intention or awareness.", "ko": "진화는 의도나 인식에 관계없이 작동한다.", "point": "regardless of + NP — ~에 관계없이", "tag": "cx"}, {"type": "item", "num": 548, "en": "No matter how precise a map is, it is not the territory.", "ko": "지도가 아무리 정밀해도 영토 자체가 아니다.", "point": "no matter how/what/where + S V — 아무리 ~해도", "tag": "cx"}, {"type": "item", "num": 549, "en": "Without trust, no complex society can function.", "ko": "신뢰 없이는 어떤 복잡한 사회도 기능할 수 없다.", "point": "without + NP/-ing, S V — ~없이는 ...하다", "tag": "cx"}, {"type": "item", "num": 550, "en": "Were it not for photosynthesis, complex life would be impossible.", "ko": "광합성이 없다면 복잡한 생명은 불가능할 것이다.", "point": "were it not for + NP — ~이 없다면 (가정법)", "tag": "cx"}, {"type": "head", "text": "구문문법 1탄 · 명사절·관계 구문", "tag": "cx"}, {"type": "item", "num": 551, "en": "What defines intelligence remains deeply contested.", "ko": "지능을 정의하는 것이 무엇인지는 여전히 깊이 논쟁 중이다.", "point": "what + S V (명사절 주어) — ~하는 것이 (주어)", "tag": "cx"}, {"type": "item", "num": 552, "en": "That language shapes thought is well established.", "ko": "언어가 사고를 형성한다는 것은 잘 확립되어 있다.", "point": "that + S V (명사절 주어) — ~라는 것이 (주어)", "tag": "cx"}, {"type": "item", "num": 553, "en": "The fact that correlation is not causation must be stressed.", "ko": "상관관계가 인과관계가 아니라는 사실이 강조되어야 한다.", "point": "the fact that + S V — ~라는 사실", "tag": "cx"}, {"type": "item", "num": 554, "en": "The way a problem is framed determines how it is solved.", "ko": "문제가 틀지어지는 방식이 해결 방식을 결정한다.", "point": "the way (in which) + S V — ~하는 방식", "tag": "cx"}, {"type": "item", "num": 555, "en": "Knowing when to stop is as important as knowing when to begin.", "ko": "언제 멈출지 아는 것은 언제 시작할지 아는 것만큼 중요하다.", "point": "wh- + to-inf (명사적) — ~할지 (방법·판단)", "tag": "cx"}, {"type": "item", "num": 556, "en": "Whether genes or environment matters more remains debated.", "ko": "유전자와 환경 중 무엇이 더 중요한지는 여전히 논쟁 중이다.", "point": "whether ~ or not — ~인지 아닌지", "tag": "cx"}, {"type": "item", "num": 557, "en": "Systems that cannot adapt eventually collapse.", "ko": "적응하지 못하는 시스템은 결국 붕괴한다.", "point": "S + V + 관계사 + S V (제한적 관계절) — ~하는 (명사) 수식", "tag": "cx"}, {"type": "item", "num": 558, "en": "The study confirmed the hypothesis, which surprised many experts.", "ko": "연구는 가설을 확인했고, 이것은 많은 전문가를 놀라게 했다.", "point": "which + V (비제한적 관계절) — , 그리고 그것은 ~하다", "tag": "cx"}, {"type": "item", "num": 559, "en": "Species whose habitats shrink face rapid decline.", "ko": "서식지가 줄어드는 종들은 빠른 감소에 직면한다.", "point": "whose + NP + V — 그것의 ~이 ...하는", "tag": "cx"}, {"type": "item", "num": 560, "en": "Drawing on decades of research, the author builds a compelling case.", "ko": "수십 년의 연구를 바탕으로 저자는 설득력 있는 논거를 구축한다.", "point": "-ing / -ed 분사구문 (주절과 동시·선후) — ~하면서 / ~한 채로", "tag": "cx"}, {"type": "head", "text": "구문문법 1탄 · 전치사 구문", "tag": "cx"}, {"type": "item", "num": 561, "en": "In terms of efficiency, the new method outperforms the old one.", "ko": "효율성 면에서 새 방법이 구 방법보다 뛰어나다.", "point": "in terms of + NP — ~의 관점에서, ~면에서", "tag": "cx"}, {"type": "item", "num": 562, "en": "In light of recent findings, the guidelines need revision.", "ko": "최근 연구 결과를 고려했을 때 지침 개정이 필요하다.", "point": "in light of + NP — ~을 고려했을 때", "tag": "cx"}, {"type": "item", "num": 563, "en": "With respect to climate, small variations can trigger large effects.", "ko": "기후에 관해서는 작은 변화가 큰 효과를 유발할 수 있다.", "point": "with respect to / regarding + NP — ~에 관하여", "tag": "cx"}, {"type": "item", "num": 564, "en": "By virtue of its size, the brain consumes enormous energy.", "ko": "뇌는 그 크기 덕분에 막대한 에너지를 소비한다.", "point": "by virtue of + NP — ~덕분에, ~ 때문에", "tag": "cx"}, {"type": "item", "num": 565, "en": "Speed was gained at the expense of accuracy.", "ko": "정확성을 희생하면서 속도를 얻었다.", "point": "at the expense of + NP — ~을 희생하여", "tag": "cx"}, {"type": "item", "num": 566, "en": "In the absence of competition, quality tends to decline.", "ko": "경쟁이 없는 상황에서 질은 저하되는 경향이 있다.", "point": "in the absence of + NP — ~이 없는 상황에서", "tag": "cx"}, {"type": "item", "num": 567, "en": "Decisions should be made on the basis of evidence, not intuition.", "ko": "결정은 직관이 아닌 증거를 근거로 내려져야 한다.", "point": "on the basis of + NP — ~을 근거로", "tag": "cx"}, {"type": "item", "num": 568, "en": "Free will exists to the extent that choices are not fully determined.", "ko": "선택이 완전히 결정되지 않는 한에서 자유의지는 존재한다.", "point": "to the extent that + S V — ~한 정도까지, ~한 한에서", "tag": "cx"}, {"type": "item", "num": 569, "en": "Some questions lie beyond the scope of empirical science.", "ko": "어떤 질문들은 경험과학의 범위를 넘어선다.", "point": "beyond the scope of + NP — ~의 범위를 넘어", "tag": "cx"}, {"type": "item", "num": 570, "en": "At the core of all learning is the ability to detect patterns.", "ko": "모든 학습의 핵심에는 패턴을 감지하는 능력이 있다.", "point": "at the core/heart of + NP — ~의 핵심에", "tag": "cx"}, {"type": "head", "text": "구문문법 1탄 · 관용·복합 구문", "tag": "cx"}, {"type": "item", "num": 571, "en": "It is not intelligence that determines success, but persistence.", "ko": "성공을 결정하는 것은 지능이 아니라 끈기이다.", "point": "It is not ~ that ..., but ~ — ...한 것은 ~이 아니라 ~이다", "tag": "cx"}, {"type": "item", "num": 572, "en": "The more we know, the less certain we become.", "ko": "알면 알수록 덜 확신하게 된다.", "point": "the more ~ , the less ~ — ~할수록 덜 ~하다", "tag": "cx"}, {"type": "item", "num": 573, "en": "Language is to thought what water is to fish.", "ko": "언어와 사고의 관계는 물과 물고기의 관계와 같다.", "point": "A is to B what C is to D — A와 B의 관계는 C와 D의 관계와 같다", "tag": "cx"}, {"type": "item", "num": 574, "en": "Far from being simple, the relationship is deeply recursive.", "ko": "단순하기는커녕 그 관계는 깊이 재귀적이다.", "point": "far from + NP/-ing, S V — ~이기는커녕, ~와 거리가 멀다", "tag": "cx"}, {"type": "item", "num": 575, "en": "The model is nothing but a simplified map of reality.", "ko": "그 모델은 현실의 단순화된 지도일 뿐이다.", "point": "nothing but + NP — 오직 ~일 뿐", "tag": "cx"}, {"type": "item", "num": 576, "en": "The process is anything but straightforward.", "ko": "그 과정은 결코 간단하지 않다.", "point": "anything but + adj — 결코 ~이 아니다", "tag": "cx"}, {"type": "item", "num": 577, "en": "Many lack access to clean water, let alone quality education.", "ko": "많은 사람이 깨끗한 물에도 접근하지 못하는데 양질의 교육은 말할 것도 없다.", "point": "let alone + NP/V — ~은 말할 것도 없고", "tag": "cx"}, {"type": "item", "num": 578, "en": "The method saves time, not to mention resources.", "ko": "이 방법은 시간을 절약하고, 자원은 말할 것도 없다.", "point": "not to mention + NP — ~은 말할 필요도 없고", "tag": "cx"}, {"type": "item", "num": 579, "en": "The brain processes familiar patterns as if they were absolute truth.", "ko": "뇌는 익숙한 패턴을 마치 절대적 진실인 양 처리한다.", "point": "as if / as though + S V (가정법) — 마치 ~인 것처럼", "tag": "cx"}, {"type": "item", "num": 580, "en": "The team spent years developing the model, only to find it was flawed.", "ko": "팀은 수년을 모델 개발에 쏟았지만 결국 결함이 있음을 발견했다.", "point": "S V, only to-inf — 결국 ~하게 되고 말다 (실망스러운 결과)", "tag": "cx"}, {"type": "item", "num": 581, "en": "No sooner had one problem been solved than another emerged.", "ko": "한 문제가 해결되자마자 또 다른 문제가 등장했다.", "point": "no sooner ~ than — ~하자마자 곧 ...하다", "tag": "cx"}, {"type": "item", "num": 582, "en": "Hardly had the ink dried when the policy was challenged.", "ko": "잉크가 채 마르기도 전에 정책이 도전받았다.", "point": "hardly/scarcely ~ when/before — ~하자마자 곧 ...하다", "tag": "cx"}, {"type": "item", "num": 583, "en": "Systems are supposed to correct themselves — but often don't.", "ko": "시스템은 스스로 교정되기로 되어 있지만 종종 그렇지 않다.", "point": "be supposed to + V — ~하기로 되어 있다, ~해야 한다", "tag": "cx"}, {"type": "item", "num": 584, "en": "People tend to overestimate visible risks and underestimate hidden ones.", "ko": "사람들은 눈에 보이는 위험은 과대평가하고 숨겨진 위험은 과소평가하는 경향이 있다.", "point": "tend to + V — ~하는 경향이 있다", "tag": "cx"}, {"type": "item", "num": 585, "en": "Complex systems are likely to fail in unpredictable ways.", "ko": "복잡한 시스템은 예측 불가능한 방식으로 실패할 가능성이 높다.", "point": "be likely to + V — ~할 가능성이 높다", "tag": "cx"}, {"type": "item", "num": 586, "en": "Policies that fail to address root causes often backfire.", "ko": "근본 원인을 해결하지 못하는 정책은 종종 역효과를 낳는다.", "point": "fail to + V — ~하지 못하다 (의도했으나 실패)", "tag": "cx"}, {"type": "item", "num": 587, "en": "Faced with ambiguity, the brain cannot help seeking patterns.", "ko": "모호함에 직면하면 뇌는 패턴을 찾지 않을 수 없다.", "point": "cannot help -ing / cannot but V — ~하지 않을 수 없다", "tag": "cx"}, {"type": "item", "num": 588, "en": "There is no predicting exactly when a system will break.", "ko": "시스템이 언제 붕괴할지 정확히 예측하는 것은 불가능하다.", "point": "there is no -ing — ~하는 것은 불가능하다", "tag": "cx"}, {"type": "item", "num": 589, "en": "It goes without saying that trust is the foundation of cooperation.", "ko": "신뢰가 협력의 토대라는 것은 말할 필요도 없다.", "point": "it goes without saying that — ~은 말할 필요도 없다", "tag": "cx"}, {"type": "item", "num": 590, "en": "It is worth noting that correlation often precedes the discovery of causation.", "ko": "상관관계가 종종 인과관계 발견에 앞선다는 점은 주목할 만하다.", "point": "it is worth -ing / it is worth noting that — ~할 가치가 있다, 주목할 만하다", "tag": "cx"}, {"type": "head", "text": "구문문법 2탄 · 관용 표현 구문", "tag": "cx"}, {"type": "item", "num": 591, "en": "It takes courage to admit what you do not know.", "ko": "모르는 것을 인정하려면 용기가 필요하다.", "point": "it takes + NP + to-inf — ~하는 데 ...이 필요하다", "tag": "cx"}, {"type": "item", "num": 592, "en": "It is time for science to address its own blind spots.", "ko": "이제 과학이 자신의 맹점을 직시할 때이다.", "point": "it is time (for NP) to-inf — 이제 ~할 때이다", "tag": "cx"}, {"type": "item", "num": 593, "en": "Stories help us make sense of an otherwise chaotic world.", "ko": "이야기는 혼돈스러운 세계를 이해하도록 돕는다.", "point": "make sense (of) — 이해가 되다 / ~을 이해하다", "tag": "cx"}, {"type": "item", "num": 594, "en": "Microorganisms make up the vast majority of Earth's biomass.", "ko": "미생물이 지구 생물량의 대다수를 구성한다.", "point": "make up + NP / make up for + NP — 구성하다 / ~을 보완하다", "tag": "cx"}, {"type": "item", "num": 595, "en": "Small mutations can give rise to entirely new species.", "ko": "작은 돌연변이가 완전히 새로운 종을 낳을 수 있다.", "point": "give rise to + NP — ~을 낳다, 야기하다", "tag": "cx"}, {"type": "item", "num": 596, "en": "Models must take into account non-linear feedback.", "ko": "모델은 비선형 피드백을 고려해야 한다.", "point": "take into account + NP — ~을 고려하다", "tag": "cx"}, {"type": "item", "num": 597, "en": "Every specialisation comes at a cost to generality.", "ko": "모든 전문화는 일반성의 희생을 치른다.", "point": "come at a cost / at a price — 대가를 치르다, 희생이 따르다", "tag": "cx"}, {"type": "item", "num": 598, "en": "Culture plays a key role in shaping moral intuitions.", "ko": "문화는 도덕적 직관을 형성하는 데 핵심 역할을 한다.", "point": "play a role / part in + NP/-ing — ~에서 역할을 하다", "tag": "cx"}, {"type": "item", "num": 599, "en": "This principle holds true across all biological systems.", "ko": "이 원리는 모든 생물학적 시스템에 걸쳐 적용된다.", "point": "hold true / hold (for NP) — (~에) 해당되다, 적용되다", "tag": "cx"}, {"type": "item", "num": 600, "en": "Most interventions fall short of their intended goals.", "ko": "대부분의 개입은 의도한 목표에 미치지 못한다.", "point": "fall short of + NP — ~에 미치지 못하다", "tag": "cx"}, {"type": "item", "num": 601, "en": "Good arguments draw on evidence from multiple disciplines.", "ko": "좋은 논거는 여러 분야의 증거를 끌어쓴다.", "point": "draw on + NP — ~을 활용하다, 끌어쓰다", "tag": "cx"}, {"type": "item", "num": 602, "en": "This view stands in contrast to the dominant paradigm.", "ko": "이 견해는 지배적 패러다임과 대조를 이룬다.", "point": "stand in contrast to + NP — ~와 대조를 이루다", "tag": "cx"}, {"type": "item", "num": 603, "en": "Freedom and responsibility go hand in hand.", "ko": "자유와 책임은 함께 가는 것이다.", "point": "go hand in hand (with) — ~와 함께 나란히 가다, 밀접하게 연관되다", "tag": "cx"}, {"type": "head", "text": "구문문법 2탄 · 담화 표지 구문", "tag": "cx"}, {"type": "item", "num": 604, "en": "To begin with, we must distinguish correlation from causation.", "ko": "우선, 우리는 상관관계와 인과관계를 구별해야 한다.", "point": "to begin with / first of all — 우선, 먼저", "tag": "cx"}, {"type": "item", "num": 605, "en": "Entropy always increases — in other words, disorder is the default.", "ko": "엔트로피는 항상 증가한다 — 다시 말하면 무질서가 기본 상태이다.", "point": "in other words / that is (to say) — 다시 말하면", "tag": "cx"}, {"type": "item", "num": 606, "en": "Many animals use tools — for instance, crows craft hooks from wire.", "ko": "많은 동물이 도구를 사용한다 — 예를 들어 까마귀는 철사로 갈고리를 만든다.", "point": "for instance / for example — 예를 들어", "tag": "cx"}, {"type": "item", "num": 607, "en": "Cognitive biases, in particular confirmation bias, distort reasoning.", "ko": "인지 편향, 특히 확증 편향은 추론을 왜곡한다.", "point": "in particular / specifically — 특히, 구체적으로", "tag": "cx"}, {"type": "item", "num": 608, "en": "Trust eroded; as a result, cooperation broke down.", "ko": "신뢰가 약화되었고 결과적으로 협력이 무너졌다.", "point": "as a result / consequently / therefore — 결과적으로, 따라서", "tag": "cx"}, {"type": "item", "num": 609, "en": "The data is incomplete; nevertheless, the trend is clear.", "ko": "데이터가 불완전하지만 그럼에도 불구하고 추세는 명확하다.", "point": "nevertheless / nonetheless / even so — 그럼에도 불구하고", "tag": "cx"}, {"type": "item", "num": 610, "en": "Diversity strengthens ecosystems; by the same token, it strengthens organisations.", "ko": "다양성은 생태계를 강화한다; 마찬가지로 조직도 강화한다.", "point": "by the same token — 마찬가지로, 같은 맥락에서", "tag": "cx"}, {"type": "item", "num": 611, "en": "To put it differently, complexity is not the same as chaos.", "ko": "달리 표현하면 복잡성은 혼돈과 같지 않다.", "point": "to put it differently / to rephrase — 달리 표현하면", "tag": "cx"}, {"type": "item", "num": 612, "en": "With this in mind, let us examine the evidence more carefully.", "ko": "이것을 염두에 두고 증거를 더 면밀히 살펴보자.", "point": "with this in mind — 이것을 염두에 두고", "tag": "cx"}, {"type": "item", "num": 613, "en": "On the surface, the two systems appear identical.", "ko": "표면적으로 두 시스템은 동일해 보인다.", "point": "on the surface / at first glance — 표면적으로는, 언뜻 보기에", "tag": "cx"}, {"type": "item", "num": 614, "en": "Short-term gains, in the long run, often produce long-term costs.", "ko": "단기적 이득은 장기적으로 종종 장기 비용을 낳는다.", "point": "in the long run / ultimately — 장기적으로, 결국", "tag": "cx"}, {"type": "item", "num": 615, "en": "As it stands, the model cannot account for outliers.", "ko": "현재 상태로는 모델이 이상값을 설명할 수 없다.", "point": "as it stands / as things are — 현재 상태로는", "tag": "cx"}, {"type": "item", "num": 616, "en": "The method has flaws. That said, it remains the best available.", "ko": "방법에 결함이 있다. 그렇긴 하지만 여전히 가장 좋은 방법이다.", "point": "that said / having said that — 그렇긴 하지만, 그럼에도", "tag": "cx"}, {"type": "item", "num": 617, "en": "Systemic change is needed. To this end, institutions must reform.", "ko": "시스템적 변화가 필요하다. 이를 위해 제도가 개혁되어야 한다.", "point": "to this end / to that end — 이를 위해", "tag": "cx"}, {"type": "head", "text": "구문문법 2탄 · 복문 연결 구문", "tag": "cx"}, {"type": "item", "num": 618, "en": "People resist change not because they are lazy but because change feels threatening.", "ko": "사람들이 변화에 저항하는 것은 게으르기 때문이 아니라 변화가 위협적으로 느껴지기 때문이다.", "point": "not because A but because B — A 때문이 아니라 B 때문에", "tag": "cx"}, {"type": "item", "num": 619, "en": "The reason why habits persist is that they are encoded in neural circuits.", "ko": "습관이 지속되는 이유는 신경 회로에 부호화되어 있기 때문이다.", "point": "the reason why ~ is that — ~한 이유는 ...이기 때문이다", "tag": "cx"}, {"type": "item", "num": 620, "en": "Once a habit is formed, it operates largely outside conscious control.", "ko": "일단 습관이 형성되면 그것은 주로 의식적 통제 밖에서 작동한다.", "point": "once + S V, S V — 일단 ~하면, ~하고 나면", "tag": "cx"}, {"type": "item", "num": 621, "en": "As soon as the stimulus appears, the response is triggered automatically.", "ko": "자극이 나타나자마자 반응이 자동으로 유발된다.", "point": "as soon as + S V, S V — ~하자마자", "tag": "cx"}, {"type": "item", "num": 622, "en": "By the time a trend is visible, it may be too late to reverse.", "ko": "추세가 보일 때쯤이면 이미 되돌리기엔 너무 늦을 수 있다.", "point": "by the time + S V, S V — ~할 때쯤이면 이미 ...하다", "tag": "cx"}, {"type": "item", "num": 623, "en": "Language is unique in that it allows recursion.", "ko": "언어는 재귀를 허용한다는 점에서 독특하다.", "point": "in that + S V — ~라는 점에서", "tag": "cx"}, {"type": "item", "num": 624, "en": "Now that the mechanism is understood, treatment becomes possible.", "ko": "이제 메커니즘이 이해된 만큼 치료가 가능해진다.", "point": "now that + S V, S V — 이제 ~이므로, ~한 만큼", "tag": "cx"}, {"type": "item", "num" const SECTIONS = [];
BLOCKS.forEach((b, i) => {
  if (b.type === 'head') {
    let firstN = null;
    for (let j=i+1; j<BLOCKS.length; j++) {
      if (BLOCKS[j].type !== 'head') { firstN = BLOCKS[j].num; break; }
    }
    SECTIONS.push({ text: b.text, firstN });
  }
});

const list = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const cntEl = document.getElementById('cnt');

const tagLabel = { v1:'1가', v2:'2가', v3:'3가', cx:'CxG' };

function render(filterFn) {
  list.innerHTML = '';
  let count = 0;
  BLOCKS.forEach(b => {
    if (b.type === 'head') {
      const div = document.createElement('div');
      div.className = 'sec-head';
      div.id = 'sec-' + b.text;
      div.textContent = b.text;
      list.appendChild(div);
    } else {
      if (!filterFn(b)) return;
      count++;
      const div = document.createElement('div');
      div.className = 'item';
      div.id = 'item-' + b.num;
      div.innerHTML = `
        <div class="item-left">
          <span class="item-num">${b.num}</span>
          <span class="item-tag t-${b.tag}">${tagLabel[b.tag]}</span>
          ${b.multiVal ? '<div class="multi-val">' + b.multiVal.map(v => {
            const cur = (b.tag==='v1'&&v===1)||(b.tag==='v2'&&v===2)||(b.tag==='v3'&&v===3);
            return '<span class="mv-badge mv-'+v+(cur?'':' mv-dim')+'">'+v+'가</span>';
          }).join('') + '</div>' : ''}
        </div>
        <div class="item-right">
          <span class="item-en">${b.en}</span>
          <div class="item-reveal">
            <span class="item-ko">${b.ko}</span>
            ${b.point ? `<span class="item-point">${b.point}</span>` : ''}
            ${b.note ? `<span class="item-note">${b.note}</span>` : ''}
            <button class="tts-btn" data-text="${b.en.replace(/"/g,'&quot;')}">▶ 듣기</button>
          </div>
        </div>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.closest('.tts-btn')) return;
        div.querySelector('.item-reveal').classList.toggle('visible');
      });
      list.appendChild(div);
    }
  });
  cntEl.textContent = count;
  emptyEl.style.display = count === 0 ? 'block' : 'none';
}

render(() => true);

// ── TTS 재생 ──
const VOICE_ID = 'qBDvhofpxp92JgXJxDjB';
let currentAudio = null;
let currentBtn = null;
const audioCache = new Map(); // 캐시: text -> objectURL

async function fetchTTS(text, key) {
  if (audioCache.has(text)) return audioCache.get(text);
  const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
    method: 'POST',
    headers: {
      'xi-api-key': key,
      'Content-Type': 'application/json',
      'Accept': 'audio/mpeg'
    },
    body: JSON.stringify({
      text,
      model_id: 'eleven_monolingual_v1',
      voice_settings: { stability: 0.5, similarity_boost: 0.75, speed: 0.8 }
    })
  });
  if (!res.ok) throw new Error(res.status);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  audioCache.set(text, url);
  return url;
}

function stopCurrent() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (currentBtn) {
    currentBtn.classList.remove('playing');
    currentBtn.textContent = '▶ 듣기';
    currentBtn = null;
  }
}

document.addEventListener('click', async (e) => {
  const btn = e.target.closest('.tts-btn');
  if (!btn) return;
  e.stopPropagation();

  // 재생 중인 버튼 누르면 정지
  if (btn === currentBtn) { stopCurrent(); return; }
  stopCurrent();

  const key = elevenKey || localStorage.getItem('el_api_key');
  if (!key) {
    apiInput.focus();
    btn.classList.add('error');
    btn.textContent = '⚠ API 키 필요';
    setTimeout(() => { btn.classList.remove('error'); btn.textContent = '▶ 듣기'; }, 2000);
    return;
  }

  const text = btn.dataset.text;

  // 캐시 있으면 즉시 재생
  if (audioCache.has(text)) {
    const url = audioCache.get(text);
    const audio = new Audio(url);
    currentAudio = audio;
    currentBtn = btn;
    btn.classList.add('playing');
    btn.textContent = '■ 정지';
    audio.play();
    audio.onended = () => { stopCurrent(); };
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '…';

  try {
    const url = await fetchTTS(text, key);
    // 로딩 중 다른 버튼 눌렀으면 무시
    if (btn.classList.contains('loading')) {
      const audio = new Audio(url);
      currentAudio = audio;
      currentBtn = btn;
      btn.classList.remove('loading');
      btn.classList.add('playing');
      btn.textContent = '■ 정지';
      audio.play();
      audio.onended = () => { stopCurrent(); };
    }
  } catch(err) {
    btn.classList.remove('loading');
    btn.classList.add('error');
    btn.textContent = '⚠ 오류';
    setTimeout(() => { btn.classList.remove('error'); btn.textContent = '▶ 듣기'; }, 2500);
  }
});

window.addEventListener('scroll', () => {
  const total = document.body.scrollHeight - window.innerHeight;
  const pct = total > 0 ? window.scrollY / total * 100 : 0;
  document.getElementById('progFill').style.width = pct + '%';
}, { passive:true });

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { render(() => true); return; }
  render(b => b.en.toLowerCase().includes(q) || b.ko.includes(q) || String(b.num).includes(q));
});

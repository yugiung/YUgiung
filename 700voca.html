<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결합가·구문문법 훈련 문장집 700</title>
<style>
  :root {
    --bg:#f8f7f4; --surface:#ffffff; --border:#e0ddd8;
    --text:#1a1a1a; --muted:#999;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Georgia',serif; min-height:100vh; }

  .topbar {
    position:sticky; top:0; z-index:100;
    background:var(--bg); border-bottom:1px solid var(--border);
    padding:0.55rem 0.9rem; display:flex; align-items:center; gap:0.6rem;
  }
  .topbar h1 { font-family:monospace; font-size:0.72rem; color:var(--muted); font-weight:normal; flex:1; }
  .topbar .cnt { font-family:monospace; font-size:0.68rem; color:var(--muted); }
  .prog-bar { height:2px; background:var(--border); }
  .prog-fill { height:2px; background:#444; width:0%; transition:width 0.2s; }

  .searchbar { padding:0.45rem 0.9rem; background:var(--bg); border-bottom:1px solid var(--border); }
  .searchbar input {
    width:100%; background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:monospace; font-size:0.78rem;
    padding:0.38rem 0.65rem; border-radius:4px; outline:none;
  }
  .searchbar input::placeholder { color:var(--muted); }

  .hint-bar {
    padding:0.3rem 0.9rem; font-family:monospace;
    font-size:0.62rem; color:#333;
    border-bottom:1px solid var(--border); text-align:center;
  }

  .sec-head {
    padding:0.45rem 0.9rem; background:var(--surface);
    border-bottom:1px solid var(--border);
    font-family:monospace; font-size:0.62rem; color:var(--muted);
    letter-spacing:0.1em; text-transform:uppercase;
    position:sticky; top:68px; z-index:50;
  }

  .item {
    padding:0.85rem 1rem; border-bottom:1px solid var(--border);
    display:flex; gap:0.6rem; align-items:flex-start;
    cursor:pointer; user-select:none;
  }
  .item:active { background:#ededea; }

  .item-left {
    display:flex; flex-direction:column; align-items:center;
    gap:0.3rem; min-width:2.2rem; padding-top:0.1rem;
  }
  .item-num { font-family:monospace; font-size:0.6rem; color:#888; text-align:center; }
  .item-tag {
    font-family:monospace; font-size:0.58rem; font-weight:bold;
    padding:0.1rem 0.3rem; border-radius:2px; text-align:center;
  }
  .t-v1 { background:#1e3a5f; color:#7eb8f0; }
  .t-v2 { background:#1a3a1a; color:#7ed3a0; }
  .t-v3 { background:#fef3c7; color:#b45309; }
  .t-cx { background:#faf5ff; color:#6d28d9; }
  .multi-val { display:flex; gap:0.18rem; flex-wrap:wrap; margin-top:0.22rem; }
  .mv-badge { font-family:monospace; font-size:0.5rem; font-weight:bold;
    padding:0.06rem 0.22rem; border-radius:2px; border:1px solid; }
  .mv-1 { background:#dbeafe; color:#1d4ed8; border-color:#93c5fd; }
  .mv-2 { background:#dcfce7; color:#15803d; border-color:#86efac; }
  .mv-3 { background:#fef3c7; color:#b45309; border-color:#fcd34d; }
  .mv-dim { opacity:0.35; }

  .item-right { flex:1; display:flex; flex-direction:column; }
  .item-en { font-size:0.95rem; line-height:1.6; color:#1a1a1a; }

  /* 탭하면 나타나는 영역 */
  .item-reveal {
    display:none; margin-top:0.45rem;
    border-top:1px solid #222; padding-top:0.4rem;
    flex-direction:column; gap:0.25rem;
  }
  .item-reveal.visible { display:flex; }

  .item-ko { font-size:0.8rem; color:#666; line-height:1.5; }
  .item-point {
    font-family:monospace; font-size:0.72rem;
    color:#6d28d9; line-height:1.4;
  }
  .item-note {
    font-size: 0.72rem; color: #888;
    font-style: italic; margin-top: 0.1rem;
  }
  .item-note::before { content: "※ "; color: #666; }

  .tts-btn {
    display:inline-flex; align-items:center; gap:0.3rem;
    margin-top:0.3rem; padding:0.3rem 0.6rem;
    background:#f0f0ff; border:1px solid #c0c0e0;
    border-radius:4px; color:#4a4a9a; font-size:0.72rem;
    cursor:pointer; font-family:monospace;
    width:fit-content; user-select:none;
  }
  .tts-btn:active { background:#22224a; }
  .tts-btn.loading { color:#555; border-color:#333; }
  .tts-btn.playing { color:#1d4ed8; border-color:#93c5fd; }
  .tts-btn.error { color:#dc2626; border-color:#fca5a5; }

  /* API 키 입력 배너 */
  .api-banner {
    background:#eeecea; border-bottom:1px solid #2a2a2a;
    padding:0.5rem 0.8rem; display:flex; gap:0.5rem;
    align-items:center; position:sticky; top:0; z-index:150;
  }
  .api-input {
    flex:1; background:#fff; border:1px solid #ccc;
    color:#333; font-family:monospace; font-size:0.7rem;
    padding:0.3rem 0.5rem; border-radius:3px;
  }
  .api-save {
    background:#1e3a1e; border:1px solid #2a5a2a;
    color:#7ed3a0; font-family:monospace; font-size:0.7rem;
    padding:0.3rem 0.6rem; border-radius:3px; cursor:pointer;
    white-space:nowrap;
  }

  .fab {
    position:fixed; bottom:1.1rem; right:0.9rem;
    width:42px; height:42px; border-radius:50%;
    background:#1e1e1e; border:1px solid #333; color:#666; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,0.5);
  }

  .drawer {
    display:none; position:fixed; bottom:0; left:0; right:0;
    background:#eeecea; border-top:1px solid #2a2a2a;
    padding:0.8rem; z-index:300; max-height:55vh; overflow-y:auto;
  }
  .drawer.open { display:block; }
  .drawer-title { font-family:monospace; font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.6rem; }
  .drawer-item {
    padding:0.48rem 0; border-bottom:1px solid #e8e5e0;
    font-family:monospace; font-size:0.72rem; color:#aaa;
    cursor:pointer; display:flex; justify-content:space-between;
  }
  .drawer-item:active { color:#fff; }
  .drawer-item .rng { font-size:0.6rem; color:#888; }
  .drawer-close {
    width:100%; margin-top:0.6rem; padding:0.42rem;
    background:#1a1a1a; border:1px solid #2a2a2a; color:#666;
    font-family:monospace; font-size:0.68rem; cursor:pointer; border-radius:3px;
  }
  .empty { padding:2.5rem; text-align:center; font-family:monospace; font-size:0.72rem; color:var(--muted); }
</style>
</head>
<body>

<div class="api-banner" id="apiBanner">
  <input class="api-input" id="apiKeyInput" type="password" placeholder="ElevenLabs API Key 입력...">
  <button class="api-save" id="apiSaveBtn">저장</button>
</div>
<div class="topbar">
  <h1>결합가 · 구문문법 훈련 문장집</h1>
  <span class="cnt" id="cnt">700</span>
</div>
<div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
<div class="searchbar">
  <input type="text" id="searchInput" placeholder="번호 또는 단어 검색...">
</div>
<div class="hint-bar">문장 탭 → 한국어 뜻 + 포인트 표시</div>

<div id="list"></div>
<div class="empty" id="empty" style="display:none;">검색 결과 없음</div>

<button class="fab" id="fab">☰</button>
<div class="drawer" id="drawer">
  <div class="drawer-title">섹션 이동</div>
  <div id="drawerList"></div>
  <button class="drawer-close" id="drawerClose">닫기</button>
</div>

<script>
const BLOCKS = [{"type": "head", "text": "결합가 1탄 · 1가 동사", "tag": "v1"}, {"type": "item", "num": 1, "en": "The patient slept for twelve hours.", "ko": "환자는 12시간 동안 잤다.", "point": "[S]", "tag": "v1", "verb": "sleep", "note": "장소·시간 부가어는 수의적"}, {"type": "item", "num": 2, "en": "The package arrived yesterday.", "ko": "소포가 어제 도착했다.", "point": "[S]", "tag": "v1", "verb": "arrive", "note": "at/in + 장소는 부가어 (결합가 밖)"}, {"type": "item", "num": 3, "en": "The star died billions of years ago.", "ko": "그 별은 수십억 년 전에 소멸했다.", "point": "[S]", "tag": "v1", "verb": "die"}, {"type": "item", "num": 4, "en": "A new theory emerged from the debate.", "ko": "새 이론이 논쟁에서 출현했다.", "point": "[S (from)]", "tag": "v1", "verb": "emerge", "note": "from-구는 수의적이지만 자주 동반"}, {"type": "item", "num": 5, "en": "The species vanished within decades.", "ko": "그 종은 수십 년 만에 사라졌다.", "point": "[S]", "tag": "v1", "verb": "vanish"}, {"type": "item", "num": 6, "en": "The committee consists of seven members.", "ko": "위원회는 7명으로 구성된다.", "point": "[S of NP]", "tag": "v1", "verb": "consist (of)", "note": "of-구가 의미상 필수 — 경계적 사례"}, {"type": "item", "num": 7, "en": "The accident happened at dawn.", "ko": "사고는 새벽에 발생했다.", "point": "[S]", "tag": "v1", "verb": "happen"}, {"type": "item", "num": 8, "en": "Prices rose sharply.", "ko": "가격이 급격히 올랐다.", "point": "[S]", "tag": "v1", "verb": "rise", "note": "*raise*는 2가 동사 — 혼동 주의"}, {"type": "item", "num": 9, "en": "The temperature fell overnight.", "ko": "기온이 밤새 떨어졌다.", "point": "[S]", "tag": "v1", "verb": "fall"}, {"type": "item", "num": 10, "en": "Mutations occur randomly.", "ko": "돌연변이는 무작위로 발생한다.", "point": "[S]", "tag": "v1", "verb": "occur", "note": "수능 과학 지문 빈출"}, {"type": "item", "num": 11, "en": "No perfect solution exists.", "ko": "완벽한 해결책은 존재하지 않는다.", "point": "[S]", "tag": "v1", "verb": "exist"}, {"type": "item", "num": 12, "en": "Information flows freely online.", "ko": "정보는 온라인에서 자유롭게 흐른다.", "point": "[S]", "tag": "v1", "verb": "flow"}, {"type": "item", "num": 13, "en": "Bacteria thrive in warm conditions.", "ko": "박테리아는 따뜻한 환경에서 번성한다.", "point": "[S (on/in)]", "tag": "v1", "verb": "thrive"}, {"type": "item", "num": 14, "en": "The bridge collapsed under the weight.", "ko": "다리가 무게를 못 이기고 붕괴했다.", "point": "[S]", "tag": "v1", "verb": "collapse"}, {"type": "item", "num": 15, "en": "Language evolved over millennia.", "ko": "언어는 수천 년에 걸쳐 진화했다.", "point": "[S (from/into)]", "tag": "v1", "verb": "evolve", "note": "수능 인문·과학 지문 빈출"}, {"type": "item", "num": 16, "en": "Genes interact with the environment.", "ko": "유전자는 환경과 상호작용한다.", "point": "[S (with NP)]", "tag": "v1", "verb": "interact", "note": "with-구가 의미상 중요하나 수의적"}, {"type": "item", "num": 17, "en": "The market responded quickly.", "ko": "시장은 빠르게 반응했다.", "point": "[S (to NP)]", "tag": "v1", "verb": "respond", "note": "to-구 수의적"}, {"type": "item", "num": 18, "en": "Nations must cooperate on climate.", "ko": "국가들은 기후 문제에서 협력해야 한다.", "point": "[S (with NP)]", "tag": "v1", "verb": "cooperate"}, {"type": "item", "num": 19, "en": "Stock prices fluctuate daily.", "ko": "주가는 매일 변동한다.", "point": "[S]", "tag": "v1", "verb": "fluctuate"}, {"type": "item", "num": 20, "en": "A brief explanation will suffice.", "ko": "간단한 설명으로 충분할 것이다.", "point": "[S]", "tag": "v1", "verb": "suffice"}, {"type": "head", "text": "결합가 1탄 · 2가 동사", "tag": "v2"}, {"type": "item", "num": 21, "en": "Stress affects cognitive performance.", "ko": "스트레스는 인지 수행에 영향을 준다.", "point": "[S V O]", "tag": "v2", "verb": "affect", "note": "수능 빈출 — 목적어 필수"}, {"type": "item", "num": 22, "en": "The process involves three stages.", "ko": "그 과정은 세 단계를 포함한다.", "point": "[S V O]", "tag": "v2", "verb": "involve"}, {"type": "item", "num": 23, "en": "The task requires careful planning.", "ko": "그 과제는 신중한 계획을 필요로 한다.", "point": "[S V O/to-inf]", "tag": "v2", "verb": "require", "note": "O 자리에 절도 가능"}, {"type": "item", "num": 24, "en": "The proposal lacks specificity.", "ko": "그 제안은 구체성이 부족하다.", "point": "[S V O]", "tag": "v2", "verb": "lack", "note": "수동태 불가 — 결합가 특이 사례"}, {"type": "item", "num": 25, "en": "The data reflects a broader trend.", "ko": "데이터는 더 광범위한 경향을 반영한다.", "point": "[S V O]", "tag": "v2", "verb": "reflect"}, {"type": "item", "num": 26, "en": "Corruption undermines public trust.", "ko": "부패는 공공 신뢰를 약화시킨다.", "point": "[S V O]", "tag": "v2", "verb": "undermine", "note": "수능 사회 지문 빈출"}, {"type": "item", "num": 27, "en": "Technology facilitates communication.", "ko": "기술은 소통을 촉진한다.", "point": "[S V O]", "tag": "v2", "verb": "facilitate"}, {"type": "item", "num": 28, "en": "Exercise enhances brain function.", "ko": "운동은 뇌 기능을 향상시킨다.", "point": "[S V O]", "tag": "v2", "verb": "enhance"}, {"type": "item", "num": 29, "en": "Genes partly determine behavior.", "ko": "유전자는 부분적으로 행동을 결정한다.", "point": "[S V O/wh-]", "tag": "v2", "verb": "determine"}, {"type": "item", "num": 30, "en": "New findings challenge the old model.", "ko": "새 발견이 기존 모델에 도전한다.", "point": "[S V O]", "tag": "v2", "verb": "challenge"}, {"type": "item", "num": 31, "en": "Symptoms precede the diagnosis.", "ko": "증상이 진단보다 먼저 나타난다.", "point": "[S V O]", "tag": "v2", "verb": "precede"}, {"type": "item", "num": 32, "en": "The structure resembles a neural network.", "ko": "그 구조는 신경망과 닮아 있다.", "point": "[S V O]", "tag": "v2", "verb": "resemble", "note": "수동태 불가"}, {"type": "item", "num": 33, "en": "The sample contains rare elements.", "ko": "그 샘플은 희귀 원소를 함유한다.", "point": "[S V O]", "tag": "v2", "verb": "contain"}, {"type": "item", "num": 34, "en": "The patient exhibits unusual symptoms.", "ko": "환자는 비정상적인 증상을 보인다.", "point": "[S V O]", "tag": "v2", "verb": "exhibit", "note": "수능 과학·의학 지문"}, {"type": "item", "num": 35, "en": "The process generates significant heat.", "ko": "그 과정은 상당한 열을 발생시킨다.", "point": "[S V O]", "tag": "v2", "verb": "generate"}, {"type": "item", "num": 36, "en": "The ecosystem sustains biodiversity.", "ko": "생태계는 생물 다양성을 유지한다.", "point": "[S V O]", "tag": "v2", "verb": "sustain"}, {"type": "item", "num": 37, "en": "Humans perceive color differently.", "ko": "인간은 색을 다르게 인식한다.", "point": "[S V O (as NP)]", "tag": "v2", "verb": "perceive", "note": "as-구 추가 시 3가에 근접"}, {"type": "item", "num": 38, "en": "Scientists assumed a linear relationship.", "ko": "과학자들은 선형 관계를 가정했다.", "point": "[S V O/that-]", "tag": "v2", "verb": "assume"}, {"type": "item", "num": 39, "en": "Water constitutes 60% of the body.", "ko": "물은 신체의 60%를 구성한다.", "point": "[S V O]", "tag": "v2", "verb": "constitute"}, {"type": "item", "num": 40, "en": "The results indicate a causal link.", "ko": "결과는 인과 관계를 나타낸다.", "point": "[S V O/that-]", "tag": "v2", "verb": "indicate", "note": "수능 빈출 동사"}, {"type": "item", "num": 41, "en": "We cannot ignore the evidence.", "ko": "우리는 증거를 무시할 수 없다.", "point": "[S V O]", "tag": "v2", "verb": "ignore"}, {"type": "item", "num": 42, "en": "The company pursues profit above all.", "ko": "회사는 무엇보다 이익을 추구한다.", "point": "[S V O]", "tag": "v2", "verb": "pursue"}, {"type": "item", "num": 43, "en": "Children acquire language naturally.", "ko": "아이들은 자연스럽게 언어를 습득한다.", "point": "[S V O]", "tag": "v2", "verb": "acquire"}, {"type": "item", "num": 44, "en": "The drug alters brain chemistry.", "ko": "그 약물은 뇌 화학을 변화시킨다.", "point": "[S V O]", "tag": "v2", "verb": "alter"}, {"type": "item", "num": 45, "en": "Stress can trigger inflammation.", "ko": "스트레스는 염증을 유발할 수 있다.", "point": "[S V O]", "tag": "v2", "verb": "trigger"}, {"type": "item", "num": 46, "en": "Repetition characterizes his writing style.", "ko": "반복이 그의 문체를 특징짓는다.", "point": "[S V O]", "tag": "v2", "verb": "characterize"}, {"type": "item", "num": 47, "en": "A few firms dominate the market.", "ko": "소수 기업이 시장을 지배한다.", "point": "[S V O]", "tag": "v2", "verb": "dominate"}, {"type": "item", "num": 48, "en": "Fever often accompanies infection.", "ko": "발열은 종종 감염을 동반한다.", "point": "[S V O]", "tag": "v2", "verb": "accompany"}, {"type": "item", "num": 49, "en": "Agriculture occupies vast land areas.", "ko": "농업은 광대한 토지를 차지한다.", "point": "[S V O]", ": "head", "text": "결합가 1탄 · 3가 동사", "tag": "v3"}, {"type": "item", "num": 61, "en": "The brain gives meaning to raw data.", "ko": "뇌는 원시 데이터에 의미를 부여한다.", "point": "[S V IO DO]", "tag": "v3", "verb": "give", "note": "수여동사 전형"}, {"type": "item", "num": 62, "en": "Researchers put the samples in storage.", "ko": "연구자들은 샘플을 보관소에 넣었다.", "point": "[S V O Loc]", "tag": "v3", "verb": "put", "note": "장소 논항 필수 — 없으면 비문"}, {"type": "item", "num": 63, "en": "The data tells us that rates are rising.", "ko": "데이터는 비율이 상승하고 있음을 알려준다.", "point": "[S V IO that-/wh-]", "tag": "v3", "verb": "tell", "note": "수능 독해 빈출 구조"}, {"type": "item", "num": 64, "en": "Scarcity makes resources more valuable.", "ko": "희소성은 자원을 더 가치 있게 만든다.", "point": "[S V O OC]", "tag": "v3", "verb": "make", "multiVal": [2, 3], "note": "OC = 형용사/명사"}, {"type": "item", "num": 65, "en": "Diversity keeps ecosystems stable.", "ko": "다양성은 생태계를 안정적으로 유지한다.", "point": "[S V O OC]", "tag": "v3", "verb": "keep", "multiVal": [2, 3], "note": "OC 필수"}, {"type": "item", "num": 66, "en": "The virus renders the cell inactive.", "ko": "바이러스는 세포를 비활성 상태로 만든다.", "point": "[S V O OC]", "tag": "v3", "verb": "render", "note": "수능 과학 지문 빈출"}, {"type": "item", "num": 67, "en": "Experts consider the method reliable.", "ko": "전문가들은 그 방법이 신뢰할 만하다고 여긴다.", "point": "[S V O (as) OC]", "tag": "v3", "verb": "consider", "note": "as 생략 가능"}, {"type": "item", "num": 68, "en": "The policy places a burden on consumers.", "ko": "정책은 소비자에게 부담을 지운다.", "point": "[S V O Loc]", "tag": "v3", "verb": "place", "note": "*put*과 유사 구조"}, {"type": "item", "num": 69, "en": "The model provides researchers with a framework.", "ko": "모델은 연구자에게 틀을 제공한다.", "point": "[S V IO with O / S V O to IO]", "tag": "v3", "verb": "provide", "note": "이중 실현 패턴"}, {"type": "item", "num": 70, "en": "Scholars attribute the shift to urbanization.", "ko": "학자들은 그 변화를 도시화 탓으로 돌린다.", "point": "[S V O to NP]", "tag": "v3", "verb": "attribute", "note": "to-구 필수"}, {"type": "item", "num": 71, "en": "The study exposes subjects to different stimuli.", "ko": "연구는 피험자를 다양한 자극에 노출시킨다.", "point": "[S V O to NP]", "tag": "v3", "verb": "expose", "note": "to-구 의미상 필수"}, {"type": "item", "num": 72, "en": "Poverty deprives children of opportunity.", "ko": "빈곤은 아이들에게서 기회를 박탈한다.", "point": "[S V O of NP]", "tag": "v3", "verb": "deprive", "note": "of-구 필수"}, {"type": "item", "num": 73, "en": "Evidence convinced the panel of its validity.", "ko": "증거는 패널에게 그 타당성을 납득시켰다.", "point": "[S V O that-/of NP]", "tag": "v3", "verb": "convince"}, {"type": "item", "num": 74, "en": "We associate speed with efficiency.", "ko": "우리는 속도를 효율성과 연결 짓는다.", "point": "[S V O with NP]", "tag": "v3", "verb": "associate", "note": "with-구 필수"}, {"type": "item", "num": 75, "en": "It is hard to distinguish correlation from causation.", "ko": "상관관계와 인과관계를 구별하기 어렵다.", "point": "[S V O from NP]", "tag": "v3", "verb": "distinguish", "note": "수능 논리 지문 핵심"}, {"type": "item", "num": 76, "en": "Historians credit Gutenberg with the revolution.", "ko": "역사가들은 구텐베르크 덕에 혁명이 일어났다고 본다.", "point": "[S V O with NP]", "tag": "v3", "verb": "credit"}, {"type": "item", "num": 77, "en": "The findings inform us of the risk.", "ko": "연구 결과는 우리에게 위험을 알린다.", "point": "[S V O of/that-]", "tag": "v3", "verb": "inform"}, {"type": "item", "num": 78, "en": "The case reminds us that systems fail.", "ko": "그 사례는 시스템이 실패한다는 것을 상기시킨다.", "point": "[S V O of/that-]", "tag": "v3", "verb": "remind", "note": "수능 지문 마무리 문장 자주 등장"}, {"type": "item", "num": 79, "en": "Cells convert glucose into energy.", "ko": "세포는 포도당을 에너지로 전환한다.", "point": "[S V O into NP]", "tag": "v3", "verb": "convert", "note": "into-구 필수"}, {"type": "item", "num": 80, "en": "Technology transformed agriculture into an industry.", "ko": "기술은 농업을 산업으로 변모시켰다.", "point": "[S V O into NP]", "tag": "v3", "verb": "transform", "multiVal": [2, 3]}, {"type": "item", "num": 81, "en": "The chapter divides the problem into components.", "ko": "그 장은 문제를 구성 요소로 나눈다.", "point": ion embodies democratic values.", "ko": "헌법은 민주적 가치를 구현한다.", "point": "[S V O]", "tag": "v2", "verb": "embody"}, {"type": "item", "num": 139, "en": "The volume of data can overwhelm analysts.", "ko": "데이터의 양은 분석가를 압도할 수 있다.", "point": "[S V O]", "tag": "v2", "verb": "overwhelm"}, {"type": "item", "num": 140, "en": "New evidence contradicts the accepted model.", "ko": "새 증거는 통용되던 모델과 모순된다.", "point": "[S V O]", "tag": "v2", "verb": "contradict", "note": "1탄의 *contradict*와 예문 다름"}, {"type": "item", "num": 141, "en": "Models can predict long-term climate trends.", "ko": "모델은 장기 기후 추세를 예측할 수 있다.", "point": "[S V O/that-]", "tag": "v2", "verb": "predict"}, {"type": "item", "num": 142, "en": "Scientists traced the outbreak to a single source.", "ko": "과학자들은 발병을 단일 출처로 추적했다.", "point": "[S V O (to NP)]", "tag": "v2", "verb": "trace", "note": "to-구 수의적"}, {"type": "item", "num": 143, "en": "Countries gradually adopt new technologies.", "ko": "국가들은 새로운 기술을 점차 도입한다.", "point": "[S V O]", "tag": "v2", "verb": "adopt"}, {"type": "item", "num": 144, "en": "The brain sometimes bypasses conscious reasoning.", "ko": "뇌는 때때로 의식적 추론을 우회한다.", "point": "[S V O]", "tag": "v2", "verb": "bypass"}, {"type": "item", "num": 145, "en": "The photograph captures a fleeting moment.", "ko": "사진은 순간을 포착한다.", "point": "[S V O]", "tag": "v2", "verb": "capture"}, {"type": "item", "num": 146, "en": "Researchers classify organisms by genetic similarity.", "ko": "연구자들은 유전적 유사성으로 생물을 분류한다.", "point": "[S V O (as NP)]", "tag": "v2", "verb": "classify", "multiVal": [2, 3], "note": "as-구 수의적"}, {"type": "item", "num": 147, "en": "Intuition complements analytical thinking.", "ko": "직관은 분석적 사고를 보완한다.", "point": "[S V O]", "tag": "v2", "verb": "complement", "note": "complement ≠ compliment 혼동 주의"}, {"type": "item", "num": 148, "en": "Automation displaces low-skill workers.", "ko": "자동화는 저숙련 노동자를 대체한다.", "point": "[S V O]", "tag": "v2", "verb": "displace"}, {"type": "item", "num": 149, "en": "Drought exacerbates food insecurity.", "ko": "가뭄은 식량 불안을 악화시킨다.", "point": "[S V O]", "tag": "v2", "verb": "exacerbate", "note": "수능 고난도 지문 빈출 어휘"}, {"type": "item", "num": 150, "en": "Parasites exploit host resources.", "ko": "기생체는 숙주의 자원을 이용한다.", "point": "[S V O]", "tag": "v2", "verb": "exploit"}, {"type": "item", "num": 151, "en": "The brain integrates sensory information.", "ko": "뇌는 감각 정보를 통합한다.", "point": "[S V O (into NP)]", "tag": "v2", "verb": "integrate", "note": "into-구 수의적"}, {"type": "item", "num": 152, "en": "The outcome does not justify the means.", "ko": "결과가 수단을 정당화하지는 않는다.", "point": "[S V O/-ing]", "tag": "v2", "verb": "justify"}, {"type": "item", "num": 153, "en": "Antibodies neutralize pathogens.", "ko": "항체는 병원체를 무력화한다.", "point": "[S V O]", "tag": "v2", "verb": "neutralize", "note": "수능 생물 지문"}, {"type": "item", "num": 154, "en": "We often overlook systemic causes.", "ko": "우리는 종종 구조적 원인을 간과한다.", "point": "[S V O]", "tag": "v2", "verb": "overlook"}, {"type": "item", "num": 155, "en": "Governments must prioritize long-term welfare.", "ko": "정부는 장기적 복지를 우선시해야 한다.", "point": "[S V O]", "tag": "v2", "verb": "prioritize"}, {"type": "item", "num": 156, "en": "The medium reproduces existing power structures.", "ko": "미디어는 기존 권력 구조를 재생산한다.", "point": "[S V O]", "tag": "v2", "verb": "reproduce", "multiVal": [1, 2]}, {"type": "item", "num": 157, "en": "The software simulates atmospheric conditions.", "ko": "소프트웨어는 대기 조건을 시뮬레이션한다.", "point": "[S V O]", "tag": "v2", "verb": "simulate"}, {"type": "item", "num": 158, "en": "The immune system suppresses abnormal cells.", "ko": "면역계는 비정상 세포를 억제한다.", "point": "[S V O]", "tag": "v2", "verb": "suppress"}, {"type": "item", "num": 159, "en": "A common mechanism underlies both disorders.", "ko": "공통 메커니즘이 두 장애 모두의 기저에 있다.", "point": "[S V O]", "tag": "v2", "verb": "underlie", "note": "수능 추상 지문 핵심"}, {"type": "item", "num": 160, "en": "The action violates ethical norms.", "ko": "그 행위는 윤리 규범을 위반한다.", "point": "[S V O]", "tag": "v2", "verb": "violate"}, {"type": "head", "text": "결합가 2탄 · 3가 동사", "tag": "v3"}, {"type": "item", "num": 161, "en": "The court granted citizens the right to appeal.", "ko": "법원은 시민에게 항소권을 부여했다.", "point": "[S V IO DO]", "tag": "v3", "verb": "grant", "note": "수여동사"}, {"type": "item", "num": 162, "en": "The theory lends the data new meaning.", "ko": "이론은 데이터에 새로운 의미를 부여한다.", "point": "[S V IO DO]", "tag": "v3", "verb": "lend"}, {"type": "item", "num": 163, "en": "We owe future generations a sustainable planet.", "ko": "우리는 미래 세대에게 지속 가능한 지구를 빚지고 있다.", "point": "[S V IO DO]", "tag": "v3", "verb": "owe"}, {"type": "item", "num": 164, "en": "Automation spares workers the most repetitive tasks.", "ko": "자동화는 노동자가 가장 반복적인 업무를 안 해도 되게 한다.", "point": "[S V IO DO]", "tag": "v3", "verb": "spare"}, {"type": "item", "num": 165, "en": "Inequality denies many people basic opportunities.", "ko": "불평등은 많은 사람에게서 기본 기회를 빼앗는다.", "point": "[S V IO DO / S V O to IO]", "tag": "v3", "verb": "deny", "multiVal": [2, 3]}, {"type": "item", "num": 166, "en": "Research must translate findings into practice.", "ko": "연구는 결과물을 실제에 적용해야 한다.", "point": "[S V O into NP]", "tag": "v3", "verb": "translate", "note": "into-구 의미상 필수"}, {"type": "item", "num": 167, "en": "The law classifies the substance as a controlled drug.", "ko": "법은 그 물질을 규제 약물로 분류한다.", "point": "[S V O as NP]", "tag": "v3", "verb": "classify", "multiVal": [2, 3], "note": "as-구 필수 — 2가의 classify와 구별"}, {"type": "item", "num": 168, "en": "Culture embeds values in everyday practice.", "ko": "문화는 일상적 실천 속에 가치를 심는다.", "point": "[S V O in NP]", "tag": "v3", "verb": "embed", "note": "in-구 의미상 필수"}, {"type": "item", "num": 169, "en": "The narrative anchors identity to place.", "ko": "서사는 정체성을 장소에 결부시킨다.", "point": "[S V O to/in NP]", "tag": "v3", "verb": "anchor"}, {"type": "item", "num": 170, "en": "Media frames migration as a threat.", "ko": "미디어는 이주를 위협으로 규정한다.", "point": "[S V O as NP]", "tag": "v3", "verb": "frame", "note": "as-구 필수 — 구문문법의 핵심 사례"}, {"type": "item", "num": 171, "en": "Animals were subjected to controlled conditions.", "ko": "동물들은 통제된 조건에 노출되었다.", "point": "[S V O to NP]", "tag": "v3", "verb": "subject", "note": "주로 수동태 사용"}, {"type": "item", "num": 172, "en": "Disease strips patients of independence.", "ko": "질병은 환자에게서 독립성을 앗아간다.", "point": "[S V O of NP]", "tag": "v3", "verb": "strip", "note": "of-구 필수"}, {"type": "item", "num": 173, "en": "Chronic stress robs the brain of plasticity.", "ko": "만성 스트레스는 뇌의 가소성을 빼앗는다.", "point": "[S V O of NP]", "tag": "v3", "verb": "rob"}, {"type": "item", "num": 174, "en": "Antioxidants shield cells from damage.", "ko": "항산화제는 세포를 손상으로부터 보호한다.", "point": "[S V O from NP]", "tag": "v3", "verb": "shield", "note": "from-구 의미상 필수"}, {"type": "item", "num": 175, "en": "The experiment isolated variables from each other.", "ko": "실험은 변수들을 서로 분리했다.", "point": "[S V O from NP]", "tag": "v3", "verb": "isolate"}, {"type": "item", "num": 176, "en": "It is difficult to separate nature from nurture.", "ko": "본성과 양육을 분리하기는 어렵다.", "point": "[S V O from NP]", "tag": "v3", "verb": "separate", "note": "수능 단골 주제"}, {"type": "item", "num": 177, "en": "Shared history binds communities to a common identity.", "ko": "공유된 역사는 공동체를 공통 정체성에 묶는다.", "point": "[S V O to NP]", "tag": "v3", "verb": "bind"}, {"type": "item", "num": 178, "en": "Algorithms tailor content to individual preferences.", "ko": "알고리즘은 콘텐츠를 개인 취향에 맞게 조정한다.", "point": "[S V O to NP]", "tag": "v3", "verb": "tailor"}, {"type": "item", "num": 179, "en": "Teachers adapt materials to students' needs.", "ko": "교사는 학생의 필요에 맞게 자료를 조정한다.", "point": "[S V O to NP]", "tag": "v3", "verb": "adapt", "multiVal": [1, 3], "note": "자동사 adapt (1가)와 구별"}, {"type": "item", "num": 180, "en": "Policy should align incentives with social goals.", "ko": "정책은 인센티브를 사회적 목표와 일치시켜야 한다.", "point": "[S V O with NP]", "tag": "v3", "verb": "align"}, {"type": "item", "num": 181, "en": "Plants can substitute renewable energy for fossil fuels.", "ko": "식물은 화석 연료를 재생에너지로 대체할 수 있다.", "point": "[S V O for NP]", "tag": "v3", "verb": "substitute", "note": "for-구 필수"}, {"type": "item", "num": 182, "en": "The model replaces intuition with data-driven decisions.", "ko": "모델은 직관을 데이터 기반 결정으로 대체한다.", "point": "[S V O with NP]", "tag": "v3", "verb": "replace", "multiVal": [2, 3], "note": "with-구 명시 시 3가"}, {"type": "item", "num": 183, "en": "Art exposes audiences to unfamiliar perspectives.", "ko": "예술은 관객을 낯선 관점에 노출시킨다.", "point": "[S V O to NP]", "tag": "v3", "verb": "expose", "note": "1탄의 expose와 예문 다름"}, {"type": "item", "num": 184, "en": "Curiosity motivates scientists to explore further.", "ko": "호기심은 과학자들이 더 탐구하도록 동기를 부여한다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "motivate"}, {"type": "item", "num": 185, "en": "Evidence compels us to revise the theory.", "ko": "증거는 우리가 이론을 수정하게 만든다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "compel"}, {"type": "item", "num": 186, "en": "The treaty obliges nations to reduce emissions.", "ko": "조약은 국가들이 배출량을 줄이도록 의무화한다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "oblige"}, {"type": "item", "num": 187, "en": "Short-term gains tempt firms to cut corners.", "ko": "단기 이익은 기업이 편법을 쓰도록 유혹한다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "tempt"}, {"type": "item", "num": 188, "en": "Wealth disposes individuals to take risks.", "ko": "부는 개인이 위험을 감수하게 만든다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "dispose", "note": "구문문법 관점에서 흥미로운 사례"}, {"type": "item", "num": 189, "en": "Experience accustoms the brain to patterns.", "ko": "경험은 뇌가 패턴에 익숙해지게 한다.", "point": "[S V O to NP/-ing]", "tag": "v3", "verb": "accustom", "note": "주로 수동태 be accustomed to"}, {"type": "item", "num": 190, "en": "The institute dedicates resources to vaccine research.", "ko": "연구소는 백신 연구에 자원을 헌신한다.", "point": "[S V O to NP/-ing]", "tag": "v3", "verb": "dedicate"}, {"type": "item", "num": 191, "en": "Short-sighted policy condemns communities to poverty.", "ko": "근시안적 정책은 지역사회를 빈곤에 처하게 한다.", "point": "[S V O to NP]", "tag": "v3", "verb": "condemn", "note": "to-구 필수 (결과 상태)"}, {"type": "item", "num": 192, "en": "Critics accuse the system of perpetuating inequality.", "ko": "비평가들은 시스템이 불평등을 영속시킨다고 비난한다.", "point": "[S V O of NP]", "tag": "v3", "verb": "accuse", "note": "of-구 필수"}, {"type": "item", "num": 193, "en": "The agency charged the company with negligence.", "ko": "기관은 회사에 태만 혐의를 적용했다.", "point": "[S V O with NP]", "tag": "v3", "verb": "charge", "note": "with-구 필수"}, {"type": "item", "num": 194, "en": "Debt burdens developing nations with fiscal constraints.", "ko": "부채는 개발도상국에 재정적 제약을 지운다.", "point": "[S V O with NP]", "tag": "v3", "verb": "burden"}, {"type": "item", "num": 195, "en": "Studies correlate sleep quality with cognitive performance.", "ko": "연구들은 수면의 질과 인지 수행을 상관시킨다.", "point": "[S V O with NP]", "tag": "v3", "verb": "correlate", "note": "수능 과학 지문"}, {"type": "item", "num": 196, "en": "The author compares the brain with a computer.", "ko": "저자는 뇌를 컴퓨터와 비교한다.", "point": "[S V O with/to NP]", "tag": "v3", "verb": "compare", "note": "with/to 구별 있음"}, {"type": "item", "num": 197, "en": "The ruling held the practice unconstitutional.", "ko": "판결은 그 관행이 위헌이라고 선언했다.", "point": "[S V O OC (adj/NP)]", "tag": "v3", "verb": "hold", "multiVal": [1, 2, 3], "note": "OC 필수 — 법률·논리 지문 빈출"}, {"type": "item", "num": 198, "en": "The committee deemed the proposal inadequate.", "ko": "위원회는 그 제안이 부적절하다고 판단했다.", "point": "[S V O OC (adj/NP)]", "tag": "v3", "verb": "deem", "note": "수능 논설 지문 빈출"}, {"type": "item", "num": 199, "en": "Rapid change leaves many workers unprepared.", "ko": "급격한 변화는 많은 노동자들을 준비되지 않은 상태로 둔다.", "point": "[S V O OC (adj)]", "tag": "v3", "verb": "leave", "multiVal": [2, 3], "note": "OC 필수"}, {"type": "item", "num": 200, "en": "Researchers find the correlation statistically significant.", "ko": "연구자들은 상관관계가 통계적으로 유의하다고 밝혔다.", "point": "[S V O OC (adj/NP)]", "tag": "v3", "verb": "find", "multiVal": [2, 3], "note": "수능 연구 결과 제시 문장"}, {"type": "head", "text": "결합가 3탄 · 1가 기본동사", "tag": "v1"}, {"type": "item", "num": 201, "en": "She walks to school every day.", "ko": "그녀는 매일 걸어서 학교에 간다.", "point": "[S]", "tag": "v1", "verb": "walk"}, {"type": "item", "num": 202, "en": "The child ran across the field.", "ko": "아이가 들판을 가로질러 달렸다.", "point": "[S]", "tag": "v1", "verb": "run", "note": "타동사(run a business)로도 쓰임"}, {"type": "item", "num": 203, "en": "Fish swim upstream to spawn.", "ko": "물고기는 산란을 위해 강 상류로 헤엄친다.", "point": "[S]", "tag": "v1", "verb": "swim"}, {"type": "item", "num": 204, "en": "Birds fly south in autumn.", "ko": "새들은 가을에 남쪽으로 날아간다.", "point": "[S]", "tag": "v1", "verb": "fly", "note": "타동사(fly a plane)로도 쓰임"}, {"type": "item", "num": 205, "en": "The cat sat by the window.", "ko": "고양이가 창가에 앉아 있었다.", "point": "[S]", "tag": "v1", "verb": "sit"}, {"type": "item", "num": 206, "en": "He stood at the edge of the cliff.", "ko": "그는 절벽 끝에 서 있었다.", "point": "[S]", "tag": "v1", "verb": "stand", "multiVal": [1, 2]}, {"type": "item", "num": 207, "en": "The valley lies between two mountains.", "ko": "계곡은 두 산 사이에 위치해 있다.", "point": "[S]", "tag": "v1", "verb": "lie", "note": "lay/lain — lay(놓다)와 혼동 주의"}, {"type": "item", "num": 208, "en": "We waited for the rain to stop.", "ko": "우리는 비가 그치기를 기다렸다.", "point": "[S (for NP)]", "tag": "v1", "verb": "wait", "note": "for-구 수의적"}, {"type": "item", "num": 209, "en": "The baby smiled at the sound.", "ko": "아기가 소리에 웃음 지었다.", "point": "[S]", "tag": "v1", "verb": "smile"}, {"type": "item", "num": 210, "en": "Everyone laughed at the joke.", "ko": "모두가 농담에 웃었다.", "point": "[S (at NP)]", "tag": "v1", "verb": "laugh"}, {"type": "item", "num": 211, "en": "The child cried all night.", "ko": "아이가 밤새 울었다.", "point": "[S]", "tag": "v1", "verb": "cry"}, {"type": "item", "num": 212, "en": "We breathe without thinking.", "ko": "우리는 생각 없이 숨을 쉰다.", "point": "[S]", "tag": "v1", "verb": "breathe"}, {"type": "item", "num": 213, "en": "Teenagers need to sleep more.", "ko": "십대들은 더 ": "v2", "verb": "leave", "multiVal": [2, 3], "note": "다중결합가"}, {"type": "item", "num": 248, "en": "The weather turned cold.", "ko": "날씨가 차가워졌다.", "point": "[S]", "tag": "v2", "verb": "turn", "multiVal": [1, 3], "note": "다중결합가"}, {"type": "item", "num": 249, "en": "The graph shows a steady decline.", "ko": "그래프는 꾸준한 하락세를 보여준다.", "point": "[S V O]", "tag": "v2", "verb": "show", "multiVal": [2, 3], "note": "다중결합가"}, {"type": "item", "num": 250, "en": "She asked a question.", "ko": "그녀는 질문을 했다.", "point": "[S V O]", "tag": "v2", "verb": "ask", "multiVal": [2, 3], "note": "다중결합가"}, {"type": "item", "num": 251, "en": "The map tells us the territory.", "ko": "지도는 우리에게 영역을 알려준다.", "point": "[S V IO DO]", "tag": "v2", "verb": "tell", "note": "다중결합가"}, {"type": "item", "num": 252, "en": "The sun sends energy to the earth.", "ko": "태양은 지구에 에너지를 보낸다.", "point": "[S V IO DO]", "tag": "v2", "verb": "send", "note": "다중결합가"}, {"type": "item", "num": 253, "en": "Trade brings prosperity.", "ko": "무역은 번영을 가져온다.", "point": "[S V O]", "tag": "v2", "verb": "bring", "note": "다중결합가"}, {"type": "item", "num": 254, "en": "Money cannot buy happiness.", "ko": "돈으로 행복을 살 수는 없다.", "point": "[S V O]", "tag": "v2", "verb": "buy", "note": "다중결합가"}, {"type": "item", "num": 255, "en": "They sell organic produce.", "ko": "그들은 유기농 농산물을 판다.", "point": "[S V O]", "tag": "v2", "verb": "sell", "note": "다중결합가"}, {"type": "item", "num": 256, "en": "Companies must pay a living wage.", "ko": "기업은 생활 임금을 지불해야 한다.", "point": "[S V O]", "tag": "v2", "verb": "pay", "note": "다중결합가"}, {"type": "item", "num": 257, "en": "Schools teach critical thinking.", "ko": "학교는 비판적 사고를 가르친다.", "point": "[S V O]", "tag": "v2", "verb": "teach", "note": "다중결합가"}, {"type": "item", "num": 258, "en": "Children learn patterns before rules.", "ko": "아이들은 규칙보다 패턴을 먼저 배운다.", "point": "[S V O]", "tag": "v2", "verb": "learn", "note": "다중결합가"}, {"type": "item", "num": 259, "en": "She reads two books a week.", "ko": "그녀는 일주일에 책 두 권을 읽는다.", "point": "[S V O]", "tag": "v2", "verb": "read", "note": "다중결합가"}, {"type": "item", "num": 260, "en": "Journalists write under deadline pressure.", "ko": "기자들은 마감 압박 속에서 글을 쓴다.", "point": "[S V O]", "tag": "v2", "verb": "write", "note": "다중결합가"}, {"type": "item", "num": 261, "en": "We rarely see what we are not looking for.", "ko": "우리는 찾지 않는 것을 거의 보지 못한다.", "point": "[S V O]", "tag": "v2", "verb": "see", "note": "다중결합가"}, {"type": "item", "num": 262, "en": "We heard a loud noise.", "ko": "우리는 큰 소리를 들었다.", "point": "[S V O]", "tag": "v2", "verb": "hear", "note": "다중결합가"}, {"type": "item", "num": 263, "en": "We feel the weight of responsibility.", "ko": "우리는 책임의 무게를 느낀다.", "point": "[S V O]", "tag": "v2", "verb": "feel", "note": "다중결합가"}, {"type": "item", "num": 264, "en": "He looked at the data carefully.", "ko": "그는 데이터를 주의 깊게 살펴봤다.", "point": "[S (at NP)]", "tag": "v2", "verb": "look", "note": "다중결합가"}, {"type": "item", "num": 265, "en": "The idea sounds reasonable.", "ko": "아이디어가 합리적으로 들린다.", "point": "[S V OC(adj)] linking", "tag": "v2", "verb": "sound", "note": "연결동사 전형"}, {"type": "item", "num": 266, "en": "The solution smells wrong.", "ko": "그 해결책이 뭔가 잘못된 것 같다.", "point": "[S V OC(adj)] linking", "tag": "v2", "verb": "smell", "note": "연결동사"}, {"type": "item", "num": 267, "en": "The medicine tastes bitter.", "ko": "약이 쓴 맛이 난다.", "point": "[S V OC(adj)] linking", "tag": "v2", "verb": "taste", "note": "다중결합가"}, {"type": "item", "num": 268, "en": "Automation became the dominant narrative.", "ko": "자동화가 지배적인 서사가 되었다.", "point": "[S V OC(NP/adj)]", "tag": "v2", "verb": "become", "note": "연결동사 — OC 필수"}, {"type": "item", "num": 269, "en": "The gap seems insurmountable.", "ko": "그 격차는 극복 불가능해 보인다.", "point": "[S V OC(adj/NP)]", "tag": "v2", "verb": "seem", "note": "연결동사 — 수동태 불가"}, {"type": "item", "num": 270, "en": "The trend appears irreversible.", "ko": "그 추세는 되돌릴 수 없어 보인다.", "point": "[S V OC(adj)]", "tag": "v2", "verb": "appear", "multiVal": [1, 2], "note": "1가(나타나다)와 구별"}, {"type": "head", "text": "결합가 3탄 · 2가 기본동사", "tag": "v2"}, {"type": "item", "num": 271, "en": "Humans use tools to extend ability.", "ko": "인간은 능력을 확장하기 위해 도구를 사용한다.", "point": "[S V O]", "tag": "v2", "verb": "use"}, {"type": "item", "num": 272, "en": "Every organism needs energy to survive.", "ko": "모든 유기체는 생존을 위해 에너지가 필요하다.", "point": "[S V O/to-inf]", "tag": "v2", "verb": "need", "note": "수동태 드묾"}, {"type": "item", "num": 273, "en": "Children want to understand the world.", "ko": "아이들은 세상을 이해하고 싶어 한다.", "point": "[S V O/to-inf]", "tag": "v2", "verb": "want"}, {"type": "item", "num": 274, "en": "We tend to like what we know.", "ko": "우리는 아는 것을 좋아하는 경향이 있다.", "point": "[S V O/-ing]", "tag": "v2", "verb": "like", "note": "수동태 드묾"}, {"type": "item", "num": 275, "en": "The brain loves patterns and prediction.", "ko": "뇌는 패턴과 예측을 좋아한다.", "point": "[S V O/-ing]", "tag": "v2", "verb": "love"}, {"type": "item", "num": 276, "en": "People hate losing more than they love winning.", "ko": "사람들은 이기는 것을 좋아하는 것보다 지는 것을 싫어한다.", "point": "[S V O/-ing]", "tag": "v2", "verb": "hate"}, {"type": "item", "num": 277, "en": "We know far less than we think.", "ko": "우리는 생각보다 훨씬 적게 알고 있다.", "point": "[S V O/that-/wh-]", "tag": "v2", "verb": "know", "note": "수동태 드묾"}, {"type": "item", "num": 278, "en": "Children understand fairness intuitively.", "ko": "아이들은 공정함을 직관적으로 이해한다.", "point": "[S V O/that-]", "tag": "v2", "verb": "understand"}, {"type": "item", "num": 279, "en": "We remember stories better than facts.", "ko": "우리는 사실보다 이야기를 더 잘 기억한다.", "point": "[S V O/that-/-ing]", "tag": "v2", "verb": "remember"}, {"type": "item", "num": 280, "en": "People easily forget contradictory information.", "ko": "사람들은 모순된 정보를 쉽게 잊는다.", "point": "[S V O/that-/to-inf]", "tag": "v2", "verb": "forget"}, {"type": "item", "num": 281, "en": "We expect the world to match our mental models.", "ko": "우리는 세상이 우리의 정신 모델과 일치하기를 기대한다.", "point": "[S V O/that-/to-inf]", "tag": "v2", "verb": "expect", "multiVal": [2, 3]}, {"type": "item", "num": 282, "en": "Many people believe what confirms their views.", "ko": "많은 사람들은 자신의 견해를 확인하는 것을 믿는다.", "point": "[S V O/that-]", "tag": "v2", "verb": "believe"}, {"type": "item", "num": 283, "en": "We tend to think in categories.", "ko": "우리는 범주적으로 생각하는 경향이 있다.", "point": "[S V O/that-]", "tag": "v2", "verb": "think", "multiVal": [2, 3], "note": "1가(생각하다)로도 쓰임"}, {"type": "item", "num": 284, "en": "Experts notice what novices miss.", "ko": "전문가는 초보자가 놓치는 것을 알아챈다.", "point": "[S V O/that-]", "tag": "v2", "verb": "notice", "multiVal": [2, 3]}, {"type": "item", "num": 285, "en": "Organisms choose the path of least resistance.", "ko": "유기체는 저항이 가장 적은 경로를 선택한다.", "point": "[S V O/to-inf]", "tag": "v2", "verb": "choose"}, {"type": "item", "num": 286, "en": "People decide emotionally, then justify logically.", "ko": "사람들은 감정으로 결정하고 나서 논리적으로 정당화한다.", "point": "[S V O/to-inf/that-]", "tag": "v2", "verb": "decide"}, {"type": "item", "num": 287, "en": "Ecosystems lose resilience under stress.", "ko": "생태계는 스트레스 아래서 회복력을 잃는다.", "point": "[S V O]", "tag": "v2", "verb": "lose", "multiVal": [2, 3]}, {"type": "item", "num": 288, "en": "Cooperation often wins over competition.", "ko": "협력은 종종 경쟁을 이긴다.", "point": "[S V O]", "tag": "v2", "verb": "win", "multiVal": [2, 3], "note": "1가(이기다)로도 쓰임"}, {"type": "item", "num": 289, "en": "Memory holds identity together.", "ko": "기억은 정체성을 하나로 붙든다.", "point": "[S V O]", "tag": "v2", "verb": "hold", "multiVal": [1, 2, 3], "note": "다중결합가"}, {"type": "item", "num": 290, "en": "Blood carries oxygen to all organs.", "ko": "혈액은 모든 기관에 산소를 운반한다.", "point": "[S V O]", "tag": "v2", "verb": "carry", "multiVal": [2, 3]}, {"type": "item", "num": 291, "en": "Trust is built slowly and lost quickly.", "ko": "신뢰는 천천히 쌓이고 빠르게 무너진다.", "point": "[S V O]", "tag": "v2", "verb": "build"}, {"type": "item", "num": 292, "en": "Competition creates incentives to improve.", "ko": "경쟁은 개선하려는 유인을 만든다.", "point": "[S V O]", "tag": "v2", "verb": "create"}, {"type": "item", "num": 293, "en": "The body produces its own painkillers.", "ko": "몸은 자체 진통제를 생산한다.", "point": "[S V O]", "tag": "v2", "verb": "produce"}, {"type": "item", "num": 294, "en": "Children form mental models early.", "ko": "아이들은 일찍부터 정신적 모델을 형성한다.", "point": "[S V O]", "tag": "v2", "verb": "form"}, {"type": "item", "num": 295, "en": "Organisms develop strategies for survival.", "ko": "유기체는 생존 전략을 발전시킨다.", "point": "[S V O]", "tag": "v2", "verb": "develop", "note": "1가(발전하다)로도 쓰임"}, {"type": "item", "num": 296, "en": "Evidence must support a claim.", "ko": "증거는 주장을 뒷받침해야 한다.", "point": "[S V O]", "tag": "v2", "verb": "support"}, {"type": "item", "num": 297, "en": "The immune system protects the body.", "ko": "면역계는 신체를 보호한다.", "point": "[S V O (from NP)]", "tag": "v2", "verb": "protect", "note": "from-구 수의적"}, {"type": "item", "num": 298, "en": "Overuse destroys natural habitats.", "ko": "과도한 사용은 자연 서식지를 파괴한다.", "point": "[S V O]", "tag": "v2", "verb": "destroy"}, {"type": "item", "num": 299, "en": "Hormones control many bodily functions.", "ko": "호르몬은 많은 신체 기능을 조절한다.", "point": "[S V O]", "tag": "v2", "verb": "control"}, {"type": "item", "num": 300, "en": "Few organisms manage to survive drastic change.", "ko": "급격한 변화에서 살아남는 유기체는 드물다.", "point": "[S V O/to-inf]", "tag": "v2", "verb": "manage"}, {"type": "item", "num": 301, "en": "Balance is difficult to achieve.", "ko": "균형을 달성하기는 어렵다.", "point": "[S V O]", "tag": "v2", "verb": "achieve"}, {"type": "item", "num": 302, "en": "Scientists must accept contradictory evidence.", "ko": "과학자들은 모순적 증거를 받아들여야 한다.", "point": "[S V O/that-]", "tag": "v2", "verb": "accept"}, {"type": "item", "num": 303, "en": "The immune system can reject foreign tissue.", "ko": "면역계는 이물질을 거부할 수 있다.", "point": "[S V O]", "tag": "v2", "verb": "reject"}, {"type": "item", "num": 304, "en": "Organisms avoid situations that signal danger.", "ko": "유기체는 위험 신호가 있는 상황을 피한다.", "point": "[S V O/-ing]", "tag": "v2", "verb": "avoid"}, {"type": "item", "num": 305, "en": "Exercise reduces the risk of chronic disease.", "ko": "운동은 만성 질환의 위험을 줄인다.", "point": "[S V O]", "tag": "v2", "verb": "reduce", "multiVal": [2, 3], "note": "3가(reduce to)와 구별"}, {"type": "item", "num": 306, "en": "Demand increases the price.", "ko": "수요는 가격을 높인다.", "point": "[S V O]", "tag": "v2", "verb": "increase", "note": "1가(증가하다)로도 쓰임"}, {"type": "item", "num": 307, "en": "Resources limit population growth.", "ko": "자원은 인구 성장을 제한한다.", "point": "[S V O]", "tag": "v2", "verb": "limit"}, {"type": "item", "num": 308, "en": "We cannot measure everything that matters.", "ko": "우리는 중요한 모든 것을 측정할 수는 없다.", "point": "[S V O]", "tag": "v2", "verb": "measure"}, {"type": "item", "num": 309, "en": "Words represent concepts, not things.", "ko": "단어는 사물이 아닌 개념을 나타낸다.", "point": "[S V O]", "tag": "v2", "verb": "represent"}, {"type": "item", "num": 310, "en": "Language expresses thought and shapes it.", "ko": "언어는 사고를 표현하고 또 형성한다.", "point": "[S V O]", "tag": "v2", "verb": "express"}, {"type": "item", "num": 311, "en": "Context defines meaning.", "ko": "맥락이 의미를 규정한다.", "point": "[S V O]", "tag": "v2", "verb": "define"}, {"type": "item", "num": 312, "en": "A theory must explain more than it assumes.", "ko": "이론은 가정하는 것보다 더 많이 설명해야 한다.", "point": "[S V O/wh-/that-]", "tag": "v2", "verb": "explain"}, {"type": "item", "num": 313, "en": "Maps describe terrain, not truth.", "ko": "지도는 진실이 아닌 지형을 묘사한다.", "point": "[S V O]", "tag": "v2", "verb": "describe", "multiVal": [2, 3], "note": "3가(describe as)와 구별"}, {"type": "item", "num": 314, "en": "Every model contains simplifications.", "ko": "모든 모델은 단순화를 포함한다.", "point": "[S V O]", "tag": "v2", "verb": "contain", "note": "1탄과 예문 다름"}, {"type": "item", "num": 315, "en": "The brain records experience as emotion.", "ko": "뇌는 경험을 감정으로 기록한다.", "point": "[S V O]", "tag": "v2", "verb": "record"}, {"type": "item", "num": 316, "en": "Silence can reveal as much as speech.", "ko": "침묵은 말만큼 많은 것을 드러낼 수 있다.", "point": "[S V O/that-]", "tag": "v2", "verb": "reveal", "multiVal": [2, 3], "note": "1탄과 예문 다름"}, {"type": "item", "num": 317, "en": "Humans uniquely share information across generations.", "ko": "인간은 독특하게 세대를 넘어 정보를 공유한다.", "point": "[S V O (with NP)]", "tag": "v2", "verb": "share"}, {"type": "item", "num": 318, "en": "The brain combines inputs from multiple senses.", "ko": "뇌는 여러 감각의 입력을 결합한다.", "point": "[S V O (with NP)]", "tag": "v2", "verb": "combine"}, {"type": "item", "num": 319, "en": "Storytelling connects people across cultures.", "ko": "이야기는 문화를 넘어 사람들을 연결한다.", "point": "[S V O (to/with NP)]", "tag": "v2", "verb": "connect", "multiVal": [2, 3]}, {"type": "item", "num": 320, "en": "Habits lose their grip when context changes.", "ko": "연습하지 않으면 기술은 빠르게 사라진다.", "point": "[S V O]", "tag": "v2", "verb": "lose", "multiVal": [2, 3], "note": "287번과 예문 다름"}, {"type": "item", "num": 321, "en": "Darwin observed variation within species.", "ko": "다윈은 종 내 변이를 관찰했다.", "point": "[S V O/that-]", "tag": "v2", "verb": "observe"}, {"type": "item", "num": 322, "en": "We must examine our own assumptions.", "ko": "우리는 자신의 가정을 검토해야 한다.", "point": "[S V O]", "tag": "v2", "verb": "examine"}, {"type": "item", "num": 323, "en": "Scientists test hypotheses against evidence.", "ko": "과학자들은 증거에 대비해 가설을 검증한다.", "point": "[S V O]", "tag": "v2", "verb": "test", "multiVal": [2, 3]}, {"type": "item", "num": 324, "en": "Anomalies challenge existing paradigms.", "ko": "이상값은 기존 패러다임에 도전한다.", "point": "[S V O]", "tag": "v2", "verb": "challenge", "note": "1탄과 예문 다름"}, {"type": "item", "num": 325, "en": "Good science constantly questions its methods.", "ko": "좋은 과학은 끊임없이 자신의 방법을 의심한다.", "point": "[S V O]", "tag": "v2", "verb": "question"}, {"type": "item", "num": 326, "en": "Complex problems rarely solve themselves.", "ko": "복잡한 문제는 스스로 해결되는 경우가 드물다.", "point": "[S V O]", "tag": "v2", "verb": "solve"}, {"type": "item", "num": 327, "en": "Treating symptoms does not fix root causes.", "ko": "증상 치료는 근본 원인을 해결하지 못한다.", "point": "[S V O]", "tag": "v2", "verb": "fix"}, {"type": "item", "num": 328, "en": "Disease can break social bonds.", "ko": "질병은 사회적 유대를 깰 수 있다.", "point": "[S V O]", "tag": "v2", "verb": "break", "multiVal": [2, 3], "note": "능격동사 — 1가로도 쓰임"}, {"type": "item", "num": 329, "en": "Education opens new ways of seeing.", "ko": "교육은 새로운 시각의 방식을 열어준다.", "point": "[S V O]", "tag": "v2", "verb": "open", "multiVal": [2, 3], "note": "능격동사"}, {"type": "item", "num": 330, "en": "The mind closes when it feels threatened.", "ko": "위협받으면 마음은 닫힌다.", "point": "[S V O]", "tag": "v2", "verb": "close", "multiVal": [2, 3], "note": "능격동사"}, {"type": "item", "num": 331, "en": "Education raises both income and life expectancy.", "ko": "교육은 소득과 기대 수명을 모두 높인다.", "point": "[S V O]", "tag": "v2", "verb": "raise", "note": "rise(1가)와 혼동 주의"}, {"type": "item", "num": 332, "en": "Firms often drop long-term goals under pressure.", "ko": "기업들은 압박 아래서 장기 목표를 자주 포기한다.", "point": "[S V O]", "tag": "v2", "verb": "drop", "note": "1가(떨어지다)로도 쓰임"}, {"type": "item", "num": 333, "en": "Exercise releases endorphins.", "ko": "운동은 엔도르핀을 방출한다.", "point": "[S V O]", "tag": "v2", "verb": "release"}, {"type": "item", "num": 334, "en": "Soil absorbs carbon dioxide.", "ko": "토양은 이산화탄소를 흡수한다.", "point": "[S V O]", "tag": "v2", "verb": "absorb"}, {"type": "item", "num": 335, "en": "Knowledge can be transferred across generations.", "ko": "지식은 세대를 넘어 전달될 수 있다.", "point": "[S V O (to NP)]", "tag": "v2", "verb": "transfer"}, {"type": "item", "num": 336, "en": "The hippocampus stores episodic memories.", "ko": "해마는 일화 기억을 저장한다.", "point": "[S V O]", "tag": "v2", "verb": "store"}, {"type": "item", "num": 337, "en": "The brain processes emotion faster than reason.", "ko": "뇌는 이성보다 감정을 더 빠르게 처리한다.", "point": "[S V O]", "tag": "v2", "verb": "process"}, {"type": "item", "num": 338, "en": "Not everyone can access quality education.", "ko": "모든 사람이 양질의 교육에 접근할 수 있는 것은 아니다.", "point": "[S V O]", "tag": "v2", "verb": "access"}, {"type": "item", "num": 339, "en": "Behaviour often reflects unconscious bias.", "ko": "행동은 종종 무의식적 편향을 반영한다.", "point": "[S V O]", "tag": "v2", "verb": "reflect", "note": "1탄과 예문 다름"}, {"type": "item", "num": 340, "en": "Rising temperatures signal systemic stress.", "ko": "기온 상승은 시스템 스트레스를 신호한다.", "point": "[S V O/that-]", "tag": "v2", "verb": "signal"}, {"type": "item", "num": 341, "en": "The pattern suggests a hidden variable.", "ko": "그 패턴은 숨겨진 변수를 암시한다.", "point": "[S V O/that-/-ing]", "tag": "v2", "verb": "suggest"}, {"type": "item", "num": 342, "en": "Replication confirms scientific findings.", "ko": "반복 실험은 과학적 발견을 확인한다.", "point": "[S V O/that-]", "tag": "v2", "verb": "confirm"}, {"type": "item", "num": 343, "en": "A single case cannot prove a universal claim.", "ko": "단일 사례로 보편적 주장을 증명할 수는 없다.", "point": "[S V O/that-]", "tag": "v2", "verb": "prove", "multiVal": [2, 3]}, {"type": "item", "num": 344, "en": "The organization denied the allegations.", "ko": "조직은 혐의를 부인했다.", "point": "[S V O/that-/-ing]", "tag": "v2", "verb": "deny", "multiVal": [2, 3], "note": "3가(deny IO DO)와 구별"}, {"type": "item", "num": 345, "en": "Darwin proposed natural selection as the mechanism.", "ko": "다윈은 자연선택을 메커니즘으로 제안했다.", "point": "[S V O/that-]", "tag": "v2", "verb": "propose"}, {"type": "item", "num": 346, "en": "The trial demonstrates cause and effect.", "ko": "실험은 인과 관계를 증명한다.", "point": "[S V O/that-]", "tag": "v2", "verb": "demonstrate"}, {"type": "item", "num": 347, "en": "IQ tests measure one narrow form of intelligence.", "ko": "IQ 검사는 하나의 좁은 형태의 지능을 측정한다.", "point": "[S V O]", "tag": "v2", "verb": "measure", "note": "308번과 예문 다름"}, {"type": "item", "num": 348, "en": "Metaphors extend our conceptual reach.", "ko": "은유는 우리의 개념적 범위를 확장한다.", "point": "[S V O]", "tag": "v2", "verb": "extend", "note": "1가(연장되다)로도 쓰임"}, {"type": "item", "num": 349, "en": "Research links gut bacteria to mental health.", "ko": "연구는 장 박테리아를 정신 건강과 연결한다.", "point": "[S V O (to NP)]", "tag": "v2", "verb": "link"}, {"type": "item", "num": 350, "en": "Language marks social identity.", "ko": "언어는 사회적 정체성을 표시한다.", "point": "[S V O]", "tag": "v2", "verb": "mark"}, {"type": "head", "text": "결합가 3탄 · 3가 기본동사", "tag": "v3"}, {"type": "item", "num": 351, "en": "She put the idea into words.", "ko": "그녀는 아이디어를 말로 표현했다.", "point": "[S V O Loc]", "tag": "v3", "verb": "put", "note": "장소 논항 필수 (1탄과 예문 다름)"}, {"type": "item", "num": 352, "en": "The crisis set the economy back decades.", "ko": "위기는 경제를 수십 년 후퇴시켰다.", "point": "[S V O Loc/OC]", "tag": "v3", "verb": "set", "note": "다중결합가"}, {"type": "item", "num": 353, "en": "How do you get people to change habits?", "ko": "어떻게 하면 사람들이 습관을 바꾸게 할 수 있을까?", "point": "[S V O to-inf]", "tag": "v3", "verb": "get", "multiVal": [2, 3], "note": "241번의 추가 패턴"}, {"type": "item", "num": 354, "en": "The shock had everyone questioning assumptions.", "ko": "충격은 모든 사람이 가정을 의심하게 했다.", "point": "[S V O OC(adj/V-ing)]", "tag": "v3", "verb": "have", "note": "사역동사 패턴"}, {"type": "item", "num": 355, "en": "Evidence must let the theory breathe.", "ko": "증거는 이론이 숨 쉬게 해야 한다.", "point": "[S V O inf]", "tag": "v3", "verb": "let", "note": "사역동사 — to 없이 원형부정사"}, {"type": "item", "num": 356, "en": "Structure helps learners retain information.", "ko": "구조는 학습자가 정보를 유지하도록 돕는다.", "point": "[S V O (to) inf]", "tag": "v3", "verb": "help", "multiVal": [2, 3], "note": "to 수의적"}, {"type": "item", "num": 357, "en": "They watched the system collapse.", "ko": "그들은 시스템이 붕괴되는 것을 지켜봤다.", "point": "[S V O inf/V-ing]", "tag": "v3", "verb": "watch", "note": "지각동사 패턴"}, {"type": "item", "num": 358, "en": "She noticed patterns forming in the data.", "ko": "그녀는 데이터에서 패턴이 형성되는 것을 알아챘다.", "point": "[S V O V-ing]", "tag": "v3", "verb": "notice", "multiVal": [2, 3], "note": "지각동사 패턴"}, {"type": "item", "num": 359, "en": "The researcher caught the system failing.", "ko": "연구자는 시스템이 실패하는 것을 포착했다.", "point": "[S V O V-ing]", "tag": "v3", "verb": "catch", "note": ws systems to handle surprise.", "ko": "다양성은 시스템이 뜻밖의 상황을 처리하게 한다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "allow"}, {"type": "item", "num": 371, "en": "Writing enables thought to outlast its thinker.", "ko": "글쓰기는 사고가 사상가보다 오래 살아남게 한다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "enable", "multiVal": [2, 3]}, {"type": "item", "num": 372, "en": "Inertia prevents systems from self-correcting.", "ko": "관성은 시스템이 스스로 교정하지 못하게 한다.", "point": "[S V O from -ing]", "tag": "v3", "verb": "prevent", "multiVal": [2, 3]}, {"type": "item", "num": 373, "en": "Nothing could stop the tide from turning.", "ko": "어떤 것도 흐름이 바뀌는 것을 막을 수 없었다.", "point": "[S V O from -ing]", "tag": "v3", "verb": "stop", "multiVal": [1, 3]}, {"type": "item", "num": 374, "en": "Distance keeps the observer from projecting.", "ko": "거리는 관찰자가 투사하는 것을 방지한다.", "point": "[S V O from -ing]", "tag": "v3", "verb": "keep", "multiVal": [2, 3], "note": "246번의 추가 패턴"}, {"type": "item", "num": 375, "en": "Pressure pushes individuals to conform.", "ko": "압력은 개인이 순응하도록 밀어붙인다.", "point": "[S V O to-inf/into NP]", "tag": "v3", "verb": "push", "multiVal": [2, 3]}, {"type": "item", "num": 376, "en": "Gravity pulls matter into denser structures.", "ko": "중력은 물질을 더 조밀한 구조로 끌어당긴다.", "point": "[S V O into NP]", "tag": "v3", "verb": "pull", "multiVal": [2, 3]}, {"type": "item", "num": 377, "en": "Competition drives species to specialise.", "ko": "경쟁은 종들이 전문화되도록 이끈다.", "point": "[S V O to-inf/into NP]", "tag": "v3", "verb": "drive", "multiVal": [2, 3]}, {"type": "item", "num": 378, "en": "Shared purpose moves people to act collectively.", "ko": "공동의 목적은 사람들이 집합적으로 행동하게 만든다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "move", "multiVal": [1, 3], "note": "220번의 추가 패턴"}, {"type": "item", "num": 379, "en": "The problem drew researchers into a decade-long debate.", "ko": "그 문제는 연구자들을 10년간의 논쟁으로 끌어들였다.", "point": "[S V O into NP]", "tag": "v3", "verb": "draw"}, {"type": "item", "num": 380, "en": "Poor sleep leads the brain to misread signals.", "ko": "수면 부족은 뇌가 신호를 잘못 읽게 한다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "lead"}, {"type": "item", "num": 381, "en": "Scientists rarely agree on definitions.", "ko": "과학자들은 정의에 좀처럼 동의하지 않는다.", "point": "[S (with NP/on NP)]", "tag": "v3", "verb": "agree"}, {"type": "item", "num": 382, "en": "Critics argue that the model oversimplifies.", "ko": "비평가들은 모델이 지나치게 단순화한다고 주장한다.", "point": "[S (that-/for NP)]", "tag": "v3", "verb": "argue"}, {"type": "item", "num": 383, "en": "The study claims a causal relationship.", "ko": "연구는 인과 관계를 주장한다.", "point": "[S V O/that-]", "tag": "v3", "verb": "claim"}, {"type": "item", "num": 384, "en": "Few leaders admit uncertainty openly.", "ko": "불확실성을 공개적으로 인정하는 지도자는 드물다.", "point": "[S V O/that-/-ing]", "tag": "v3", "verb": "admit"}, {"type": "item", "num": 385, "en": "Models always assume simplified conditions.", "ko": "모델은 항상 단순화된 조건을 가정한다.", "point": "[S V O/that-]", "tag": "v3", "verb": "assume", "note": "1탄과 예문 다름"}, {"type": "item", "num": 386, "en": "Correlation does not mean causation.", "ko": "상관관계는 인과관계를 의미하지 않는다.", "point": "[S V O/that-]", "tag": "v3", "verb": "mean"}, {"type": "item", "num": 387, "en": "Real learning involves discomfort.", "ko": "진정한 배움은 불편함을 수반한다.", "point": "[S V O/-ing]", "tag": "v3", "verb": "involve", "note": "1탄과 예문 다름"}, {"type": "item", "num": 388, "en": "A good theory includes its own limits.", "ko": "좋은 이론은 자신의 한계를 포함한다.", "point": "[S V O]", "tag": "v3", "verb": "include"}, {"type": "item", "num": 389, "en": "Bias excludes inconvenient data.", "ko": "편향은 불편한 데이터를 배제한다.", "point": "[S V O]", "tag": "v3", "verb": "exclude"}, {"type": "item", "num": 390, "en": "Society expects experts to be certain.", "ko": "사회는 전문가들이 확실하기를 기대한다.", "point": "[S V O to-inf]", "tag": "v3", "verb": "expect", "multiVal": [2, 3], "note": "281번의 추가 패턴"}, {"type": "item", "num": 391, "en": "Stories help us make sense of chaos.", "ko": "이야기는 우리가 혼돈을 이해하도록 돕는다.", "point": "[S V O]", "tag": "v3", "verb": "help", "multiVal": [2, 3]}, {"type": "item", "num": 392, "en": "The system fails the most vulnerable.", "ko": "시스템은 가장 취약한 사람들을 실패하게 한다.", "point": "[S V O]", "tag": "v3", "verb": "fail", "multiVal": [1, 2], "note": "229번의 타동사 용법"}, {"type": "item", "num": 393, "en": "We often miss what we are not primed to see.", "ko": "우리는 볼 준비가 되지 않은 것을 자주 놓친다.", "point": "[S V O]", "tag": "v3", "verb": "miss"}, {"type": "item", "num": 394, "en": "Every system gains and loses energy.", "ko": "모든 시스템은 에너지를 얻고 잃는다.", "point": "[S V O]", "tag": "v3", "verb": "gain", "multiVal": [2, 3]}, {"type": "item", "num": 395, "en": "Habits lose their grip when context changes.", "ko": "맥락이 바뀌면 습관은 힘을 잃는다.", "point": "[S V O]", "tag": "v3", "verb": "lose", "multiVal": [2, 3], "note": "287·320번과 예문 다름"}, {"type": "item", "num": 396, "en": "The burden carries the community forward.", "ko": "그 부담이 공동체를 앞으로 나아가게 한다.", "point": "[S V O OC(adj)]", "tag": "v3", "verb": "carry", "multiVal": [2, 3], "note": "290번의 추가 패턴"}, {"type": "item", "num": 397, "en": "We call this phenomenon emergence.", "ko": "우리는 이 현상을 창발이라고 부른다.", "point": "[S V O OC(NP)]", "tag": "v3", "verb": "call", "note": "다중결합가"}, {"type": "item", "num": 398, "en": "Darwin named the process natural selection.", "ko": "다윈은 그 과정을 자연선택이라고 명명했다.", "point": "[S V O OC(NP)]", "tag": "v3", "verb": "name"}, {"type": "item", "num": 399, "en": "We must consider failure a source of data.", "ko": "우리는 실패를 데이터의 원천으로 여겨야 한다.", "point": "[S V O OC(adj/NP)]", "tag": "v3", "verb": "consider", "note": "2탄의 consider와 예문 다름"}, {"type": "item", "num": 400, "en": "Early thinkers thought the earth flat.", "ko": "초기 사상가들은 지구가 평평하다고 생각했다.", "point": "[S V O OC(adj/NP)]", "tag": "v3", "verb": "think", "multiVal": [2, 3], "note": "283번의 추가 패턴"}, {"type": "head", "text": "결합가 3탄 · 보충 기본동사", "tag": "v2"}, {"type": "item", "num": 401, "en": "The signal takes eight minutes to reach Earth from the sun.", "ko": "신호가 태양에서 지구까지 도달하는 데 8분 걸린다.", "point": "[S V O]", "tag": "v2", "verb": "reach"}, {"type": "item", "num": 402, "en": "Ideas cross boundaries more easily than ever.", "ko": "아이디어는 그 어느 때보다 쉽게 경계를 넘는다.", "point": "[S V O]", "tag": "v2", "verb": "cross"}, {"type": "item", "num": 403, "en": "When toxins enter the bloodstream, damage spreads fast.", "ko": "독소가 혈류에 들어가면 손상이 빠르게 퍼진다.", "point": "[S V O]", "tag": "v2", "verb": "enter"}, {"type": "item", "num": 404, "en": "Trauma leaves a mark on the brain.", "ko": "트라우마는 뇌에 흔적을 남긴다.", "point": "[S V O]", "tag": "v2", "verb": "leave", "multiVal": [2, 3], "note": "247번과 예문 다름"}, {"type": "item", "num": 405, "en": "Laws pass responsibility to future generations.", "ko": "법은 책임을 미래 세대에게 넘긴다.", "point": "[S V O]", "tag": "v2", "verb": "pass", "note": "다중결합가"}, {"type": "item", "num": 406, "en": "Investment in education returns value over decades.", "ko": "교육 투자는 수십 년에 걸쳐 가치를 돌려준다.", "point": "[S V O (to NP)]", "tag": "v2", "verb": "return", "note": "1가(돌아오다)로도 쓰임"}, {"type": "item", "num": 407, "en": "Poor policy loses citizens their confidence.", "ko": "나쁜 정책은 시민에게서 신뢰를 잃게 한다.", "point": "[S V IO DO]", "tag": "v2", "verb": "lose", "multiVal": [2, 3]}, {"type": "item", "num": 408, "en": "The skin covers and protects internal organs.", "ko": "피부는 내장을 덮고 보호한다.", "point": "[S V O]", "tag": "v2", "verb": "cover"}, {"type": "item", "num": 409, "en": "Every generation faces its own defining challenge.", "ko": "모든 세대는 자신만의 결정적 도전에 직면한다.", "point": "[S V O]", "tag": "v2", "verb": "face"}, {"type": "item", "num": 410, "en": "Supply must meet demand for markets to function.", "ko": "시장이 기능하려면 공급이 수요를 충족해야 한다.", "point": "[S V O]", "tag": "v2", "verb": "meet"}, {"type": "item", "num": 411, "en": "The crisis hit developing nations hardest.", "ko": "위기는 개발도상국에 가장 크게 타격을 입혔다.", "point": "[S V O]", "tag": "v2", "verb": "hit"}, {"type": "item", "num": 412, "en": "Disaster strikes without warning.", "ko": "재난은 예고 없이 찾아온다.", "point": "[S V O]", "tag": "v2", "verb": "strike", "note": "능격동
